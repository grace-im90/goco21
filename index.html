<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#0b0d12" />
<title>BRAND PLAZA — Kiosk</title>

<style>
  /* ==========================
     기본
  ========================== */
  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR",
                 "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    background: #0b0d12; color: #e7e9ee;
    overflow: hidden;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none;
    touch-action: manipulation;
    /* 키오스크 잠금 */
    overscroll-behavior: none;            /* 풀투리프레시/바운스 차단 */
    -webkit-touch-callout: none;          /* iOS 길게누르기 메뉴 차단 */
    -webkit-user-drag: none;              /* 이미지/링크 드래그 차단 */
  }
  img, video { -webkit-user-drag: none; pointer-events: auto; }
  button { font-family: inherit; cursor: pointer; }
  img, video { max-width: 100%; display: block; }
  .hidden { display: none !important; }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); border-radius: 8px; }

  /* ==========================
     홈 화면 — 가운데 정렬된 대형 타이틀
  ========================== */
  #kiosk-home {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    background:
      radial-gradient(1200px 600px at 10% -10%, rgba(99,102,241,.25), transparent 60%),
      radial-gradient(1000px 500px at 110% 110%, rgba(244,114,182,.18), transparent 60%),
      linear-gradient(180deg, #0b0d12 0%, #11131a 100%);
    padding-top: env(safe-area-inset-top, 0px);
    padding-left: env(safe-area-inset-left, 0px);
    padding-right: env(safe-area-inset-right, 0px);
    box-sizing: border-box;
  }

  #kiosk-home header {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
    align-items: center;
    gap: 12px;
    padding: clamp(12px, 3vh, 26px) clamp(16px, 4vw, 28px) clamp(10px, 2vh, 18px);
    border-bottom: 1px solid rgba(255,255,255,.06);
    flex-shrink: 0;
  }
  .header-spacer { min-width: 0; } /* 비어있는 좌측 */
  .header-title {
    text-align: center; min-width: 0;
    grid-column: 2;
  }
  .header-right {
    grid-column: 3;
    justify-self: end;
    display: flex; align-items: center; gap: 12px; flex-shrink: 0;
  }

  #plaza-title {
    /* 기존 20–32px → 1.5배 확대 (30–48px) */
    font-size: clamp(30px, 6vw, 48px);
    letter-spacing: .22em;
    margin: 0;
    font-weight: 700;
    background: linear-gradient(90deg, #fff, #c7d2fe);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #plaza-sub {
    opacity: .55;
    font-size: clamp(11px, 1.8vw, 14px);
    letter-spacing: .22em;
    margin-top: 6px;
  }

  .clock {
    font-size: clamp(14px, 2vw, 18px);
    letter-spacing: .08em; opacity: .75;
    font-variant-numeric: tabular-nums;
  }
  .fs-btn {
    width: 42px; height: 42px; border-radius: 12px;
    background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1);
    color: #e7e9ee; font-size: 18px;
    display: flex; align-items: center; justify-content: center;
  }
  .fs-btn:active { background: rgba(255,255,255,.14); }
  /* 전체화면 중에는 완전히 숨김 */
  body.is-fs .fs-btn { display: none !important; }

  @media (max-width: 560px) {
    #kiosk-home header { padding: 18px 16px 12px; }
    #plaza-title { font-size: clamp(22px, 7vw, 34px); letter-spacing: .14em; }
    #plaza-sub { font-size: 11px; letter-spacing: .18em; }
  }

  /* ==========================
     유튜브식 브랜드 카드 (썸네일 + 제목만)
  ========================== */
  #brand-grid {
    flex: 1; min-height: 0; overflow-y: auto;
    padding: 24px 28px 20px;
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 22px;
    align-content: start;
    min-height: 0;          /* flexbox shrink 허용 */
  }
  @media (max-width: 1280px) { #brand-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 18px; } }
  @media (max-width: 820px)  { #brand-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; padding: 18px; } }
  @media (max-width: 480px)  { #brand-grid { grid-template-columns: minmax(0, 1fr); gap: 16px; padding: 14px; } }

  .brand-card {
    position: relative;
    border-radius: 16px; overflow: hidden;
    background: #14171f;
    border: 1px solid rgba(255,255,255,.06);
    width: 100%;
    min-width: 0;
    /* padding-top으로 16:9 비율 높이를 강제 — absolute 자식이 있어도 절대 겹치지 않음 */
    height: 0;
    padding-top: 56.25%;
    transition: transform .15s ease, border-color .15s ease;
  }
  .brand-card:active { transform: scale(.97); }
  .brand-card:hover { border-color: rgba(165,180,252,.45); }

  .brand-card .thumb { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .brand-card .no-thumb {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 72px; font-weight: 800; letter-spacing: .04em;
    background: linear-gradient(135deg, #2b304a, #1a1e30);
    color: #c7d2fe;
  }
  .brand-card .title-overlay {
    position: absolute; left: 0; right: 0; bottom: 0;
    padding: 18px 18px 18px;
    background: linear-gradient(180deg, transparent 0%, rgba(0,0,0,.88) 100%);
    color: #fff;
  }
  .brand-card .title-overlay .t-name {
    font-size: clamp(17px, 2.2vw, 22px);
    font-weight: 700;
    letter-spacing: .02em;
    text-shadow: 0 2px 10px rgba(0,0,0,.55);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  /* 종료 제스처용 투명 코너 */
  .corner { position: fixed; width: 90px; height: 90px; z-index: 50; background: transparent; }
  .corner.tl { top: 0; left: 0; } .corner.tr { top: 0; right: 0; }
  .corner.br { bottom: env(safe-area-inset-bottom, 0); right: 0; }
  .corner.bl { bottom: env(safe-area-inset-bottom, 0); left: 0; }

  /* 홈 하단 안내 */
  .home-footer {
    flex-shrink: 0;
    text-align: center;
    padding: 10px 20px;
    padding-bottom: max(10px, env(safe-area-inset-bottom));
    background: rgba(0,0,0,.25);
    border-top: 1px solid rgba(255,255,255,.05);
    font-size: clamp(12px, 1.6vw, 14px);
    opacity: .85;
  }
  .home-footer strong { color: #c7d2fe; font-weight: 600; }

  /* ==========================
     브랜드 상세 팝업 (블로그 뷰)
  ========================== */
  #brand-modal {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(5, 7, 12, .82);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    animation: fade .25s ease;
  }
  @keyframes fade { from { opacity: 0 } to { opacity: 1 } }
  .modal-card {
    width: min(960px, 100%); height: min(92vh, 1100px);
    background: #15171f; border: 1px solid rgba(255,255,255,.08);
    border-radius: 22px; overflow: hidden;
    display: flex; flex-direction: column;
    box-shadow: 0 30px 80px rgba(0,0,0,.6);
  }
  @media (max-width: 600px) {
    #brand-modal { padding: 0; align-items: stretch; }
    .modal-card {
      width: 100%;
      height: 100dvh;
      height: -webkit-fill-available;
      border-radius: 0;
    }
  }
  .modal-head {
    padding: 16px 20px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px;
    border-bottom: 1px solid rgba(255,255,255,.06);
    background: linear-gradient(180deg, rgba(255,255,255,.04), transparent);
    flex-shrink: 0;
  }
  .modal-head .title-wrap { display: flex; align-items: center; gap: 12px; min-width: 0; }
  .modal-head .logo-sm {
    width: 44px; height: 44px; border-radius: 10px; background: #fff;
    overflow: hidden; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    color: #111; font-weight: 800;
  }
  .modal-head .logo-sm img { width: 100%; height: 100%; object-fit: contain; padding: 4px; }
  .modal-head h2 {
    margin: 0; font-size: clamp(16px, 2.5vw, 22px); letter-spacing: .04em;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .modal-head .cat { font-size: 11px; opacity: .55; letter-spacing: .18em; text-transform: uppercase; }
  .close-btn {
    background: rgba(255,255,255,.08); color: #fff;
    border: 1px solid rgba(255,255,255,.1);
    width: 44px; height: 44px; border-radius: 12px;
    font-size: 22px; font-weight: 300; flex-shrink: 0;
  }
  .close-btn:active { background: rgba(255,255,255,.16); }

  .modal-body {
    overflow-y: auto; padding: 24px 28px 40px;
    line-height: 1.7;
    user-select: text; -webkit-user-select: text;
  }
  @media (max-width: 600px) { .modal-body { padding: 18px 18px 32px; } }

  .post-content { font-size: clamp(15px, 1.7vw, 17px); color: #e7e9ee; }
  .post-content h1 { font-size: 1.7em; margin: 1em 0 .5em; }
  .post-content h2 { font-size: 1.45em; margin: 1em 0 .5em; }
  .post-content h3 { font-size: 1.2em; margin: .9em 0 .4em; }
  .post-content p  { margin: 0 0 .9em; }
  .post-content ul, .post-content ol { padding-left: 1.4em; margin: 0 0 .9em; }
  .post-content blockquote {
    border-left: 3px solid #6366f1; padding: .3em 1em; margin: 1em 0;
    opacity: .85; background: rgba(99,102,241,.08); border-radius: 0 8px 8px 0;
  }
  .post-content a { color: #a5b4fc; text-decoration: underline; }
  /* 첨부 미디어: 실제 비율, 모서리 라운드 */
  .post-content img,
  .post-content video {
    max-width: 100%;
    height: auto;
    border-radius: 14px;
    margin: 16px 0;
    display: block;
    background: #000;
    box-shadow: 0 8px 24px rgba(0,0,0,.35);
  }
  /* 기본은 중앙 정렬 (인라인 style이 있으면 그걸 우선 적용) */
  .post-content p > img,
  .post-content p > video {
    margin-left: auto; margin-right: auto;
  }
  .post-content .media-caption {
    text-align: center; font-size: 13px; opacity: .55; margin: -8px 0 16px;
  }
  .post-content hr { border: none; border-top: 1px solid rgba(255,255,255,.1); margin: 1.5em 0; }

  .close-big {
    margin: 28px auto 10px; display: block;
    padding: 14px 36px; font-size: 15px; font-weight: 600;
    background: #6366f1; color: #fff; border: none; border-radius: 12px;
    letter-spacing: .08em;
  }
  .close-big:active { background: #4f46e5; }

  /* ==========================
     관리자 로그인 / 패널
  ========================== */
  #admin-login, #admin-panel, #admin-editor-view {
    position: fixed; inset: 0; z-index: 200;
    background: #0b0d12;
    display: flex; flex-direction: column;
    user-select: text; -webkit-user-select: text;
    padding-top: env(safe-area-inset-top, 0px);
    padding-bottom: env(safe-area-inset-bottom, 0px);
  }
  .admin-header {
    padding: 14px 20px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px;
    border-bottom: 1px solid rgba(255,255,255,.08);
    background: #0f1117; flex-shrink: 0;
  }
  .admin-header h2 { margin: 0; font-size: 16px; letter-spacing: .08em; }
  .admin-header .actions { display: flex; gap: 6px; flex-wrap: wrap; }

  .login-box {
    margin: auto; width: min(380px, 92vw);
    padding: 26px; background: #15171f; border-radius: 18px;
    border: 1px solid rgba(255,255,255,.08);
  }
  .login-box h3 { margin: 0 0 14px; font-size: 18px; }
  .login-box input {
    width: 100%; padding: 14px 16px; border-radius: 10px;
    background: #0b0d12; border: 1px solid rgba(255,255,255,.12);
    color: #fff; font-size: 16px;
  }
  .login-box .err { color: #f87171; font-size: 13px; min-height: 18px; margin-top: 8px; }
  .login-box button {
    width: 100%; margin-top: 10px; padding: 14px;
    background: #6366f1; border: none; border-radius: 10px; color: #fff; font-weight: 600;
  }

  .admin-body { flex: 1; overflow-y: auto; padding: 16px; }

  /* 보드 그리드 */
  .admin-board-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 12px;
    margin-bottom: 16px;
  }
  .admin-board-card {
    position: relative;
    background: #15171f;
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 14px;
    overflow: visible;
    aspect-ratio: 3/4;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
    touch-action: none;
    transition: transform .15s;
  }
  .admin-board-card .card-inner {
    width: 100%; height: 100%;
    border-radius: 14px;
    overflow: hidden;
  }
  .admin-board-card:active { transform: scale(.97); }
  .admin-board-card .card-thumb {
    width: 100%; height: 65%;
    object-fit: cover; display: block;
    background: #1f2130;
  }
  .admin-board-card .card-thumb-placeholder {
    width: 100%; height: 65%;
    background: #1f2130;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px; font-weight: 700; color: rgba(255,255,255,.2);
  }
  .admin-board-card .card-info {
    padding: 8px 10px;
  }
  .admin-board-card .card-name {
    font-size: 13px; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .admin-board-card .card-cat {
    font-size: 11px; opacity: .5; margin-top: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  /* 편집 모드 */
  .admin-board-card.edit-mode {
    animation: wiggle .4s infinite alternate;
  }
  .admin-board-card.dragging-over {
    border: 2px solid #6366f1;
    box-shadow: 0 0 0 3px rgba(99,102,241,.4);
  }
  @keyframes wiggle {
    from { transform: rotate(-1.5deg); }
    to   { transform: rotate(1.5deg); }
  }
  /* 텍스트/이미지 선택 방지 */
  .admin-board-grid * {
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
  }
  .card-delete-btn, .card-edit-btn {
    display: none;
    position: absolute;
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 2px solid #fff;
    color: #fff; font-size: 13px; font-weight: 700;
    align-items: center; justify-content: center;
    z-index: 10; cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,.5);
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .card-delete-btn {
    top: -8px; left: -8px;
    background: #ef4444;
  }
  .card-edit-btn {
    top: -8px; right: -8px;
    background: #6366f1;
    font-size: 12px;
  }
  .edit-mode .card-delete-btn,
  .edit-mode .card-edit-btn { display: flex; }

  /* 컨텍스트 메뉴 */
  #board-context-menu {
    position: fixed; inset: 0; z-index: 500;
  }
  .context-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.5);
  }
  .context-card {
    position: fixed; left: 50%;
    bottom: max(20px, env(safe-area-inset-bottom, 20px));
    transform: translateX(-50%);
    width: min(320px, 92vw);
    background: #1e2030; border-radius: 18px;
    border: 1px solid rgba(255,255,255,.1);
    overflow: hidden; z-index: 501;
    animation: slideUp .2s ease;
  }
  @keyframes slideUp { from { transform: translateX(-50%) translateY(30px); opacity: 0; } to { transform: translateX(-50%) translateY(0); opacity: 1; } }
  .context-brand-name {
    padding: 14px 20px 10px;
    font-size: 13px; font-weight: 700; opacity: .5;
    text-transform: uppercase; letter-spacing: .08em;
    border-bottom: 1px solid rgba(255,255,255,.06);
  }
  .context-card button {
    display: block; width: 100%;
    padding: 16px 20px; text-align: left;
    background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,.04);
    color: #e7e9ee; font-size: 16px; font-family: inherit;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
  }
  .context-card button:active { background: rgba(255,255,255,.06); }
  .context-card button.danger { color: #f87171; }
  .context-card button.cancel { color: #a5b4fc; font-weight: 600; border-bottom: none; }

  /* 이동 모드 드래그 힌트 */
  .move-hint {
    text-align: center; padding: 10px;
    font-size: 13px; opacity: .5;
    display: none;
  }
  .move-hint.visible { display: block; }
  .admin-grid {
    display: grid; grid-template-columns: 320px 1fr; gap: 20px;
  }
  @media (max-width: 900px) { .admin-grid { grid-template-columns: 1fr; } }
  /* 모바일 어드민 버튼 최적화 */
  @media (max-width: 768px) {
    .admin-header { flex-wrap: wrap; padding: 10px 14px; gap: 8px; }
    .admin-header h2 { font-size: 14px; }
    .admin-header .actions { width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .admin-header .actions button { min-height: 44px; padding: 8px 10px; font-size: 13px; width: 100%; }
    .editor-actions { gap: 10px; }
    .editor-actions .btn { min-height: 48px; font-size: 16px; flex: 1; text-align: center; }
    .brand-list li { min-height: 52px; padding: 12px; }
    .add-btn { min-height: 52px !important; font-size: 16px !important; }
    .editor .row { grid-template-columns: 1fr; gap: 6px; }
    .editor input[type="text"], .editor select { min-height: 48px; font-size: 16px; padding: 12px; }
    .login-box input { min-height: 52px; font-size: 18px; }
    .login-box button { min-height: 52px; font-size: 18px; }
    .admin-body { padding: 12px; }
  }

  .brand-list {
    background: #15171f; border: 1px solid rgba(255,255,255,.08);
    border-radius: 14px; padding: 14px; height: fit-content;
  }
  .brand-list h4 {
    margin: 0 0 10px; font-size: 12px; opacity: .6;
    letter-spacing: .12em; text-transform: uppercase;
  }
  .brand-list ul { list-style: none; padding: 0; margin: 0; }
  .brand-list li {
    display: flex; align-items: center; gap: 10px;
    padding: 10px; border-radius: 10px;
    border: 1px solid rgba(255,255,255,.06);
    margin-bottom: 8px; background: #0f1117;
    cursor: grab;
  }
  .brand-list li.dragging { opacity: .4; }
  .brand-list li.selected { border-color: #6366f1; background: #1a1d28; }
  .brand-list li .logo-xs {
    width: 32px; height: 32px; border-radius: 6px; background: #fff;
    overflow: hidden; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    color: #111; font-weight: 700; font-size: 12px;
  }
  .brand-list li .logo-xs img { width: 100%; height: 100%; object-fit: contain; padding: 2px; }
  .brand-list li .nm { flex: 1; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .brand-list li .hdl { opacity: .4; font-size: 18px; }
  .brand-list .add-btn {
    width: 100%; margin-top: 8px; padding: 12px;
    background: #1f2130; color: #c7d2fe; border: 1px dashed rgba(165,180,252,.4);
    border-radius: 10px; font-weight: 600;
  }

  .editor {
    background: #15171f; border: 1px solid rgba(255,255,255,.08);
    border-radius: 14px; padding: 20px;
  }
  .editor .row {
    display: grid; grid-template-columns: 120px 1fr; gap: 12px;
    align-items: start; margin-bottom: 14px;
  }
  @media (max-width: 700px) {
    .editor .row { grid-template-columns: 1fr; gap: 6px; }
    .editor label { padding-top: 0 !important; }
  }
  .editor label { font-size: 13px; opacity: .7; padding-top: 10px; }
  .editor input[type="text"], .editor select {
    width: 100%; padding: 10px 12px; border-radius: 8px;
    background: #0b0d12; border: 1px solid rgba(255,255,255,.12);
    color: #fff; font-size: 14px; font-family: inherit;
  }
  .logo-pick { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .logo-pick .preview {
    width: 64px; height: 64px; border-radius: 10px; background: #fff; overflow: hidden;

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
/* ============================================================
   Firebase 데이터 레이어 — 클라우드 실시간 동기화
============================================================ */
const firebaseConfig = {
  apiKey: "AIzaSyCyiK0cunm9T11sLc2E0trgE-q1RxomhV8",
  authDomain: "grace-aea60.firebaseapp.com",
  projectId: "grace-aea60",
  storageBucket: "grace-aea60.firebasestorage.app",
  messagingSenderId: "990582075084",
  appId: "1:990582075084:web:0a9d55fa409c70c9a19c69"
};

firebase.initializeApp(firebaseConfig);
const _fbDb = firebase.firestore();
const BRANDS_DOC = _fbDb.collection('kiosk').doc('brands');

const DB = {
  SETTINGS_KEY: 'brand_kiosk_settings_v1',

  async load() {
    try {
      const snap = await BRANDS_DOC.get();
      if (snap.exists && snap.data().list && snap.data().list.length) {
        return snap.data().list;
      }
      const seed = this._seedData();
      await this.save(seed);
      return seed;
    } catch (e) {
      console.error('[DB.load] Firebase 실패:', e);
      return this._seedData();
    }
  },
  async save(data) {
    try {
      await BRANDS_DOC.set({ list: data });
      if (window._bc) try { window._bc.postMessage({ type: 'brands-updated' }); } catch {}
      return true;
    } catch (e) {
      console.error('[DB.save] Firebase 실패:', e);
      return false;
    }
  },
  listenBrands(callback) {
    return BRANDS_DOC.onSnapshot((snap) => {
      if (snap.exists && snap.data().list) callback(snap.data().list);
    });
  },
  loadSettings() {
    const raw = localStorage.getItem(this.SETTINGS_KEY);
    if (!raw) return { password: 'admin1234', title: 'BRAND PLAZA', subtitle: 'LEVEL 3 · FASHION & LIFESTYLE' };
    try { return JSON.parse(raw); } catch { return { password: 'admin1234', title: 'BRAND PLAZA', subtitle: '' }; }
  },
  saveSettings(s) { localStorage.setItem(this.SETTINGS_KEY, JSON.stringify(s)); },

  _seedData() {
    return [
      { id: uid(), name: 'AURORA', category: 'Fashion', logo: '', thumbnail: '',
        contentHtml: `<h2>오로라 — 미니멀 라이프웨어</h2><p>자연에서 영감을 받은 차분한 컬러와 편안한 실루엣. 오로라는 일상의 모든 순간을 위해 만들어졌습니다.</p><p><b>위치</b> 3층 301호 &nbsp;·&nbsp; <b>운영시간</b> 10:30 – 21:00</p>` },
      { id: uid(), name: 'LUMEN', category: 'Lifestyle', logo: '', thumbnail: '',
        contentHtml: `<h2>루멘 — 홈 &amp; 오브제</h2><p>조명과 향, 오브제로 공간을 채웁니다. 이번 시즌은 따뜻한 토널 라이트 컬렉션을 선보입니다.</p>` },
      { id: uid(), name: 'ROVI', category: 'Food', logo: '', thumbnail: '',
        contentHtml: `<h2>로비 델리카트슨</h2><p>매일 아침 직접 굽는 사워도우와 수제 샐러드, 계절 스프를 준비합니다.</p>` },
      { id: uid(), name: 'KITA', category: 'Beauty', logo: '', thumbnail: '',
        contentHtml: `<h2>키타 코스메틱</h2><p>자연 유래 성분으로 만든 스킨케어. 민감한 피부를 위한 모든 것.</p>` }
    ];
  }
};

function uid() { return 'b_' + Math.random().toString(36).slice(2, 10); }
function migrateBlocksToHtml(b) {
  if (b.contentHtml !== undefined) return b;
  let html = '';
  (b.blocks || []).forEach(bk => {
    if (bk.type === 'heading') html += `<h2>${esc(bk.value || '')}</h2>`;
    else if (bk.type === 'text') html += `<p>${esc(bk.value || '').replace(/\n/g,'<br>')}</p>`;
    else if (bk.type === 'image' && bk.src) html += `<p><img src="${bk.src}" alt=""></p>`;
    else if (bk.type === 'video' && bk.src) html += `<p><video src="${bk.src}" controls playsinline></video></p>`;
  });
  return { id: b.id, name: b.name, category: b.category || '', logo: b.logo || '', thumbnail: '', contentHtml: html };
}
function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* 다른 탭과 동기화 */
try { window._bc = new BroadcastChannel('brand_kiosk'); } catch { window._bc = null; }

/* ============================================================
   상태
============================================================ */
let brands = [];
let settings = DB.loadSettings();
let currentEditingId = null;
let isAdminAuthed = false;
let selectedMedia = null; // 에디터에서 클릭한 이미지/영상

/* ============================================================
   홈 렌더 (썸네일 + 제목만)
============================================================ */
function renderHome() {
  document.getElementById('plaza-title').textContent = settings.title || 'BRAND PLAZA';
  document.getElementById('plaza-sub').textContent   = settings.subtitle || '';

  const grid = document.getElementById('brand-grid');
  grid.innerHTML = '';
  if (!brands.length) {
    grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:80px 20px; opacity:.5;">등록된 브랜드가 없습니다.<br>관리자 페이지에서 추가해 주세요.</div>';
    return;
  }
  brands.forEach(b => {
    const card = document.createElement('div');
    card.className = 'brand-card';
    const thumb = b.thumbnail || firstImageFromHtml(b.contentHtml) || '';
    const initial = (b.name || '?').charAt(0).toUpperCase();
    card.innerHTML = `
      ${thumb
        ? `<img class="thumb" src="${thumb}" alt="${esc(b.name)}">`
        : `<div class="no-thumb">${esc(initial)}</div>`}
      <div class="title-overlay">
        <div class="t-name">${esc(b.name || '(이름 없음)')}</div>
      </div>
    `;
    card.onclick = () => openBrand(b.id);
    grid.appendChild(card);
  });
}
function firstImageFromHtml(html) {
  if (!html) return '';
  const m = html.match(/<img[^>]+src="([^"]+)"/i);
  return m ? m[1] : '';
}

/* ============================================================
   상세 팝업
============================================================ */
function openBrand(id) {
  const b = brands.find(x => x.id === id);
  if (!b) return;
  document.getElementById('modal-title').textContent = b.name;
  document.getElementById('modal-cat').textContent = b.category || '';
  const logoEl = document.getElementById('modal-logo');
  logoEl.innerHTML = b.logo ? `<img src="${b.logo}">` : esc((b.name||'?').charAt(0).toUpperCase());

  const body = document.getElementById('modal-body');
  body.innerHTML = `
    <div class="post-content">${b.contentHtml || '<p style="opacity:.5">준비된 콘텐츠가 없습니다.</p>'}</div>
    <button class="close-big" onclick="closeBrand()">닫기</button>
  `;
  body.querySelectorAll('video').forEach(v => { v.controls = true; v.playsInline = true; });
  document.getElementById('brand-modal').classList.remove('hidden');
}
function closeBrand() { document.getElementById('brand-modal').classList.add('hidden'); }
document.getElementById('modal-close').onclick = closeBrand;
document.getElementById('brand-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('brand-modal')) closeBrand();
});

/* ============================================================
   관리자 진입
============================================================ */
function openAdmin() {
  if (isAdminAuthed) { showAdminPanel(); return; }
  document.getElementById('admin-login').classList.remove('hidden');
  document.getElementById('admin-pw').value = '';
  document.getElementById('admin-err').textContent = '';
  setTimeout(() => document.getElementById('admin-pw').focus(), 100);
}
function closeAdmin() {
  document.getElementById('admin-login').classList.add('hidden');
  document.getElementById('admin-panel').classList.add('hidden');
  if (location.hash) history.replaceState(null,'',location.pathname);
  renderHome();
}
function tryLogin() {
  const pw = document.getElementById('admin-pw').value;
  if (pw === settings.password) {
    isAdminAuthed = true;
    document.getElementById('admin-login').classList.add('hidden');
    showAdminPanel();
  } else {
    document.getElementById('admin-err').textContent = '비밀번호가 일치하지 않습니다.';
  }
}
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !document.getElementById('admin-login').classList.contains('hidden')) tryLogin();
  if (e.key === 'Escape' && !document.getElementById('brand-modal').classList.contains('hidden')) closeBrand();
});
(function() {
  // 하단 푸터를 5번 빠르게 탭하면 관리자 진입
  let taps = 0, lastTs = 0;
  const footer = document.querySelector('.home-footer');
  function hit() {
    const now = Date.now();
    if (now - lastTs > 2000) taps = 0;
    lastTs = now;
    taps++;
    if (taps >= 5) { taps = 0; openAdmin(); }
  }
  footer.addEventListener('touchend', (e) => { e.preventDefault(); e.stopPropagation(); hit(); }, { passive: false });
  footer.addEventListener('click', (e) => { e.stopPropagation(); hit(); });
})();

/* ============================================================
   관리자 패널
============================================================ */
let editMode = false;
let dragSrcId = null;
let touchDragId = null;
let touchClone = null;

function showAdminPanel() {
  editMode = false;
  document.getElementById('admin-panel').classList.remove('hidden');
  document.getElementById('admin-editor-view').classList.add('hidden');
  renderAdminBoardGrid();
}

function backToAdminList() {
  commitEditorToModel();
  editMode = false;
  document.getElementById('admin-editor-view').classList.add('hidden');
  document.getElementById('admin-panel').classList.remove('hidden');
  renderAdminBoardGrid();
}

function renderAdminList() { renderAdminBoardGrid(); }

function enterEditMode() {
  editMode = true;
  document.getElementById('admin-normal-actions').classList.add('hidden');
  document.getElementById('admin-edit-actions').classList.remove('hidden');
  document.getElementById('admin-panel-title').textContent = '편집 모드';
  document.getElementById('admin-add-btn').classList.add('hidden');
  renderAdminBoardGrid();
}

function exitEditMode() {
  editMode = false;
  document.getElementById('admin-normal-actions').classList.remove('hidden');
  document.getElementById('admin-edit-actions').classList.add('hidden');
  document.getElementById('admin-panel-title').textContent = 'ADMIN · 콘텐츠 관리';
  document.getElementById('admin-add-btn').classList.remove('hidden');
  renderAdminBoardGrid();
}

function openEditorForBrand(id) {
  exitEditMode();
  currentEditingId = id;
  document.getElementById('admin-panel').classList.add('hidden');
  document.getElementById('admin-editor-view').classList.remove('hidden');
  const b = brands.find(x => x.id === id);
  document.getElementById('editor-view-title').textContent = b?.name || '보드 편집';
  renderEditor();
}

function renderAdminBoardGrid() {
  const grid = document.getElementById('admin-board-grid');
  grid.innerHTML = '';

  brands.forEach((b) => {
    const card = document.createElement('div');
    card.className = 'admin-board-card' + (editMode ? ' edit-mode' : '');
    card.dataset.id = b.id;

    const initial = (b.name || '?').charAt(0).toUpperCase();
    const thumbHtml = b.thumbnail
      ? `<img class="card-thumb" src="${esc(b.thumbnail)}">`
      : `<div class="card-thumb-placeholder">${esc(initial)}</div>`;

    card.innerHTML = `
      <button class="card-delete-btn" data-id="${b.id}">✕</button>
      <button class="card-edit-btn" data-id="${b.id}">✏</button>
      <div class="card-inner">
        ${thumbHtml}
        <div class="card-info">
          <div class="card-name">${esc(b.name || '(이름 없음)')}</div>
          <div class="card-cat">${esc(b.category || '')}</div>
        </div>
      </div>`;

    // 삭제 버튼
    const deleteHandler = async (e) => {
      e.stopPropagation(); e.preventDefault();
      const bid = e.currentTarget.dataset.id;
      const br = brands.find(x => x.id === bid);
      if (!confirm(`"${br?.name}" 보드를 삭제할까요?`)) return;
      brands = brands.filter(x => x.id !== bid);
      await DB.save(brands);
      renderAdminBoardGrid();
      toast('삭제했습니다');
    };
    card.querySelector('.card-delete-btn').addEventListener('touchend', deleteHandler);
    card.querySelector('.card-delete-btn').addEventListener('click', deleteHandler);

    const editHandler = (e) => {
      e.stopPropagation(); e.preventDefault();
      openEditorForBrand(b.id);
    };
    card.querySelector('.card-edit-btn').addEventListener('touchend', editHandler);
    card.querySelector('.card-edit-btn').addEventListener('click', editHandler);

    // 길게 누르기 → 편집 모드 진입
    let pressTimer = null;
    let didLongPress = false;
    card.addEventListener('touchstart', (e) => {
      didLongPress = false;
      if (editMode) return;
      pressTimer = setTimeout(() => {
        pressTimer = null;
        didLongPress = true;
        enterEditMode();
      }, 600);
    }, { passive: true });

    card.addEventListener('touchend', (e) => {
      if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
      if (didLongPress) { didLongPress = false; return; }
      // 짧은 탭 — 편집 모드에서는 아무것도 안 함 (✏ 버튼으로만 에디터 진입)
    });

    card.addEventListener('touchmove', () => {
      if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
    });

    card.addEventListener('click', () => {
      if (editMode) {
        openEditorForBrand(b.id);
        return;
      }
      // 일반 모드: 한 번 탭 → 에디터
      openEditorForBrand(b.id);
    });

    // 드래그 — 터치(iOS/Android) + 마우스(Mac/Windows/iPad) 통합
    if (editMode) {
      // ── 마우스/트랙패드 드래그 ──
      card.draggable = true;
      card.addEventListener('dragstart', (e) => {
        dragSrcId = b.id;
        card.style.opacity = '.4';
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', b.id);
      });
      card.addEventListener('dragend', () => {
        card.style.opacity = '1';
        document.querySelectorAll('.admin-board-card').forEach(c => c.classList.remove('dragging-over'));
      });
      card.addEventListener('dragover', (e) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        if (b.id !== dragSrcId) card.classList.add('dragging-over');
      });
      card.addEventListener('dragleave', () => card.classList.remove('dragging-over'));
      card.addEventListener('drop', async (e) => {
        e.preventDefault();
        card.classList.remove('dragging-over');
        const fromId = e.dataTransfer.getData('text/plain');
        if (!fromId || fromId === b.id) return;
        const from = brands.findIndex(x => x.id === fromId);
        const to   = brands.findIndex(x => x.id === b.id);
        if (from < 0 || to < 0) return;
        const [moved] = brands.splice(from, 1);
        brands.splice(to, 0, moved);
        await DB.save(brands);
        renderAdminBoardGrid();
        toast('순서를 변경했습니다');
      });

      // ── 터치 드래그 (iOS / Android) ──
      card.addEventListener('touchstart', (e) => {
        touchDragId = b.id;
        card.style.opacity = '.5';
      }, { passive: true });

      card.addEventListener('touchmove', (e) => {
        if (!touchDragId || touchDragId !== b.id) return;
        e.preventDefault();
        const touch = e.touches[0];
        document.querySelectorAll('.admin-board-card').forEach(c => c.classList.remove('dragging-over'));
        const els = document.elementsFromPoint(touch.clientX, touch.clientY);
        const target = els.find(el => el.classList.contains('admin-board-card') && el.dataset.id && el.dataset.id !== touchDragId);
        if (target) target.classList.add('dragging-over');
      }, { passive: false });

      card.addEventListener('touchend', async (e) => {
        if (!touchDragId || touchDragId !== b.id) return;
        card.style.opacity = '1';
        const touch = e.changedTouches[0];
        document.querySelectorAll('.admin-board-card').forEach(c => c.classList.remove('dragging-over'));
        const els = document.elementsFromPoint(touch.clientX, touch.clientY);
        const target = els.find(el => el.classList.contains('admin-board-card') && el.dataset.id && el.dataset.id !== touchDragId);
        if (target) {
          const from = brands.findIndex(x => x.id === touchDragId);
          const to   = brands.findIndex(x => x.id === target.dataset.id);
          if (from >= 0 && to >= 0) {
            const [moved] = brands.splice(from, 1);
            brands.splice(to, 0, moved);
            await DB.save(brands);
            renderAdminBoardGrid();
            toast('순서를 변경했습니다');
          }
        }
        touchDragId = null;
      });
    }

    grid.appendChild(card);
  });
}

/* --- WYSIWYG 바인딩 --- */
function bindRichTextEditor(b) {
  const editor = document.getElementById('rte-editor');
  const toolbar = document.getElementById('rte-toolbar');

  toolbar.addEventListener('mousedown', e => {
    if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'SELECT') e.preventDefault();
  });

  toolbar.querySelectorAll('button[data-cmd]').forEach(btn => {
    btn.onclick = () => {
      editor.focus();
      document.execCommand(btn.dataset.cmd, false, null);
      syncContent(b);
    };
  });
  document.getElementById('rte-block').onchange = (e) => { editor.focus(); document.execCommand('formatBlock', false, e.target.value); syncContent(b); };
  document.getElementById('rte-font').onchange  = (e) => { editor.focus(); if (e.target.value) document.execCommand('fontName', false, e.target.value); syncContent(b); };
  document.getElementById('rte-size').onchange  = (e) => { editor.focus(); document.execCommand('fontSize', false, e.target.value); syncContent(b); };
  document.getElementById('rte-fg').oninput     = (e) => { editor.focus(); document.execCommand('foreColor', false, e.target.value); syncContent(b); };
  document.getElementById('rte-bg').oninput     = (e) => { editor.focus(); document.execCommand('hiliteColor', false, e.target.value); syncContent(b); };
  document.getElementById('rte-link').onclick   = () => {
    const url = prompt('링크 URL'); if (!url) return;
    editor.focus(); document.execCommand('createLink', false, url); syncContent(b);
  };
  document.getElementById('rte-hr').onclick = () => {
    editor.focus(); document.execCommand('insertHorizontalRule'); syncContent(b);
  };

  document.getElementById('rte-img').onchange = (e) => insertMediaFromFile(e, 'img', b);
  document.getElementById('rte-vid').onchange = (e) => insertMediaFromFile(e, 'video', b);

  // 미디어 선택
  editor.addEventListener('click', e => {
    const prev = editor.querySelector('.media-selected');
    if (prev) prev.classList.remove('media-selected');
    if (e.target.tagName === 'IMG' || e.target.tagName === 'VIDEO') {
      selectedMedia = e.target;
      e.target.classList.add('media-selected');
    } else {
      selectedMedia = null;
    }
  });

  // 이미지 좌/중/우 정렬
  document.getElementById('img-left').onclick   = () => alignMedia('left', b);
  document.getElementById('img-center').onclick = () => alignMedia('center', b);
  document.getElementById('img-right').onclick  = () => alignMedia('right', b);

  editor.addEventListener('input', () => syncContent(b));
  editor.addEventListener('blur',  () => syncContent(b));
  editor.addEventListener('paste', (e) => {
    e.preventDefault();
    const text = (e.clipboardData || window.clipboardData).getData('text/plain');
    document.execCommand('insertText', false, text);
  });
}

function alignMedia(which, b) {
  if (!selectedMedia) { toast('먼저 에디터 안의 이미지나 영상을 클릭한 뒤 정렬해 주세요'); return; }
  const el = selectedMedia;
  el.style.display = 'block';
  el.style.float = 'none';
  if (which === 'left') {
    el.style.marginLeft = '0';
    el.style.marginRight = 'auto';
  } else if (which === 'right') {
    el.style.marginLeft = 'auto';
    el.style.marginRight = '0';
  } else {
    el.style.marginLeft = 'auto';
    el.style.marginRight = 'auto';
  }
  syncContent(b);
}

/* 용량 제한 없이 업로드 — FileReader로 data URL 인코딩
   (IndexedDB는 용량 제한이 사실상 없음: 로컬 디스크 가용량 기반) */
/* Cloudinary 업로드 헬퍼 */
const CLOUDINARY_CLOUD = 'dqlyodqiw';
const CLOUDINARY_PRESET = 'nmhttl5r';

async function uploadToCloudinary(file) {
  const isVideo = file.type.startsWith('video/');
  const resourceType = isVideo ? 'video' : 'image';
  const fd = new FormData();
  fd.append('file', file);
  fd.append('upload_preset', CLOUDINARY_PRESET);
  if (isVideo) {
    // 영상 자동 압축 최적화
    fd.append('quality', 'auto');
    fd.append('fetch_format', 'auto');
  } else {
    // 이미지 자동 압축 최적화
    fd.append('quality', 'auto');
    fd.append('fetch_format', 'auto');
  }
  const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/${resourceType}/upload`, {
    method: 'POST', body: fd
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || 'Cloudinary 업로드 실패');
  }
  const data = await res.json();
  return data.secure_url;
}

async function insertMediaFromFile(ev, kind, b) {
  const file = ev.target.files[0]; ev.target.value = '';
  if (!file) return;
  const status = document.getElementById('rte-uploading');
  status.innerHTML = `<span class="uploading">Cloudinary 업로드 중… ${(file.size/1024/1024).toFixed(1)}MB</span>`;
  try {
    const url = await uploadToCloudinary(file);
    status.innerHTML = '';
    const editor = document.getElementById('rte-editor');
    editor.focus();
    let html = '';
    if (kind === 'img') html = `<p><img src="${url}" alt=""></p><p><br></p>`;
    else html = `<p><video src="${url}" controls playsinline></video></p><p><br></p>`;
    document.execCommand('insertHTML', false, html);
    syncContent(b);
  } catch(e) {
    status.innerHTML = '';
    toast('업로드 실패: ' + e.message);
  }
}

function syncContent(b) {
  const editor = document.getElementById('rte-editor');
  if (!editor || !b) return;
  // 선택 표시용 class 는 저장본에서 제거
  const clone = editor.cloneNode(true);
  clone.querySelectorAll('.media-selected').forEach(el => el.classList.remove('media-selected'));
  b.contentHtml = clone.innerHTML;
}
function commitEditorToModel() {
  const b = brands.find(x => x.id === currentEditingId);
  if (!b) return;
  const editor = document.getElementById('rte-editor');
  if (editor) {
    const clone = editor.cloneNode(true);
    clone.querySelectorAll('.media-selected').forEach(el => el.classList.remove('media-selected'));
    b.contentHtml = clone.innerHTML;
  }
  const nm = document.getElementById('ed-name');
  const cat = document.getElementById('ed-cat');
  if (nm)  b.name = nm.value;
  if (cat) b.category = cat.value;
}

function exportData() {
  commitEditorToModel();
  const payload = {
    app: 'BrandPlaza',
    version: 1,
    exportedAt: new Date().toISOString(),
    brands: brands,
    settings: settings
  };
  const json = JSON.stringify(payload, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const ts = new Date().toISOString().slice(0,10);
  a.download = `brandplaza-backup-${ts}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  toast('백업 파일을 내려받았습니다');
}

function importData(ev) {
  const file = ev.target.files[0]; ev.target.value = '';
  if (!file) return;
  if (!confirm('현재 데이터를 백업 파일의 내용으로 덮어씁니다. 계속할까요?')) return;
  const reader = new FileReader();
  reader.onload = async () => {
    try {
      const data = JSON.parse(reader.result);
      if (!data || !Array.isArray(data.brands)) throw new Error('형식 오류');
      brands = data.brands;
      await DB.save(brands);
      if (data.settings && typeof data.settings === 'object') {
        settings = Object.assign({}, settings, data.settings);
        DB.saveSettings(settings);
      }
      currentEditingId = brands[0]?.id || null;
      renderAdminList();
      renderEditor();
      renderHome();
      toast(`백업을 가져왔습니다 (브랜드 ${brands.length}개)`);
    } catch (e) {
      console.error(e);
      toast('백업 파일을 읽을 수 없습니다 (형식 오류)');
    }
  };
  reader.onerror = () => toast('파일을 읽지 못했습니다');
  reader.readAsText(file);
}

function showSettings() {
  const newTitle = prompt('키오스크 타이틀', settings.title || 'BRAND PLAZA');
  if (newTitle === null) return;
  const newSub = prompt('부제 (예: LEVEL 3 · FASHION & LIFESTYLE)', settings.subtitle || '');
  if (newSub === null) return;
  const newPw = prompt('새 관리자 비밀번호 (변경하지 않으려면 비워두세요)', '');
  if (newPw === null) return;
  settings.title = newTitle;
  settings.subtitle = newSub;
  if (newPw.trim()) settings.password = newPw.trim();
  DB.saveSettings(settings);
  renderHome();
  toast('설정을 저장했습니다');
}

/* ============================================================
   종료 제스처 & 전체화면
============================================================ */
(function() {
  const sequence = [0,1,2,3];
  let buf = []; let lastTs = 0;
  document.querySelectorAll('.corner').forEach(el => {
    el.addEventListener('click', () => {
      const c = Number(el.dataset.corner);
      const now = Date.now();
      if (now - lastTs > 3000) buf = [];
      lastTs = now;
      buf.push(c);
      if (buf.length > sequence.length) buf.shift();
      if (JSON.stringify(buf) === JSON.stringify(sequence)) { buf = []; showExitPrompt(); }
    });
  });
})();
function showExitPrompt() {
  const wrap = document.createElement('div');
  wrap.className = 'exit-prompt';
  wrap.innerHTML = `
    <div class="exit-card">
      <h3>키오스크 종료</h3>
      <p>전체화면을 해제하고 홈으로 돌아갑니다.</p>
      <div class="actions">
        <button class="btn btn-ghost" id="ex-cancel">취소</button>
        <button class="btn btn-primary" id="ex-ok">종료</button>
      </div>
    </div>`;
  document.body.appendChild(wrap);
  wrap.querySelector('#ex-cancel').onclick = () => wrap.remove();
  wrap.querySelector('#ex-ok').onclick = () => { wrap.remove(); exitFullscreenSafe(); toast('키오스크를 종료했습니다'); };
}
function isFullscreen() { return !!(document.fullscreenElement || document.webkitFullscreenElement); }
function enterFullscreen() {
  const el = document.documentElement;
  const req = el.requestFullscreen || el.webkitRequestFullscreen;
  if (req) { try { req.call(el); } catch {} }
}
function exitFullscreenSafe() {
  if (document.exitFullscreen) { try { document.exitFullscreen(); } catch {} }
  else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
}
function updateFsState() { document.body.classList.toggle('is-fs', isFullscreen()); }
document.getElementById('fs-toggle').addEventListener('click', e => {
  e.stopPropagation();
  if (isFullscreen()) exitFullscreenSafe(); else enterFullscreen();
  setTimeout(updateFsState, 100);
});
document.addEventListener('fullscreenchange', updateFsState);
document.addEventListener('webkitfullscreenchange', updateFsState);
document.getElementById('kiosk-home').addEventListener('click', e => {
  if (e.target.closest('.brand-card') || e.target.closest('button') ||
      e.target.closest('.corner') || e.target.closest('.home-footer')) return;
  if (!isFullscreen()) enterFullscreen();
});

/* ============================================================
   유틸 & 초기화
============================================================ */
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.remove('show'), 2200);
}
function updateClock() {
  const d = new Date();
  const hh = String(d.getHours()).padStart(2, '0');
  const mm = String(d.getMinutes()).padStart(2, '0');
  document.getElementById('clock').textContent = `${hh}:${mm}`;
}
updateClock();
setInterval(updateClock, 15000);

/* 탭 간 동기화 */
if (window._bc) {
  window._bc.onmessage = async (e) => {
    if (e && e.data && e.data.type === 'brands-updated') {

      renderHome();

/* iOS 더블탭 확대 방지 */
let lastTouchEnd = 0;
document.addEventListener('touchend', e => {
  const now = Date.now();
  if (now - lastTouchEnd <= 300) e.preventDefault();
  lastTouchEnd = now;
}, { passive: false });

/* ============================================================
   키오스크 잠금 — 브라우저 내에서 차단 가능한 이탈 경로 차단
   (OS 레벨 홈버튼/앱스위처는 OS 설정 필요 — README 참고)
============================================================ */
(function lockDown() {
  const isInInput = (el) => {
    if (!el || !el.closest) return false;
    return !!(el.closest('input, textarea, [contenteditable="true"]'));
  };

  // 1) 우클릭 컨텍스트 메뉴 차단 (편집 영역은 허용)
  document.addEventListener('contextmenu', e => {
    if (isInInput(e.target)) return;
    e.preventDefault();
  });

  // 2) 키보드 단축키 차단
  document.addEventListener('keydown', e => {
    const key = e.key;
    const ctrl = e.ctrlKey || e.metaKey;
    const inInput = isInInput(e.target);

    // 새로고침 / 전체화면 / 개발자도구 — 무조건 차단
    if (key === 'F5' || key === 'F11' || key === 'F12') { e.preventDefault(); return; }
    if (ctrl && ['r','R','w','W','n','N','t','T','p','P','s','S','o','O','u','U','h','H','f','F','g','G','l','L'].includes(key)) {
      e.preventDefault(); return;
    }
    if (ctrl && e.shiftKey && ['i','I','j','J','c','C','r','R','t','T','n','N','w','W','p','P'].includes(key)) {
      e.preventDefault(); return;
    }
    if (e.altKey && (key === 'ArrowLeft' || key === 'ArrowRight')) { e.preventDefault(); return; } // Alt+← 뒤로가기

    // 입력창 바깥에서는 백스페이스 탐색 차단
    if (key === 'Backspace' && !inInput) { e.preventDefault(); return; }
  });

  // 3) Ctrl+휠 줌 차단
  document.addEventListener('wheel', e => {
    if (e.ctrlKey || e.metaKey) e.preventDefault();
  }, { passive: false });

  // 4) 뒤로가기 제스처(iOS 가장자리 스와이프, Android 백제스처) 차단
  try {
    history.pushState({ lock: true }, '', location.href);
    window.addEventListener('popstate', () => {
      history.pushState({ lock: true }, '', location.href);
    });
  } catch {}

  // 5) 드래그 앤 드롭 차단 (관리자 브랜드 순서변경은 허용)
  document.addEventListener('dragstart', e => {
    if (e.target.closest && e.target.closest('.brand-list li')) return;
    e.preventDefault();
  });
  document.addEventListener('drop', e => e.preventDefault());

  // 6) 외부 링크 이동 차단
  document.addEventListener('click', e => {
    const a = e.target.closest && e.target.closest('a[href]');
    if (!a) return;
    const href = a.getAttribute('href') || '';
    if (href.startsWith('#')) return;
    e.preventDefault();
  });

  // 7) 탭/창 닫기 시도 시 경고 (브라우저에 따라 동작)
  window.addEventListener('beforeunload', (e) => {
    // 관리자 모드에서 의도치 않은 이탈 방지
    e.preventDefault();
    e.returnValue = '';
  });
})();
