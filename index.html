<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#0b0d12" />
<title>셀렉상회 큐레이션 — Kiosk</title>

<style>
  /* ==========================
     기본
  ========================== */
  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR",
                 "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    background: #0b0d12; color: #e7e9ee;
    overflow: hidden;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none;
    touch-action: manipulation;
    /* 키오스크 잠금 */
    overscroll-behavior: none;            /* 풀투리프레시/바운스 차단 */
    -webkit-touch-callout: none;          /* iOS 길게누르기 메뉴 차단 */
    -webkit-user-drag: none;              /* 이미지/링크 드래그 차단 */
    /* 가로모드 텍스트 자동 확대 방지 */
    -webkit-text-size-adjust: 100%;
    text-size-adjust: 100%;
  }
  img, video { -webkit-user-drag: none; pointer-events: auto; }
  button { font-family: inherit; cursor: pointer; }
  img, video { max-width: 100%; display: block; }
  .hidden { display: none !important; }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); border-radius: 8px; }

  /* ==========================
     홈 화면 — 가운데 정렬된 대형 타이틀
  ========================== */
  #kiosk-home {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    background:
      radial-gradient(1200px 600px at 10% -10%, rgba(99,102,241,.25), transparent 60%),
      radial-gradient(1000px 500px at 110% 110%, rgba(244,114,182,.18), transparent 60%),
      linear-gradient(180deg, #0b0d12 0%, #11131a 100%);
  }

  #kiosk-home header {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
    align-items: center;
    gap: 12px;
    padding: 16px clamp(16px, 4vw, 28px) 12px;
    padding-top: 16px;
    border-bottom: 1px solid rgba(255,255,255,.06);
    flex-shrink: 0;
  }
  .header-spacer { min-width: 0; } /* 비어있는 좌측 */
  .header-title {
    text-align: center; min-width: 0;
    grid-column: 2;
  }
  .header-right {
    grid-column: 3;
    justify-self: end;
    display: flex; align-items: center; gap: 12px; flex-shrink: 0;
  }

  #plaza-title {
    font-size: clamp(30px, 6vw, 48px);
    letter-spacing: .04em;
    margin: 0;
    font-weight: 700;
    background: linear-gradient(90deg, #fff, #c7d2fe);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #plaza-sub {
    opacity: .55;
    font-size: clamp(11px, 1.8vw, 14px);
    letter-spacing: .04em;
    margin-top: 6px;
  }

  .clock {
    font-size: clamp(14px, 2vw, 18px);
    letter-spacing: .08em; opacity: .75;
    font-variant-numeric: tabular-nums;
  }
  .fs-btn {
    width: 42px; height: 42px; border-radius: 12px;
    background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1);
    color: #e7e9ee; font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    transition: opacity .5s ease;
  }
  .fs-btn.hidden-auto { opacity: 0; pointer-events: none; }
  .fs-btn:active { background: rgba(255,255,255,.14); }
  body.is-fs .fs-btn { display: none !important; }

  @media (max-width: 560px) {
    #kiosk-home header { padding: 18px 16px 12px; }
    #plaza-title { font-size: clamp(24px, 7vw, 34px); letter-spacing: .02em; }
    #plaza-sub { font-size: 11px; letter-spacing: .01em; }
  }

  /* ==========================
     유튜브식 브랜드 카드 (썸네일 + 제목만)
  ========================== */
  #brand-grid {
    flex: 1; min-height: 0; overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 24px 28px 20px;
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 22px;
    align-content: start;
    min-height: 0;          /* flexbox shrink 허용 */
  }
  @media (max-width: 1280px) { #brand-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 18px; } }
  @media (max-width: 820px)  { #brand-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; padding: 18px; } }
  @media (max-width: 480px)  { #brand-grid { grid-template-columns: minmax(0, 1fr); gap: 16px; padding: 14px; } }

  .brand-card {
    position: relative;
    border-radius: 16px; overflow: hidden;
    background: #14171f;
    border: 1px solid rgba(255,255,255,.06);
    width: 100%;
    min-width: 0;
    /* padding-top으로 16:9 비율 높이를 강제 — absolute 자식이 있어도 절대 겹치지 않음 */
    height: 0;
    padding-top: 56.25%;
    transition: transform .15s ease, border-color .15s ease;
  }
  .brand-card:active { transform: scale(.97); }
  .brand-card:hover { border-color: rgba(165,180,252,.45); }

  .brand-card .thumb {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    padding: 0;
    background: #fff;
  }
  .brand-card .no-thumb {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    padding: 28px;
    text-align: center;
    font-size: clamp(30px, 8vw, 72px); font-weight: 800; letter-spacing: .04em;
    background: linear-gradient(135deg, #2b304a, #1a1e30);
    color: #c7d2fe;
  }
  .brand-card .no-thumb.logo-text {
    background: #fff;
    color: #111;
    font-size: clamp(24px, 6vw, 52px);
    line-height: 1.05;
    word-break: keep-all;
  }
  .brand-card .title-overlay {
    position: absolute; left: 0; right: 0; bottom: 0;
    padding: 14px 16px;
    background: rgba(0,0,0,.30);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    color: #fff;
  }
  .brand-card .title-overlay .t-name {
    font-size: clamp(15px, 2vw, 20px);
    font-weight: 600;
    letter-spacing: .02em;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  /* 종료 제스처용 투명 코너 */
  .corner { position: fixed; width: 90px; height: 90px; z-index: 50; background: transparent; }
  .corner.tl { top: 0; left: 0; } .corner.tr { top: 0; right: 0; }
  .corner.br { bottom: env(safe-area-inset-bottom, 0); right: 0; }
  .corner.bl { bottom: env(safe-area-inset-bottom, 0); left: 0; }

  /* 홈 하단 안내 */
  .home-footer {
    flex-shrink: 0;
    text-align: center;
    padding: 8px 20px;
    padding-bottom: var(--sab, 8px);
    background: rgba(0,0,0,.25);
    border-top: 1px solid rgba(255,255,255,.05);
    font-size: clamp(12px, 1.6vw, 14px);
    opacity: .85;
  }
  .home-footer strong { color: #c7d2fe; font-weight: 600; }

  /* ==========================
     브랜드 상세 팝업 (블로그 뷰)
  ========================== */
  #brand-modal {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(5, 7, 12, .82);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    animation: fade .25s ease;
  }
  @keyframes fade { from { opacity: 0 } to { opacity: 1 } }
  .modal-card {
    width: min(960px, 100%); height: min(92vh, 1100px);
    background: #15171f; border: 1px solid rgba(255,255,255,.08);
    border-radius: 22px; overflow: hidden;
    display: flex; flex-direction: column;
    box-shadow: 0 30px 80px rgba(0,0,0,.6);
  }
  @media (max-width: 600px) {
    #brand-modal { padding: 0; align-items: stretch; }
    .modal-card {
      width: 100%;
      height: 100dvh;
      height: -webkit-fill-available;
      border-radius: 0;
    }
  }
  .modal-head {
    padding: 16px 20px;
    padding-top: max(16px, env(safe-area-inset-top, 16px));
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px;
    border-bottom: 1px solid rgba(255,255,255,.06);
    background: linear-gradient(180deg, rgba(255,255,255,.04), transparent);
    flex-shrink: 0;
  }
  .modal-head .title-wrap { display: flex; align-items: center; gap: 12px; min-width: 0; }
  .modal-head .logo-sm {
    width: 44px; height: 44px; border-radius: 10px; background: #fff;
    overflow: hidden; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    color: #111; font-weight: 800;
  }
  .modal-head .logo-sm img { width: 100%; height: 100%; object-fit: cover; padding: 0; }
  .modal-head h2 {
    margin: 0; font-size: clamp(16px, 2.5vw, 22px); letter-spacing: .04em;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .modal-head .cat { font-size: 11px; opacity: .55; letter-spacing: .18em; text-transform: uppercase; }
  .close-btn {
    background: rgba(255,255,255,.08); color: #fff;
    border: 1px solid rgba(255,255,255,.1);
    width: 44px; height: 44px; border-radius: 12px;
    font-size: 22px; font-weight: 300; flex-shrink: 0;
  }
  .close-btn:active { background: rgba(255,255,255,.16); }

  .modal-body {
    overflow-y: auto; padding: 24px 28px 40px;
    line-height: 1.7;
    user-select: text; -webkit-user-select: text;
  }
  @media (max-width: 600px) { .modal-body { padding: 18px 18px 32px; } }

  .post-content { font-size: clamp(15px, 1.7vw, 17px); color: #e7e9ee; }
  .post-content h1 { font-size: 1.7em; margin: 1em 0 .5em; }
  .post-content h2 { font-size: 1.45em; margin: 1em 0 .5em; }
  .post-content h3 { font-size: 1.2em; margin: .9em 0 .4em; }
  .post-content p  { margin: 0 0 .9em; }
  .post-content ul, .post-content ol { padding-left: 1.4em; margin: 0 0 .9em; }
  .post-content blockquote {
    border-left: 3px solid #6366f1; padding: .3em 1em; margin: 1em 0;
    opacity: .85; background: rgba(99,102,241,.08); border-radius: 0 8px 8px 0;
  }
  .post-content a { color: #a5b4fc; text-decoration: underline; }
  /* 첨부 미디어: 실제 비율, 모서리 라운드 */
  .post-content img,
  .post-content video {
    width: min(100%, 560px);
    max-width: 100%;
    height: auto;
    border-radius: 14px;
    margin: 16px 0;
    display: block;
    background: #000;
    box-shadow: 0 8px 24px rgba(0,0,0,.35);
  }
  /* 기본은 중앙 정렬 (인라인 style이 있으면 그걸 우선 적용) */
  .post-content p > img,
  .post-content p > video {
    margin-left: auto; margin-right: auto;
  }
  .post-content img[style],
  .post-content video[style] {
    width: min(100%, 560px) !important;
  }
  .post-content .media-caption {
    text-align: center; font-size: 13px; opacity: .55; margin: -8px 0 16px;
  }
  .content-logo-fallback {
    width: min(100%, 560px);
    min-height: 180px;
    margin: 16px auto;
    border-radius: 14px;
    background: #fff;
    color: #111;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 28px;
    text-align: center;
    font-size: clamp(28px, 7vw, 58px);
    font-weight: 800;
    line-height: 1.05;
    box-shadow: 0 8px 24px rgba(0,0,0,.35);
  }
  .post-content hr { border: none; border-top: 1px solid rgba(255,255,255,.1); margin: 1.5em 0; }

  .close-big {
    margin: 28px auto 10px; display: block;
    padding: 14px 36px; font-size: 15px; font-weight: 600;
    background: #6366f1; color: #fff; border: none; border-radius: 12px;
    letter-spacing: .08em;
  }
  .close-big:active { background: #4f46e5; }

  /* ==========================
     관리자 로그인 / 패널
  ========================== */
  #admin-login, #admin-panel, #admin-editor-view {
    position: fixed; inset: 0; z-index: 200;
    background: #0b0d12;
    display: flex; flex-direction: column;
    user-select: text; -webkit-user-select: text;
  }
  #admin-login .admin-header,
  #admin-panel .admin-header,
  #admin-editor-view .admin-header {
    padding-top: 16px;
  }
  .admin-header {
    padding: 14px 20px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px;
    border-bottom: 1px solid rgba(255,255,255,.08);
    background: #0f1117; flex-shrink: 0;
  }
  .admin-header h2 { margin: 0; font-size: 16px; letter-spacing: .08em; }
  .admin-header .actions { display: flex; gap: 6px; flex-wrap: wrap; }

  .login-box {
    margin: auto; width: min(380px, 92vw);
    padding: 26px; background: #15171f; border-radius: 18px;
    border: 1px solid rgba(255,255,255,.08);
  }
  .login-box h3 { margin: 0 0 14px; font-size: 18px; }
  .login-box input {
    width: 100%; padding: 14px 16px; border-radius: 10px;
    background: #0b0d12; border: 1px solid rgba(255,255,255,.12);
    color: #fff; font-size: 16px;
  }
  .login-box .err { color: #f87171; font-size: 13px; min-height: 18px; margin-top: 8px; }
  .login-box button {
    width: 100%; margin-top: 10px; padding: 14px;
    background: #6366f1; border: none; border-radius: 10px; color: #fff; font-weight: 600;
  }

  .admin-body {
    flex: 1; overflow-y: scroll; padding: 16px;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior: contain;
    touch-action: pan-y pinch-zoom;
  }
  /* 관리자 보드 그리드 스크롤 - 터치 영역 전체 */
  .admin-board-grid {
    pointer-events: auto;
  }

  /* 보드 그리드 */
  .admin-board-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 12px;
    margin-bottom: 16px;
  }
  .admin-board-card {
    position: relative;
    background: #15171f;
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 14px;
    overflow: visible;
    aspect-ratio: 3/4;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
    touch-action: pan-y;
    transition: transform .15s;
  }
  .admin-board-card.edit-mode {
    touch-action: none;
  }
  .admin-board-card .card-inner {
    width: 100%; height: 100%;
    border-radius: 14px;
    overflow: hidden;
  }
  .admin-board-card:active { transform: scale(.97); }
  .admin-board-card .card-thumb {
    width: 100%; height: 65%;
    object-fit: cover; display: block;
    background: #fff;
  }
  .admin-board-card .card-thumb-placeholder {
    width: 100%; height: 65%;
    background: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px; font-weight: 700; color: #111;
  }
  .admin-board-card .card-info {
    padding: 8px 10px;
  }
  .admin-board-card .card-name {
    font-size: 13px; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .admin-board-card .card-cat {
    font-size: 11px; opacity: .5; margin-top: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  /* 편집 모드 */
  .admin-board-card.edit-mode {
    animation: wiggle .4s infinite alternate;
  }
  .admin-board-card.dragging-over {
    border: 2px solid #6366f1;
    box-shadow: 0 0 0 3px rgba(99,102,241,.4);
  }
  @keyframes wiggle {
    from { transform: rotate(-1.5deg); }
    to   { transform: rotate(1.5deg); }
  }
  /* 텍스트/이미지 선택 방지 */
  .admin-board-grid * {
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
  }
  .card-delete-btn, .card-edit-btn {
    display: none;
    position: absolute;
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 2px solid #fff;
    color: #fff; font-size: 13px; font-weight: 700;
    align-items: center; justify-content: center;
    z-index: 10; cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,.5);
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .card-delete-btn {
    top: -8px; left: -8px;
    background: #ef4444;
  }
  .card-edit-btn {
    top: -8px; right: -8px;
    background: #6366f1;
    font-size: 12px;
  }
  .edit-mode .card-delete-btn,
  .edit-mode .card-edit-btn { display: flex; }

  /* 컨텍스트 메뉴 */
  #board-context-menu {
    position: fixed; inset: 0; z-index: 500;
  }
  .context-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.5);
  }
  .context-card {
    position: fixed; left: 50%;
    bottom: max(20px, env(safe-area-inset-bottom, 20px));
    transform: translateX(-50%);
    width: min(320px, 92vw);
    background: #1e2030; border-radius: 18px;
    border: 1px solid rgba(255,255,255,.1);
    overflow: hidden; z-index: 501;
    animation: slideUp .2s ease;
  }
  @keyframes slideUp { from { transform: translateX(-50%) translateY(30px); opacity: 0; } to { transform: translateX(-50%) translateY(0); opacity: 1; } }
  .context-brand-name {
    padding: 14px 20px 10px;
    font-size: 13px; font-weight: 700; opacity: .5;
    text-transform: uppercase; letter-spacing: .08em;
    border-bottom: 1px solid rgba(255,255,255,.06);
  }
  .context-card button {
    display: block; width: 100%;
    padding: 16px 20px; text-align: left;
    background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,.04);
    color: #e7e9ee; font-size: 16px; font-family: inherit;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
  }
  .context-card button:active { background: rgba(255,255,255,.06); }
  .context-card button.danger { color: #f87171; }
  .context-card button.cancel { color: #a5b4fc; font-weight: 600; border-bottom: none; }

  /* 이동 모드 드래그 힌트 */
  .move-hint {
    text-align: center; padding: 10px;
    font-size: 13px; opacity: .5;
    display: none;
  }
  .move-hint.visible { display: block; }
  .admin-grid {
    display: grid; grid-template-columns: 320px 1fr; gap: 20px;
  }
  @media (max-width: 900px) { .admin-grid { grid-template-columns: 1fr; } }
  /* 모바일 어드민 버튼 최적화 */
  @media (max-width: 768px) {
    .admin-header { flex-wrap: wrap; padding: 10px 14px; gap: 8px; }
    .admin-header h2 { font-size: 14px; }
    .admin-header .actions { width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .admin-header .actions button { min-height: 44px; padding: 8px 10px; font-size: 13px; width: 100%; }
    .editor-actions { gap: 10px; }
    .editor-actions .btn { min-height: 48px; font-size: 16px; flex: 1; text-align: center; }
    .brand-list li { min-height: 52px; padding: 12px; }
    .add-btn { min-height: 52px !important; font-size: 16px !important; }
    .editor .row { grid-template-columns: 1fr; gap: 6px; }
    .editor input[type="text"], .editor select { min-height: 48px; font-size: 16px; padding: 12px; }
    .login-box input { min-height: 52px; font-size: 18px; }
    .login-box button { min-height: 52px; font-size: 18px; }
    .admin-body { padding: 12px; }
  }

  .brand-list {
    background: #15171f; border: 1px solid rgba(255,255,255,.08);
    border-radius: 14px; padding: 14px; height: fit-content;
  }
  .brand-list h4 {
    margin: 0 0 10px; font-size: 12px; opacity: .6;
    letter-spacing: .12em; text-transform: uppercase;
  }
  .brand-list ul { list-style: none; padding: 0; margin: 0; }
  .brand-list li {
    display: flex; align-items: center; gap: 10px;
    padding: 10px; border-radius: 10px;
    border: 1px solid rgba(255,255,255,.06);
    margin-bottom: 8px; background: #0f1117;
    cursor: grab;
  }
  .brand-list li.dragging { opacity: .4; }
  .brand-list li.selected { border-color: #6366f1; background: #1a1d28; }
  .brand-list li .logo-xs {
    width: 32px; height: 32px; border-radius: 6px; background: #fff;
    overflow: hidden; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    color: #111; font-weight: 700; font-size: 12px;
  }
  .brand-list li .logo-xs img { width: 100%; height: 100%; object-fit: contain; padding: 2px; }

<script>

const firebaseConfig = {
  apiKey: "AIzaSyCyiK0cunm9T11sLc2E0trgE-q1RxomhV8",
  authDomain: "grace-aea60.firebaseapp.com",
  projectId: "grace-aea60",
  storageBucket: "grace-aea60.firebasestorage.app",
  messagingSenderId: "990582075084",
  appId: "1:990582075084:web:0a9d55fa409c70c9a19c69"
};

firebase.initializeApp(firebaseConfig);
const _fbDb = firebase.firestore();
const BRANDS_DOC = _fbDb.collection('kiosk').doc('brands');

const DB = {
  SETTINGS_KEY: 'brand_kiosk_settings_v1',
  DEFAULT_SETTINGS: {
    password: 'admin1234',
    title: '셀렉상회 큐레이션',
    subtitle: '궁금한 브랜드, 스타일링 등 확인해보세요!'
  },

  async load() {
    try {
      const snap = await BRANDS_DOC.get();
      if (snap.exists && snap.data().list && snap.data().list.length) {
        const merged = mergeBrandCatalog(snap.data().list);
        if (merged.changed) await this.save(merged.list);
        return merged.list;
      }
      const seed = this._seedData();
      await this.save(seed);
      return seed;
    } catch (e) {
      console.error('[DB.load] Firebase 실패:', e);
      return this._seedData();
    }
  },
  async save(data) {
    try {
      await BRANDS_DOC.set({ list: data });
      if (window._bc) try { window._bc.postMessage({ type: 'brands-updated' }); } catch {}
      return true;
    } catch (e) {
      console.error('[DB.save] Firebase 실패:', e);
      return false;
    }
  },
  listenBrands(callback) {
    return BRANDS_DOC.onSnapshot((snap) => {
      if (snap.exists && snap.data().list) callback(snap.data().list);
    });
  },
  loadSettings() {
    const raw = localStorage.getItem(this.SETTINGS_KEY);
    if (!raw) return Object.assign({}, this.DEFAULT_SETTINGS);
    try {
      const saved = Object.assign({}, this.DEFAULT_SETTINGS, JSON.parse(raw));
      if (['BRAND CURATION', 'BRAND PLAZA', '브랜드 큐레이션'].includes(saved.title)) {
        saved.title = this.DEFAULT_SETTINGS.title;
      }
      if (['LEVEL 3 · FASHION & LIFESTYLE', '셀렉상회 브랜드 큐레이션'].includes(saved.subtitle)) {
        saved.subtitle = this.DEFAULT_SETTINGS.subtitle;
      }
      localStorage.setItem(this.SETTINGS_KEY, JSON.stringify(saved));
      return saved;
    } catch { return Object.assign({}, this.DEFAULT_SETTINGS); }
  },
  saveSettings(s) { localStorage.setItem(this.SETTINGS_KEY, JSON.stringify(s)); },

  _seedData() {
    return DEFAULT_BRAND_CONTENT.map(copyCatalogBrand);
  }
};

function uid() { return 'b_' + Math.random().toString(36).slice(2, 10); }
const DEFAULT_BRAND_CONTENT = [
  { id: 'brand_nike', aliases: ['nike', '나이키'], name: 'NIKE | 나이키', category: 'Sportswear', logo: '', thumbnail: '',
    contentVersion: 3, contentHtml: `<h2>NIKE | 나이키</h2><h3>1. 브랜드 히스토리</h3><p>나이키는 운동선수의 움직임을 더 좋게 만들겠다는 목표에서 성장한 글로벌 스포츠 브랜드입니다. 러닝화에서 시작해 농구, 축구, 트레이닝, 라이프스타일까지 영역을 넓혔고, 스우시 로고는 지금도 도전과 에너지를 상징합니다.</p><p>나이키의 가치는 단순히 로고가 유명하다는 데 있지 않습니다. 기능적인 소재, 활동성을 고려한 실루엣, 그리고 스포츠가 가진 긍정적인 태도를 일상복으로 가져오는 힘이 핵심입니다. 그래서 나이키는 운동할 때뿐 아니라 평소 옷차림에서도 자연스럽게 활력을 만들어 줍니다.</p><blockquote>나이키를 고른다는 것은 편하게 움직이면서도 스포티한 자신감을 더하는 선택입니다.</blockquote><h3>2. 브랜드 스타일링 코디 추천</h3><ul><li><b>데일리 스포티 룩</b> 로고 티셔츠에 조거 팬츠, 에어 포스나 에어 맥스 계열 스니커즈를 매치하면 가장 안정적인 나이키 스타일이 됩니다.</li><li><b>스트리트 캐주얼 룩</b> 오버핏 후디나 바람막이에 와이드 팬츠를 입고, 신발은 볼륨감 있는 스니커즈로 중심을 잡아 주세요.</li><li><b>깔끔한 원포인트 룩</b> 전체 컬러를 블랙, 화이트, 그레이로 맞춘 뒤 스우시 로고가 보이는 아이템 하나만 넣으면 과하지 않게 브랜드 감도가 살아납니다.</li></ul><p><b>셀렉상회 추천</b> 처음 나이키를 구매한다면 신발이나 후디처럼 활용도가 높은 아이템부터 고르면 좋습니다. 이미 스니커즈가 있다면 상의나 팬츠를 같은 무드로 맞춰 완성도를 높여보세요.</p>` },
  { id: 'brand_adidas', aliases: ['adidas', '아디다스', '아디아드'], name: 'ADIDAS | 아디다스', category: 'Sportswear', logo: '', thumbnail: '',
    contentVersion: 3, contentHtml: `<h2>ADIDAS | 아디다스</h2><h3>1. 브랜드 히스토리</h3><p>아디다스는 스포츠 퍼포먼스와 클래식 라이프스타일을 함께 쌓아온 브랜드입니다. 세 줄 스트라이프와 트레포일 로고는 축구, 러닝, 테니스, 트레이닝 문화 속에서 오랫동안 사랑받아 왔습니다.</p><p>아디다스의 매력은 오래된 스포츠 아이템이 지금의 일상복으로도 자연스럽게 이어진다는 점입니다. 삼바, 가젤, 슈퍼스타 같은 스니커즈는 유행을 타기보다 시대마다 다른 방식으로 다시 해석되는 클래식에 가깝습니다.</p><blockquote>아디다스는 스포티하지만 차분하고, 캐주얼하지만 클래식한 균형을 가진 브랜드입니다.</blockquote><h3>2. 브랜드 스타일링 코디 추천</h3><ul><li><b>레트로 스포츠 룩</b> 트랙탑에 와이드 데님 또는 트랙 팬츠를 매치하면 아디다스 특유의 빈티지 스포츠 감성이 잘 살아납니다.</li><li><b>스니커즈 중심 룩</b> 삼바나 가젤처럼 낮고 슬림한 신발은 슬랙스, 데님, 치노 팬츠 모두와 잘 어울립니다.</li><li><b>컬러 포인트 룩</b> 네이비, 그린, 버건디 계열 상의에 화이트 스니커즈를 더하면 과하지 않은 포인트 스타일을 만들 수 있습니다.</li></ul><p><b>셀렉상회 추천</b> 아디다스는 첫 구매 아이템으로 스니커즈가 좋습니다. 이후 트랙 재킷이나 로고 티셔츠를 더하면 브랜드 분위기를 자연스럽게 확장할 수 있습니다.</p>` },
  { id: 'brand_champion', aliases: ['champion', '챔피온'], name: 'CHAMPION | 챔피온', category: 'Casual', logo: '', thumbnail: '',
    contentVersion: 3, contentHtml: `<h2>CHAMPION | 챔피온</h2><h3>1. 브랜드 히스토리</h3><p>챔피온은 미국 스포츠웨어와 스웨트셔츠 문화를 대표하는 브랜드입니다. 특히 리버스 위브로 알려진 탄탄한 스웨트 아이템은 형태가 쉽게 무너지지 않고 오래 입기 좋아 많은 사람들에게 기본 아이템으로 자리 잡았습니다.</p><p>챔피온의 가치는 편안함과 실용성입니다. 화려하게 꾸미기보다 좋은 맨투맨, 후디, 조거 팬츠처럼 일상에서 자주 손이 가는 옷을 만드는 데 강점이 있습니다. 작은 C 로고는 부담스럽지 않으면서도 브랜드의 클래식한 분위기를 보여줍니다.</p><blockquote>챔피온은 매일 입는 기본 옷을 조금 더 탄탄하고 오래 입고 싶은 사람에게 잘 맞습니다.</blockquote><h3>2. 브랜드 스타일링 코디 추천</h3><ul><li><b>캠퍼스 캐주얼 룩</b> 오트밀 또는 그레이 맨투맨에 데님 팬츠, 스니커즈를 매치하면 편하면서도 단정한 분위기가 납니다.</li><li><b>원마일웨어 룩</b> 후디와 조거 팬츠를 같은 톤으로 맞추면 집 앞 외출부터 가벼운 약속까지 가능한 셋업 느낌을 만들 수 있습니다.</li><li><b>레이어드 룩</b> 맨투맨 안에 흰 티셔츠를 살짝 보이게 입고, 아우터는 바시티 재킷이나 코치 재킷을 더하면 캐주얼한 완성도가 올라갑니다.</li></ul><p><b>셀렉상회 추천</b> 챔피온은 로고보다 핏과 원단감을 보고 고르면 만족도가 높습니다. 처음에는 그레이, 네이비, 블랙처럼 오래 입기 쉬운 컬러를 추천합니다.</p>` },
  { id: 'brand_puma', aliases: ['puma', '푸마'], name: 'PUMA | 푸마', category: 'Sportswear', logo: '', thumbnail: '',
    contentVersion: 3, contentHtml: `<h2>PUMA | 푸마</h2><h3>1. 브랜드 히스토리</h3><p>푸마는 스피드, 움직임, 경쟁의 이미지를 바탕으로 성장한 스포츠 브랜드입니다. 축구, 육상, 모터스포츠 등 역동적인 분야에서 브랜드 정체성을 쌓았고, 지금은 스니커즈와 라이프스타일 웨어에서도 강한 존재감을 보여줍니다.</p><p>푸마의 장점은 날렵한 실루엣과 경쾌한 컬러감입니다. 다른 스포츠 브랜드보다 조금 더 가볍고 슬림한 느낌을 주는 아이템이 많아, 캐주얼하면서도 둔해 보이지 않는 스타일을 만들기 좋습니다.</p><blockquote>푸마는 스포티한 옷차림에 빠른 리듬과 산뜻한 포인트를 더해주는 브랜드입니다.</blockquote><h3>2. 브랜드 스타일링 코디 추천</h3><ul><li><b>컬러 스니커즈 룩</b> 푸마 스웨이드나 팔레르모처럼 컬러감 있는 신발은 흰 티셔츠와 데님만 입어도 충분한 포인트가 됩니다.</li><li><b>스포티 믹스 룩</b> 로고 티셔츠에 나일론 팬츠나 트랙 팬츠를 매치하면 가볍고 활동적인 인상이 살아납니다.</li><li><b>깔끔한 캐주얼 룩</b> 상의는 무채색으로 정리하고 신발에만 레드, 그린, 블루 포인트를 주면 부담 없이 푸마의 느낌을 즐길 수 있습니다.</li></ul><p><b>셀렉상회 추천</b> 푸마는 신발에서 시작하면 코디가 쉽습니다. 이미 기본 스니커즈가 많다면 컬러 있는 푸마 제품으로 스타일에 변화를 줘보세요.</p>` },
  { id: 'brand_carhartt', aliases: ['carhartt', '칼하트'], name: 'CARHARTT | 칼하트', category: 'Workwear', logo: '', thumbnail: '',
    contentVersion: 3, contentHtml: `<h2>CARHARTT | 칼하트</h2><h3>1. 브랜드 히스토리</h3><p>칼하트는 노동 현장에서 입는 튼튼한 워크웨어를 바탕으로 시작한 브랜드입니다. 두꺼운 캔버스 소재, 견고한 재킷, 실용적인 포켓과 넉넉한 핏이 브랜드의 핵심입니다.</p><p>칼하트의 가치는 멋을 위해 불편함을 감수하는 옷이 아니라, 실제로 오래 입을 수 있는 옷이라는 데 있습니다. 시간이 지나며 생기는 주름과 색 빠짐도 자연스러운 매력이 되어 빈티지, 스트리트, 아웃도어 스타일과 잘 어울립니다.</p><blockquote>칼하트는 튼튼함과 실용성이 그대로 스타일이 되는 브랜드입니다.</blockquote><h3>2. 브랜드 스타일링 코디 추천</h3><ul><li><b>워크웨어 기본 룩</b> 덕 재킷이나 초어 코트에 데님 팬츠, 부츠를 매치하면 칼하트다운 가장 정직한 스타일이 됩니다.</li><li><b>스트리트 레이어드 룩</b> 넉넉한 칼하트 아우터 안에 후디를 입고, 아래는 와이드 팬츠를 매치하면 현대적인 스트리트 감성이 살아납니다.</li><li><b>톤 다운 캐주얼 룩</b> 브라운, 카키, 블랙, 베이지 계열로 색을 맞추면 거친 소재감이 차분하게 정리됩니다.</li></ul><p><b>셀렉상회 추천</b> 칼하트는 아우터나 팬츠처럼 오래 입을 수 있는 큰 아이템을 먼저 고르는 것이 좋습니다. 입을수록 자연스럽게 몸에 맞아가는 느낌을 즐겨보세요.</p>` },
  { id: 'brand_stussy', aliases: ['stussy', '스투시'], name: 'STUSSY | 스투시', category: 'Streetwear', logo: '', thumbnail: '',
    contentVersion: 3, contentHtml: `<h2>STUSSY | 스투시</h2><h3>1. 브랜드 히스토리</h3><p>스투시는 서프 문화에서 시작해 스케이트, 힙합, 클럽 문화와 함께 성장한 스트리트웨어 브랜드입니다. 손글씨처럼 보이는 로고와 그래픽 중심의 디자인은 스투시를 단순한 옷 브랜드가 아니라 하나의 문화 코드로 만들었습니다.</p><p>스투시의 가치는 힘을 많이 주지 않아도 멋이 난다는 점입니다. 여유로운 핏, 그래픽 티셔츠, 후디, 볼캡 같은 아이템으로 편안하지만 확실한 스트리트 무드를 만들 수 있습니다.</p><blockquote>스투시는 자유로운 분위기와 서브컬처 감도를 옷으로 표현하는 브랜드입니다.</blockquote><h3>2. 브랜드 스타일링 코디 추천</h3><ul><li><b>그래픽 티셔츠 룩</b> 스투시 로고 티셔츠에 와이드 데님이나 카고 팬츠를 매치하면 가장 쉽게 브랜드 분위기를 낼 수 있습니다.</li><li><b>릴랙스 스트리트 룩</b> 오버핏 후디에 반바지 또는 벌룬 팬츠를 더하고 볼캡을 쓰면 힘을 뺀 스트리트 스타일이 완성됩니다.</li><li><b>블랙 포인트 룩</b> 전체를 블랙이나 차콜로 맞추고 흰색 로고가 들어간 아이템을 선택하면 깔끔하면서도 존재감이 있습니다.</li></ul><p><b>셀렉상회 추천</b> 스투시는 로고 티셔츠나 후디처럼 한눈에 분위기가 보이는 아이템부터 추천합니다. 평소 옷이 심플하다면 스투시 그래픽이 좋은 포인트가 됩니다.</p>` },
  { id: 'brand_supreme', aliases: ['supreme', '슈프림'], name: 'SUPREME | 슈프림', category: 'Streetwear', logo: '', thumbnail: '',
    contentVersion: 3, contentHtml: `<h2>SUPREME | 슈프림</h2><h3>1. 브랜드 히스토리</h3><p>슈프림은 뉴욕 스케이트 문화에서 출발해 스트리트 패션을 대표하는 브랜드로 성장했습니다. 시즌마다 한정 수량으로 제품을 선보이는 드롭 방식과 강한 로고 아이덴티티, 다양한 협업으로 브랜드 자체가 하나의 문화 현상이 되었습니다.</p><p>슈프림의 가치는 희소성과 메시지입니다. 단순한 로고 티셔츠라도 어떤 시즌, 어떤 그래픽, 어떤 협업인지에 따라 이야기가 달라집니다. 그래서 슈프림은 옷을 입는 동시에 취향과 관심사를 보여주는 브랜드에 가깝습니다.</p><blockquote>슈프림은 한 가지 아이템만으로도 스타일의 중심을 만들 수 있는 브랜드입니다.</blockquote><h3>2. 브랜드 스타일링 코디 추천</h3><ul><li><b>로고 원포인트 룩</b> 박스 로고나 그래픽 티셔츠를 중심으로 두고 팬츠와 신발은 단순하게 맞추면 브랜드 존재감이 가장 잘 살아납니다.</li><li><b>스케이트 스트리트 룩</b> 후디, 루즈한 데님, 캡, 스니커즈를 함께 매치하면 슈프림의 출발점인 스케이트 무드와 잘 맞습니다.</li><li><b>소장 아이템 중심 룩</b> 강한 그래픽이나 협업 제품을 입을 때는 다른 아이템을 과하게 꾸미지 않는 것이 좋습니다. 한 가지 포인트가 룩 전체를 이끌게 해보세요.</li></ul><p><b>셀렉상회 추천</b> 슈프림은 디자인의 의미와 시즌성을 알고 고르면 더 재미있는 브랜드입니다. 마음에 드는 그래픽이나 로고 아이템을 중심으로 본인의 취향을 표현해보세요.</p>` }
];

    contentVersion: 1, contentHtml: `<h2>MUSINSA STANDARD | 무신사 스탠다드</h2><h3>1. 브랜드 히스토리</h3><p>무신사 스탠다드는 무신사가 전개하는 베이식 캐주얼 브랜드로, 한국 MZ 고객들이 일상에서 가장 쉽게 접근할 수 있는 기본 옷을 제안합니다. 티셔츠, 슬랙스, 데님, 니트, 아우터처럼 매일 입는 아이템을 합리적인 가격과 단정한 품질로 풀어내는 것이 강점입니다.</p><p>이 브랜드의 가치는 유행을 크게 타지 않는 기본기입니다. 과한 로고나 장식보다 핏, 컬러, 소재의 안정감을 중요하게 보기 때문에 처음 옷장을 정리하거나 기본템을 다시 맞추려는 고객에게 좋습니다.</p><blockquote>무신사 스탠다드는 '오늘 바로 입을 수 있는 깔끔한 기본 옷'을 찾는 고객에게 잘 맞습니다.</blockquote><h3>2. 브랜드 스타일링 코디 추천</h3><ul><li><b>깔끔한 데일리 룩</b> 화이트 티셔츠에 블랙 슬랙스, 미니멀 스니커즈를 매치하면 가장 안정적인 기본 코디가 됩니다.</li><li><b>출근/등교 룩</b> 니트나 셔츠에 와이드 슬랙스를 더하면 단정하면서도 답답하지 않은 스타일이 됩니다.</li><li><b>레이어드 기본 룩</b> 무지 티셔츠, 셔츠, 가디건을 톤온톤으로 쌓으면 누구나 입기 쉬운 깨끗한 인상이 만들어집니다.</li></ul><p><b>셀렉상회 추천</b> 처음 방문한 고객에게는 무채색 티셔츠, 슬랙스, 니트처럼 활용도 높은 아이템을 추천하기 좋습니다.</p>` },
  { id: 'brand_matin_kim', aliases: ['matin kim', '마뗑킴', '마틴킴'], name: 'MATIN KIM | 마뗑킴', category: 'Contemporary', logo: '', thumbnail: '',
    contentVersion: 1, contentHtml: `<h2>MATIN KIM | 마뗑킴</h2><h3>1. 브랜드 히스토리</h3><p>마뗑킴은 서울의 젊은 감도를 대표하는 컨템포러리 브랜드로, 로고 플레이와 가방, 지갑, 티셔츠, 아우터 등 일상 아이템을 트렌디하게 풀어내며 빠르게 인지도를 높였습니다.</p><p>마뗑킴의 매력은 평범한 캐주얼에 도시적인 포인트를 더하는 방식입니다. 과하게 꾸민 느낌보다 무심하게 멋을 낸 듯한 분위기가 강하고, 작은 로고나 메탈 디테일이 룩의 초점을 만들어 줍니다.</p><blockquote>마뗑킴은 심플한 옷차림에 '요즘 서울 감도'를 더하고 싶은 고객에게 어울립니다.</blockquote><h3>2. 브랜드 스타일링 코디 추천</h3><ul><li><b>도시 캐주얼 룩</b> 로고 티셔츠에 와이드 데님, 숄더백을 매치하면 가장 쉬운 마뗑킴 스타일이 됩니다.</li><li><b>꾸안꾸 외출 룩</b> 크롭 니트나 셔츠에 슬랙스, 미니백을 더하면 부담스럽지 않은 트렌디함이 살아납니다.</li><li><b>포인트 액세서리 룩</b> 옷은 심플하게 입고 가방이나 지갑 같은 아이템으로 브랜드 감도를 보여주는 방식도 좋습니다.</li></ul><p><b>셀렉상회 추천</b> 평소 옷이 단순한 고객에게는 로고 티셔츠나 가방처럼 포인트가 확실한 아이템부터 추천해보세요.</p>` },
  { id: 'brand_mardi_mercredi', aliases: ['mardi mercredi', '마르디 메크르디', '마르디'], name: 'MARDI MERCREDI | 마르디 메크르디', category: 'Casual Chic', logo: '', thumbnail: '',
    contentVersion: 1, contentHtml: `<h2>MARDI MERCREDI | 마르디 메크르디</h2><h3>1. 브랜드 히스토리</h3><p>마르디 메크르디는 플라워 그래픽과 편안한 스웨트 아이템으로 많은 사랑을 받은 한국 캐주얼 브랜드입니다. 프렌치 무드와 한국적인 데일리 감성이 섞여 있어, 꾸민 듯하지만 과하지 않은 분위기를 만들기 좋습니다.</p><p>이 브랜드의 가치는 알아보기 쉬운 시그니처와 편안함입니다. 꽃 그래픽 스웨트셔츠, 티셔츠, 니트는 하나만 입어도 부드러운 포인트가 되고, 데님이나 스커트와도 쉽게 어울립니다.</p><blockquote>마르디 메크르디는 편안하지만 사랑스럽고, 캐주얼하지만 사진에 잘 남는 브랜드입니다.</blockquote><h3>2. 브랜드 스타일링 코디 추천</h3><ul><li><b>플라워 스웨트 룩</b> 시그니처 그래픽 스웨트셔츠에 연청 데님을 매치하면 가장 대표적인 마르디 스타일이 됩니다.</li><li><b>페미닌 캐주얼 룩</b> 로고 티셔츠에 롱스커트나 플랫슈즈를 더하면 부드럽고 여성스러운 데일리룩이 됩니다.</li><li><b>커플/친구 룩</b> 같은 그래픽을 컬러만 다르게 입으면 부담 없는 시밀러룩으로도 좋습니다.</li></ul><p><b>셀렉상회 추천</b> 선물용이나 첫 구매용으로는 브랜드가 한눈에 보이는 플라워 그래픽 제품이 좋습니다.</p>` },
  { id: 'brand_ader_error', aliases: ['ader error', '아더에러', '아더'], name: 'ADER ERROR | 아더에러', category: 'Concept Streetwear', logo: '', thumbnail: '',
    contentVersion: 1, contentHtml: `<h2>ADER ERROR | 아더에러</h2><h3>1. 브랜드 히스토리</h3><p>아더에러는 실험적인 그래픽, 오버사이즈 실루엣, 독특한 컬러 조합으로 한국 스트리트 패션을 세계에 알린 브랜드 중 하나입니다. 단순히 예쁜 옷보다 브랜드가 가진 콘셉트와 위트를 옷에 담는 방식이 특징입니다.</p><p>아더에러의 가치는 개성입니다. 일반적인 기본템도 비율, 봉제선, 로고 위치, 컬러를 다르게 해석해 입는 사람의 취향을 분명하게 보여줍니다.</p><blockquote>아더에러는 평범한 코디보다 '내가 좋아하는 감각'을 보여주고 싶은 고객에게 어울립니다.</blockquote><h3>2. 브랜드 스타일링 코디 추천</h3><ul><li><b>오버핏 스트리트 룩</b> 박시한 티셔츠나 후디에 와이드 팬츠를 매치하면 브랜드 특유의 실루엣이 살아납니다.</li><li><b>블루 포인트 룩</b> 아더에러의 대표적인 블루 계열 포인트를 모자, 가방, 그래픽으로 넣으면 확실한 인상이 납니다.</li><li><b>심플+한 점 포인트 룩</b> 전체는 블랙이나 그레이로 정리하고 아더에러 아이템 하나만 크게 보여주는 방식이 좋습니다.</li></ul><p><b>셀렉상회 추천</b> 개성을 좋아하는 고객에게는 로고 티셔츠, 후디, 액세서리처럼 브랜드 무드가 즉시 보이는 아이템을 추천하세요.</p>` },
  { id: 'brand_thisisneverthat', aliases: ['thisisneverthat', '디스이즈네버댓', '디네댓'], name: 'thisisneverthat | 디스이즈네버댓', category: 'Streetwear', logo: '', thumbnail: '',
    contentVersion: 1, contentHtml: `<h2>thisisneverthat | 디스이즈네버댓</h2><h3>1. 브랜드 히스토리</h3><p>디스이즈네버댓은 서울 스트리트웨어를 대표하는 브랜드로, 90년대 스포츠웨어와 스케이트, 아웃도어, 밀리터리 감성을 현대적으로 풀어냅니다. 편하게 입을 수 있지만 브랜드만의 무드가 분명해 국내외 스트리트 팬들에게 꾸준히 사랑받고 있습니다.</p><p>이 브랜드의 가치는 자연스러운 멋입니다. 화려하게 꾸미기보다 로고 후디, 그래픽 티셔츠, 나일론 아우터처럼 일상에서 쉽게 입을 수 있는 옷으로 스트리트 감도를 보여줍니다.</p><blockquote>디스이즈네버댓은 편한데 멋있고, 익숙한데 촌스럽지 않은 스트리트웨어입니다.</blockquote><h3>2. 브랜드 스타일링 코디 추천</h3><ul><li><b>서울 스트리트 룩</b> 로고 후디에 카고 팬츠, 볼캡을 매치하면 가장 자연스럽게 브랜드 무드가 납니다.</li><li><b>나일론 아웃도어 룩</b> 바람막이나 나일론 팬츠를 활용하면 가볍고 활동적인 느낌을 줄 수 있습니다.</li><li><b>데일리 그래픽 룩</b> 그래픽 티셔츠에 데님과 스니커즈를 더하면 누구나 입기 쉬운 스트리트 캐주얼이 됩니다.</li></ul><p><b>셀렉상회 추천</b> 스트리트 브랜드를 처음 접하는 고객에게도 후디나 티셔츠부터 쉽게 제안하기 좋은 브랜드입니다.</p>` },
  { id: 'brand_covernat', aliases: ['covernat', '커버낫'], name: 'COVERNAT | 커버낫', category: 'Heritage Casual', logo: '', thumbnail: '',
    contentVersion: 1, contentHtml: `<h2>COVERNAT | 커버낫</h2><h3>1. 브랜드 히스토리</h3><p>커버낫은 아메리칸 캐주얼과 밀리터리, 아웃도어 무드를 한국식 데일리웨어로 풀어낸 브랜드입니다. 티셔츠, 맨투맨, 셔츠, 아우터처럼 기본 아이템을 중심으로 전개하며 부담 없는 가격대와 높은 활용도로 인기가 있습니다.</p><p>커버낫의 가치는 실용적인 캐주얼입니다. 너무 튀지 않지만 옷의 형태와 소재감이 안정적이어서, 데일리로 자주 입기 좋은 옷을 찾는 고객에게 잘 맞습니다.</p><blockquote>커버낫은 옷장을 든든하게 채워주는 한국식 헤리티지 캐주얼입니다.</blockquote><h3>2. 브랜드 스타일링 코디 추천</h3><ul><li><b>베이식 캐주얼 룩</b> 로고 티셔츠에 치노 팬츠나 데님을 매치하면 깔끔한 데일리룩이 됩니다.</li><li><b>아메카지 무드</b> 셔츠, 카고 팬츠, 워크 재킷을 조합하면 커버낫의 헤리티지 감성이 잘 살아납니다.</li><li><b>간절기 아우터 룩</b> 바람막이, 코치 재킷, 셔츠 재킷을 티셔츠 위에 가볍게 걸치면 활용도가 높습니다.</li></ul><p><b>셀렉상회 추천</b> 매일 입을 옷을 찾는 고객에게는 로고 티셔츠와 아우터류를 먼저 보여주면 좋습니다.</p>` },
  { id: 'brand_nerdy', aliases: ['nerdy', '널디'], name: 'NERDY | 널디', category: 'Athleisure', logo: '', thumbnail: '',
    contentVersion: 1, contentHtml: `<h2>NERDY | 널디</h2><h3>1. 브랜드 히스토리</h3><p>널디는 트랙수트와 강한 컬러감으로 알려진 한국 애슬레저 브랜드입니다. 레트로 스포츠웨어를 바탕으로 보라색, 파스텔, 컬러 블록 같은 눈에 띄는 요소를 활용해 K-pop 스타일과도 잘 연결됩니다.</p><p>널디의 가치는 에너지와 개성입니다. 편하게 입는 트레이닝복도 컬러와 실루엣을 통해 스타일의 중심이 될 수 있다는 것을 보여줍니다.</p><blockquote>널디는 편안한 스포츠웨어에 밝은 개성을 더하고 싶은 고객에게 어울립니다.</blockquote><h3>2. 브랜드 스타일링 코디 추천</h3><ul><li><b>트랙수트 셋업 룩</b> 상하의를 세트로 맞추면 가장 쉽게 널디다운 에너지 있는 스타일을 만들 수 있습니다.</li><li><b>컬러 포인트 룩</b> 보라색이나 파스텔 톤 상의를 블랙 팬츠와 매치하면 부담을 줄이면서 포인트가 살아납니다.</li><li><b>캐주얼 믹스 룩</b> 트랙 재킷을 데님이나 스커트와 섞으면 운동복 느낌을 줄이고 데일리하게 입을 수 있습니다.</li></ul><p><b>셀렉상회 추천</b> 평소 무채색 옷이 많은 고객에게는 널디 아이템 하나로 분위기를 바꾸는 코디를 제안해보세요.</p>` },
  { id: 'brand_gentle_monster', aliases: ['gentle monster', '젠틀몬스터'], name: 'GENTLE MONSTER | 젠틀몬스터', category: 'Eyewear', logo: '', thumbnail: '',
    contentVersion: 1, contentHtml: `<h2>GENTLE MONSTER | 젠틀몬스터</h2><h3>1. 브랜드 히스토리</h3><p>젠틀몬스터는 한국을 대표하는 아이웨어 브랜드로, 안경과 선글라스를 단순한 액세서리가 아니라 공간, 전시, 패션 경험과 연결해 보여준 브랜드입니다. 독특한 매장 연출과 감각적인 프레임으로 국내외에서 강한 인지도를 얻었습니다.</p><p>젠틀몬스터의 가치는 얼굴의 분위기를 바꾸는 힘입니다. 옷차림이 단순해도 안경이나 선글라스 하나로 인상이 선명해지고, 룩 전체가 더 완성되어 보입니다.</p><blockquote>젠틀몬스터는 옷보다 작은 아이템으로 큰 변화를 만들고 싶은 고객에게 좋은 선택입니다.</blockquote><h3>2. 브랜드 스타일링 코디 추천</h3><ul><li><b>미니멀 시크 룩</b> 블랙 재킷이나 셔츠에 선글라스를 더하면 세련된 도시적인 분위기가 납니다.</li><li><b>데일리 포인트 룩</b> 심플한 티셔츠와 데님에도 안경 프레임 하나를 더하면 훨씬 정돈된 인상을 줄 수 있습니다.</li><li><b>여행/외출 룩</b> 볼드한 선글라스는 사진에 잘 남고, 평범한 코디를 스타일링한 것처럼 보이게 합니다.</li></ul><p><b>셀렉상회 추천</b> 옷은 이미 갖춰진 고객에게는 젠틀몬스터 같은 아이웨어를 스타일의 마무리로 제안해보세요.</p>` }
];

function copyCatalogBrand(b) {
  return { id: b.id || uid(), name: b.name, category: b.category || '', logo: b.logo || '', thumbnail: b.thumbnail || '', contentHtml: b.contentHtml || '', contentVersion: b.contentVersion || 1 };
}
function normalizeBrandName(name) {
  return String(name || '').toLowerCase().replace(/[^a-z0-9가-힣]/g, '');
}
function isEmptyContent(html) {
  return !String(html || '').trim() || /준비된 콘텐츠가 없습니다/.test(String(html));
}
function mergeBrandCatalog(list) {
  let changed = false;
  const out = Array.isArray(list) ? list.map(b => Object.assign({}, b)) : [];
  DEFAULT_BRAND_CONTENT.forEach(catalogBrand => {
    const keys = [catalogBrand.name, ...(catalogBrand.aliases || [])].map(normalizeBrandName);
    const existing = out.find(b => {
      const brandKey = normalizeBrandName(b.name);
      if (!brandKey) return false;
      return keys.some(key => brandKey.includes(key) || key.includes(brandKey));
    });
    if (existing) {
      const shouldUpgrade = existing.id === catalogBrand.id && (existing.contentVersion || 0) < (catalogBrand.contentVersion || 1);
      if (isEmptyContent(existing.contentHtml) || shouldUpgrade) {
        existing.contentHtml = catalogBrand.contentHtml;
        existing.contentVersion = catalogBrand.contentVersion || 1;
        changed = true;
      }
      if (catalogBrand.logo && existing.logo !== catalogBrand.logo) {
        existing.logo = catalogBrand.logo;
        changed = true;
      }
      if (!existing.category && catalogBrand.category) {
        existing.category = catalogBrand.category;
        changed = true;
      }
      return;
    }
    out.push(copyCatalogBrand(catalogBrand));
    changed = true;
  });
  return { list: out, changed };
}
function migrateBlocksToHtml(b) {
  if (b.contentHtml !== undefined) return b;
  let html = '';
  (b.blocks || []).forEach(bk => {
    if (bk.type === 'heading') html += `<h2>${esc(bk.value || '')}</h2>`;
    else if (bk.type === 'text') html += `<p>${esc(bk.value || '').replace(/\n/g,'<br>')}</p>`;
    else if (bk.type === 'image' && bk.src) html += `<p><img src="${bk.src}" alt=""></p>`;
    else if (bk.type === 'video' && bk.src) html += `<p><video src="${bk.src}" controls playsinline></video></p>`;
  });
  return { id: b.id, name: b.name, category: b.category || '', logo: b.logo || '', thumbnail: '', contentHtml: html };
}
function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function htmlToNode(html) {
  const wrap = document.createElement('div');
  wrap.innerHTML = html.trim();
  return wrap.firstElementChild;
}
function brandDisplayName(name) {
  return String(name || '?').split('|')[0].trim() || String(name || '?').trim();
}
function cardFallbackHtml(name) {
  return `<div class="no-thumb logo-text">${esc(brandDisplayName(name))}</div>`;
}
function isGeneratedLogoAsset(src) {
  return /^assets\/logos\/[^?#]+\.svg(?:\?[^#]*)?(?:#.*)?$/i.test(String(src || ''));
}
function manualThumbnailForBrand(b) {
  return b && b.thumbnail && !isGeneratedLogoAsset(b.thumbnail) ? b.thumbnail : '';
}
function thumbnailForBrand(b) {
  return manualThumbnailForBrand(b) || firstImageFromHtml(b?.contentHtml) || b?.logo || '';
}
function firstImageFromHtml(html) {
  if (!html) return '';
  const m = html.match(/<img[^>]+src="([^"]+)"/i);
  return m ? m[1] : '';
}

  const footer = document.querySelector('.home-footer');

    if (now - lastTs > 2000) taps = 0;

})();

function renderAdminBoardGrid() {
  const grid = document.getElementById('admin-board-grid');
  grid.innerHTML = '';

  brands.forEach((b) => {
    const card = document.createElement('div');
    card.className = 'admin-board-card' + (editMode ? ' edit-mode' : '');
    card.dataset.id = b.id;

    const initial = (b.name || '?').charAt(0).toUpperCase();
    const thumb = thumbnailForBrand(b);
    const thumbHtml = thumb
      ? `<img class="card-thumb" src="${esc(thumb)}">`
      : `<div class="card-thumb-placeholder">${esc(initial)}</div>`;

    card.innerHTML = `
      <button class="card-delete-btn" data-id="${b.id}">✕</button>
      <button class="card-edit-btn" data-id="${b.id}">✏</button>
      <div class="card-inner">
        ${thumbHtml}
        <div class="card-info">
          <div class="card-name">${esc(b.name || '(이름 없음)')}</div>
          <div class="card-cat">${esc(b.category || '')}</div>
        </div>
      </div>`;

    // 삭제 버튼
    const deleteHandler = async (e) => {
      e.stopPropagation(); e.preventDefault();
      const bid = e.currentTarget.dataset.id;
      const br = brands.find(x => x.id === bid);
      if (!confirm(`"${br?.name}" 보드를 삭제할까요?`)) return;
      const cloudUrls = extractCloudinaryUrls(br);
      brands = brands.filter(x => x.id !== bid);
      await DB.save(brands);
      renderAdminBoardGrid();
      toast('삭제했습니다');
      if (cloudUrls.length) showCloudinaryDeleteInfo(br.name, cloudUrls);
    };
    card.querySelector('.card-delete-btn').addEventListener('touchend', deleteHandler);
    card.querySelector('.card-delete-btn').addEventListener('click', deleteHandler);

    const editHandler = (e) => {
      e.stopPropagation(); e.preventDefault();
      openEditorForBrand(b.id);
    };
    card.querySelector('.card-edit-btn').addEventListener('touchend', editHandler);
    card.querySelector('.card-edit-btn').addEventListener('click', editHandler);

    // 길게 누르기 → 편집 모드 진입
    let pressTimer = null;
    let didLongPress = false;
    card.addEventListener('touchstart', (e) => {
      didLongPress = false;
      if (editMode) return;
      pressTimer = setTimeout(() => {
        pressTimer = null;
        didLongPress = true;
        enterEditMode();
      }, 600);
    }, { passive: true });

    card.addEventListener('touchend', (e) => {
      if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
      if (didLongPress) { didLongPress = false; return; }
      // 짧은 탭 — 편집 모드에서는 아무것도 안 함 (✏ 버튼으로만 에디터 진입)
    });

    card.addEventListener('touchmove', () => {
      if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
    });

    card.addEventListener('click', () => {
      if (editMode) {
        openEditorForBrand(b.id);
        return;
      }
      // 일반 모드: 한 번 탭 → 에디터
      openEditorForBrand(b.id);
    });

    // 드래그 — 터치(iOS/Android) + 마우스(Mac/Windows/iPad) 통합
    if (editMode) {
      // ── 마우스/트랙패드 드래그 ──
      card.draggable = true;
      card.addEventListener('dragstart', (e) => {
        dragSrcId = b.id;
        card.style.opacity = '.4';
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', b.id);
      });
      card.addEventListener('dragend', () => {
        card.style.opacity = '1';
        document.querySelectorAll('.admin-board-card').forEach(c => c.classList.remove('dragging-over'));
      });
      card.addEventListener('dragover', (e) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        if (b.id !== dragSrcId) card.classList.add('dragging-over');
      });
      card.addEventListener('dragleave', () => card.classList.remove('dragging-over'));
      card.addEventListener('drop', async (e) => {
        e.preventDefault();
        card.classList.remove('dragging-over');
        const fromId = e.dataTransfer.getData('text/plain');
        if (!fromId || fromId === b.id) return;
        const from = brands.findIndex(x => x.id === fromId);
        const to   = brands.findIndex(x => x.id === b.id);
        if (from < 0 || to < 0) return;
        const [moved] = brands.splice(from, 1);
        brands.splice(to, 0, moved);
        await DB.save(brands);
        renderAdminBoardGrid();
        toast('순서를 변경했습니다');
      });

      // ── 터치 드래그 (iOS / Android) ──
      card.addEventListener('touchstart', (e) => {
        touchDragId = b.id;
        card.style.opacity = '.5';
      }, { passive: true });

      card.addEventListener('touchmove', (e) => {
        if (!touchDragId || touchDragId !== b.id) return;
        e.preventDefault();
        const touch = e.touches[0];
        document.querySelectorAll('.admin-board-card').forEach(c => c.classList.remove('dragging-over'));
        const els = document.elementsFromPoint(touch.clientX, touch.clientY);
        const target = els.find(el => el.classList.contains('admin-board-card') && el.dataset.id && el.dataset.id !== touchDragId);
        if (target) target.classList.add('dragging-over');
      }, { passive: false });

      card.addEventListener('touchend', async (e) => {
        if (!touchDragId || touchDragId !== b.id) return;
        card.style.opacity = '1';
        const touch = e.changedTouches[0];
        document.querySelectorAll('.admin-board-card').forEach(c => c.classList.remove('dragging-over'));
        const els = document.elementsFromPoint(touch.clientX, touch.clientY);
        const target = els.find(el => el.classList.contains('admin-board-card') && el.dataset.id && el.dataset.id !== touchDragId);
        if (target) {
          const from = brands.findIndex(x => x.id === touchDragId);
          const to   = brands.findIndex(x => x.id === target.dataset.id);
          if (from >= 0 && to >= 0) {
            const [moved] = brands.splice(from, 1);
            brands.splice(to, 0, moved);
            await DB.save(brands);
            renderAdminBoardGrid();
            toast('순서를 변경했습니다');
          }
        }
        touchDragId = null;
      });
    }

    grid.appendChild(card);
  });
}

/* Cloudinary URL 추출 헬퍼 */
function extractCloudinaryUrls(b) {
  const urls = [];
  if (b.logo && b.logo.includes('cloudinary.com')) urls.push(b.logo);
  if (b.thumbnail && b.thumbnail.includes('cloudinary.com')) urls.push(b.thumbnail);
  // 본문에서 이미지/영상 URL 추출
  const parser = new DOMParser();
  const doc = parser.parseFromString(b.contentHtml || '', 'text/html');
  doc.querySelectorAll('img, video').forEach(el => {
    const src = el.src || el.getAttribute('src') || '';
    if (src.includes('cloudinary.com')) urls.push(src);
  });
  return [...new Set(urls)];
}

function showCloudinaryDeleteInfo(brandName, urls) {
  if (!urls.length) return;
  const list = urls.map(u => `• ${u}`).join('\n');
  alert(`"${brandName}" 보드의 Cloudinary 파일 목록:\n\n${list}\n\nCloudinary Media Library에서 위 파일들을 삭제하면 용량을 회수할 수 있어요.`);
}

async function deleteBrand() {

  if (!b) return;
  if (!confirm(`"${b.name}" 보드를 삭제할까요?`)) return;
  const cloudUrls = extractCloudinaryUrls(b);
  brands = brands.filter(x => x.id !== currentEditingId);
  currentEditingId = brands[0]?.id || null;
  await DB.save(brands);
  backToAdminList();
  toast('삭제했습니다');
  if (cloudUrls.length) showCloudinaryDeleteInfo(b.name, cloudUrls);
}

/* --- WYSIWYG 바인딩 --- */
function bindRichTextEditor(b) {
  const editor = document.getElementById('rte-editor');
  const toolbar = document.getElementById('rte-toolbar');

  toolbar.addEventListener('mousedown', e => {
    if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'SELECT') e.preventDefault();
  });

  toolbar.querySelectorAll('button[data-cmd]').forEach(btn => {
    btn.onclick = () => {
      editor.focus();
      document.execCommand(btn.dataset.cmd, false, null);
      syncContent(b);
    };
  });
  document.getElementById('rte-block').onchange = (e) => { editor.focus(); document.execCommand('formatBlock', false, e.target.value); syncContent(b); };
  document.getElementById('rte-font').onchange  = (e) => { editor.focus(); if (e.target.value) document.execCommand('fontName', false, e.target.value); syncContent(b); };
  document.getElementById('rte-size').onchange  = (e) => { editor.focus(); document.execCommand('fontSize', false, e.target.value); syncContent(b); };
  document.getElementById('rte-fg').oninput     = (e) => { editor.focus(); document.execCommand('foreColor', false, e.target.value); syncContent(b); };
  document.getElementById('rte-bg').oninput     = (e) => { editor.focus(); document.execCommand('hiliteColor', false, e.target.value); syncContent(b); };
  document.getElementById('rte-link').onclick   = () => {
    const url = prompt('링크 URL'); if (!url) return;
    editor.focus(); document.execCommand('createLink', false, url); syncContent(b);
  };
  document.getElementById('rte-hr').onclick = () => {
    editor.focus(); document.execCommand('insertHorizontalRule'); syncContent(b);
  };

  document.getElementById('rte-img').onchange = (e) => insertMediaFromFile(e, 'img', b);
  document.getElementById('rte-vid').onchange = (e) => insertMediaFromFile(e, 'video', b);

  // 미디어 선택
  editor.addEventListener('click', e => {
    const prev = editor.querySelector('.media-selected');
    if (prev) prev.classList.remove('media-selected');
    if (e.target.tagName === 'IMG' || e.target.tagName === 'VIDEO') {
      selectedMedia = e.target;
      e.target.classList.add('media-selected');
    } else {
      selectedMedia = null;
    }
  });

  // 이미지 좌/중/우 정렬
  document.getElementById('img-left').onclick   = () => alignMedia('left', b);
  document.getElementById('img-center').onclick = () => alignMedia('center', b);
  document.getElementById('img-right').onclick  = () => alignMedia('right', b);

  editor.addEventListener('input', () => syncContent(b));
  editor.addEventListener('blur',  () => syncContent(b));
  editor.addEventListener('paste', (e) => {
    const imageFiles = getClipboardImageFiles(e.clipboardData || window.clipboardData);
    if (imageFiles.length) {
      e.preventDefault();
      const selection = window.getSelection();
      const range = selection && selection.rangeCount ? selection.getRangeAt(0).cloneRange() : null;
      insertPastedImages(imageFiles, b, range);
      return;
    }
    e.preventDefault();
    const text = (e.clipboardData || window.clipboardData).getData('text/plain');
    document.execCommand('insertText', false, text);
  });
}

function getClipboardImageFiles(clipboardData) {
  if (!clipboardData) return [];
  const files = [];
  Array.from(clipboardData.items || []).forEach(item => {
    if (item.kind === 'file' && item.type.startsWith('image/')) {
      const file = item.getAsFile();
      if (file) files.push(file);
    }
  });
  Array.from(clipboardData.files || []).forEach(file => {
    if (file.type.startsWith('image/') && !files.includes(file)) files.push(file);
  });
  return files;
}

async function insertPastedImages(files, b, range) {
  for (const file of files) {
    await insertMediaFile(file, 'img', b, {
      range,
      label: `붙여넣은 이미지 업로드 중… ${(file.size/1024/1024).toFixed(1)}MB`
    });
  }
}

function alignMedia(which, b) {
  if (!selectedMedia) { toast('먼저 에디터 안의 이미지나 영상을 클릭한 뒤 정렬해 주세요'); return; }
  const el = selectedMedia;
  el.style.display = 'block';
  el.style.float = 'none';
  if (which === 'left') {
    el.style.marginLeft = '0';
    el.style.marginRight = 'auto';
  } else if (which === 'right') {
    el.style.marginLeft = 'auto';
    el.style.marginRight = '0';
  } else {
    el.style.marginLeft = 'auto';
    el.style.marginRight = 'auto';
  }
  syncContent(b);
}

/* 용량 제한 없이 업로드 — FileReader로 data URL 인코딩
   (IndexedDB는 용량 제한이 사실상 없음: 로컬 디스크 가용량 기반) */
/* Cloudinary 업로드 헬퍼 */
const CLOUDINARY_CLOUD = 'dqlyodqiw';
const CLOUDINARY_PRESET = 'nmhttl5r';

async function uploadToCloudinary(file) {
  const isVideo = file.type.startsWith('video/');
  const resourceType = isVideo ? 'video' : 'image';
  const fd = new FormData();
  fd.append('file', file);
  fd.append('upload_preset', CLOUDINARY_PRESET);
  if (isVideo) {
    // 영상 자동 압축 최적화
    fd.append('quality', 'auto');
    fd.append('fetch_format', 'auto');
  } else {
    // 이미지 자동 압축 최적화
    fd.append('quality', 'auto');
    fd.append('fetch_format', 'auto');
  }
  const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/${resourceType}/upload`, {
    method: 'POST', body: fd
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || 'Cloudinary 업로드 실패');
  }
  const data = await res.json();
  return data.secure_url;
}

function restoreEditorSelection(range) {
  if (!range) return;
  const selection = window.getSelection();
  if (!selection) return;
  selection.removeAllRanges();
  selection.addRange(range);
}

async function insertMediaFile(file, kind, b, options = {}) {
  if (!file) return;
  const status = document.getElementById('rte-uploading');
  status.innerHTML = `<span class="uploading">${options.label || `Cloudinary 업로드 중… ${(file.size/1024/1024).toFixed(1)}MB`}</span>`;
  try {
    const url = await uploadToCloudinary(file);
    status.innerHTML = '';
    const editor = document.getElementById('rte-editor');
    editor.focus();
    restoreEditorSelection(options.range);
    let html = '';
    if (kind === 'img') html = `<p><img src="${url}" alt=""></p><p><br></p>`;
    else html = `<p><video src="${url}" controls playsinline></video></p><p><br></p>`;
    document.execCommand('insertHTML', false, html);
    syncContent(b);
  } catch(e) {
    status.innerHTML = '';
    toast('업로드 실패: ' + e.message);
  }
}

async function insertMediaFromFile(ev, kind, b) {
  const file = ev.target.files[0]; ev.target.value = '';
  await insertMediaFile(file, kind, b);
}

function syncContent(b) {
  const editor = document.getElementById('rte-editor');
  if (!editor || !b) return;
  // 선택 표시용 class 는 저장본에서 제거
  const clone = editor.cloneNode(true);
  clone.querySelectorAll('.media-selected').forEach(el => el.classList.remove('media-selected'));
  b.contentHtml = clone.innerHTML;
  // 수동 썸네일이 없을 때, 본문 첫 이미지를 썸네일 미리보기에 실시간 반영
  const manualThumb = manualThumbnailForBrand(b);
  if (!manualThumb) {
    const tPrev = document.querySelector('.thumb-pick .t-preview');
    const hint  = document.querySelector('.thumb-pick span[style]');
    if (tPrev) {
      const autoThumb = firstImageFromHtml(b.contentHtml);
      if (autoThumb) {
        tPrev.innerHTML = `<img src="${autoThumb}" style="width:100%;height:100%;object-fit:cover;">`;
        if (hint) hint.textContent = '본문 첫 이미지가 홈 카드 썸네일로 사용됩니다';
      } else {
        tPrev.innerHTML = `<div style="font-size:11px;text-align:center;color:#888;">비워두면 본문 첫 이미지<br>가 자동 사용됩니다</div>`;
        if (hint) hint.textContent = '본문 첫 이미지가 생기면 자동 사용됩니다';
      }
    }
  }
}

   백업 내보내기 / 가져오기 — 다른 컴퓨터로 콘텐츠 이동용
============================================================ */
function exportData() {
  commitEditorToModel();
  const payload = {
    app: 'BrandPlaza',
    version: 1,
    exportedAt: new Date().toISOString(),
    brands: brands,
    settings: settings
  };
  const json = JSON.stringify(payload, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const ts = new Date().toISOString().slice(0,10);
  a.download = `brandplaza-backup-${ts}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  toast('백업 파일을 내려받았습니다');
}

function importData(ev) {
  const file = ev.target.files[0]; ev.target.value = '';
  if (!file) return;
  if (!confirm('현재 데이터를 백업 파일의 내용으로 덮어씁니다. 계속할까요?')) return;
  const reader = new FileReader();
  reader.onload = async () => {
    try {
      const data = JSON.parse(reader.result);
      if (!data || !Array.isArray(data.brands)) throw new Error('형식 오류');
      brands = data.brands;
      await DB.save(brands);
      if (data.settings && typeof data.settings === 'object') {
        settings = Object.assign({}, settings, data.settings);
        DB.saveSettings(settings);
      }
      currentEditingId = brands[0]?.id || null;
      renderAdminList();
      renderEditor();
      renderHome();
      toast(`백업을 가져왔습니다 (브랜드 ${brands.length}개)`);
    } catch (e) {
      console.error(e);
      toast('백업 파일을 읽을 수 없습니다 (형식 오류)');
    }
  };
  reader.onerror = () => toast('파일을 읽지 못했습니다');
  reader.readAsText(file);
}

function showSettings() {
  const newTitle = prompt('키오스크 타이틀', settings.title || DB.DEFAULT_SETTINGS.title);
  if (newTitle === null) return;
  const newSub = prompt('부제 (예: 궁금한 브랜드, 스타일링 등 확인해보세요!)', settings.subtitle || DB.DEFAULT_SETTINGS.subtitle);
  if (newSub === null) return;
  const newPw = prompt('새 관리자 비밀번호 (변경하지 않으려면 비워두세요)', '');
  if (newPw === null) return;
  settings.title = newTitle;
  settings.subtitle = newSub;
  if (newPw.trim()) settings.password = newPw.trim();
  DB.saveSettings(settings);
  renderHome();
  toast('설정을 저장했습니다');
}

/* ============================================================
   종료 제스처 & 전체화면
============================================================ */
(function() {
  const sequence = [0,1,2,3];
  let buf = []; let lastTs = 0;
  document.querySelectorAll('.corner').forEach(el => {
    el.addEventListener('click', () => {
      const c = Number(el.dataset.corner);
      const now = Date.now();
      if (now - lastTs > 3000) buf = [];
      lastTs = now;
      buf.push(c);
      if (buf.length > sequence.length) buf.shift();
      if (JSON.stringify(buf) === JSON.stringify(sequence)) { buf = []; showExitPrompt(); }
    });
  });
})();
function showExitPrompt() {
  const wrap = document.createElement('div');
  wrap.className = 'exit-prompt';
  wrap.innerHTML = `
    <div class="exit-card">
      <h3>키오스크 종료</h3>
      <p>전체화면을 해제하고 홈으로 돌아갑니다.</p>
      <div class="actions">
        <button class="btn btn-ghost" id="ex-cancel">취소</button>
        <button class="btn btn-primary" id="ex-ok">종료</button>
      </div>
    </div>`;
  document.body.appendChild(wrap);
  wrap.querySelector('#ex-cancel').onclick = () => wrap.remove();
  wrap.querySelector('#ex-ok').onclick = () => { wrap.remove(); exitFullscreenSafe(); toast('키오스크를 종료했습니다'); };
}
function isFullscreen() { return !!(document.fullscreenElement || document.webkitFullscreenElement); }
function enterFullscreen() {
  const el = document.documentElement;
  const req = el.requestFullscreen || el.webkitRequestFullscreen;
  if (req) { try { req.call(el); } catch {} }
}
function exitFullscreenSafe() {
  if (document.exitFullscreen) { try { document.exitFullscreen(); } catch {} }
  else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
}
function updateFsState() { document.body.classList.toggle('is-fs', isFullscreen()); }
document.getElementById('fs-toggle').addEventListener('click', e => {
  e.stopPropagation();
  if (isFullscreen()) exitFullscreenSafe(); else enterFullscreen();
  setTimeout(updateFsState, 100);
});
document.addEventListener('fullscreenchange', updateFsState);
document.addEventListener('webkitfullscreenchange', updateFsState);
document.getElementById('kiosk-home').addEventListener('click', e => {
  if (e.target.closest('.brand-card') || e.target.closest('button') ||

/* ============================================================
   유틸 & 초기화
============================================================ */
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.remove('show'), 2200);
}
function updateClock() {
  const d = new Date();
  const hh = String(d.getHours()).padStart(2, '0');
  const mm = String(d.getMinutes()).padStart(2, '0');
  document.getElementById('clock').textContent = `${hh}:${mm}`;
}
updateClock();
setInterval(updateClock, 15000);

/* 자동 홈 복귀 — 30초 무조작 시 팝업 닫고 홈으로 */
(function() {
  let idleTimer = null;
  const IDLE_MS = 120000; // 2분

  function resetIdle() {
    clearTimeout(idleTimer);
    idleTimer = setTimeout(() => {
      // 관리자 모드면 타이머 무시
      const adminPanel = document.getElementById('admin-panel');
      const adminEditor = document.getElementById('admin-editor-view');
      const adminLogin = document.getElementById('admin-login');
      if (!adminPanel.classList.contains('hidden') ||
          !adminEditor.classList.contains('hidden') ||
          !adminLogin.classList.contains('hidden')) return;
      // 팝업 열려있으면 닫기
      const modal = document.getElementById('brand-modal');
      if (modal && !modal.classList.contains('hidden')) {
        closeBrand();
      }
    }, IDLE_MS);
  }

  // 터치/클릭/마우스 움직임 시 타이머 리셋
  ['touchstart', 'touchend', 'click', 'mousemove', 'keydown'].forEach(evt => {
    document.addEventListener(evt, resetIdle, { passive: true });
  });

  resetIdle();
})();

/* Safe Area 동적 감지 — CSS 변수 + JS 직접 적용 */
(function() {
  function applyPadding() {
    // CSS env() 값을 JS로 읽어서 직접 적용
    const testEl = document.createElement('div');
    testEl.style.cssText = 'position:fixed;inset:0;padding:env(safe-area-inset-top,0px) env(safe-area-inset-right,0px) env(safe-area-inset-bottom,0px) env(safe-area-inset-left,0px);pointer-events:none;visibility:hidden;';
    document.body.appendChild(testEl);
    const cs = getComputedStyle(testEl);
    const top = parseFloat(cs.paddingTop) || 0;
    const bot = parseFloat(cs.paddingBottom) || 0;
    document.body.removeChild(testEl);

    const headerPad = Math.max(top + 10, 52);
    const footerPad = Math.max(bot, 8);

    // 헤더에 직접 적용
    const header = document.querySelector('#kiosk-home header');
    if (header) header.style.paddingTop = headerPad + 'px';

    // 어드민 헤더에도 적용
    document.querySelectorAll('.admin-header').forEach(h => {
      h.style.paddingTop = headerPad + 'px';
    });

    // 푸터 하단 패딩
    const footer = document.querySelector('.home-footer');
    if (footer) footer.style.paddingBottom = footerPad + 'px';
  }

  // 즉시 + 로드 후 + 리사이즈 시 적용
  applyPadding();
  window.addEventListener('load', applyPadding);
  window.addEventListener('resize', applyPadding);
  // PWA에서 안전하게 적용되도록 약간 딜레이 후 재적용
  setTimeout(applyPadding, 300);
  setTimeout(applyPadding, 1000);
})();

/* 전체화면 버튼 자동 숨김 (3초) */
(function() {
  const btn = document.getElementById('fs-toggle');
  if (!btn) return;
  let timer = null;
  function showBtn() {
    btn.classList.remove('hidden-auto');
    clearTimeout(timer);
    timer = setTimeout(() => btn.classList.add('hidden-auto'), 3000);
  }
  showBtn();
  ['touchstart','mousemove','click'].forEach(evt => {
    document.getElementById('kiosk-home').addEventListener(evt, showBtn, { passive: true });
  });
})();

/* iOS 더블탭 확대 방지 */
let lastTouchEnd = 0;
document.addEventListener('touchend', e => {
  const now = Date.now();
  if (now - lastTouchEnd <= 300) e.preventDefault();
  lastTouchEnd = now;
}, { passive: false });

/* ============================================================
   키오스크 잠금 — 브라우저 내에서 차단 가능한 이탈 경로 차단
   (OS 레벨 홈버튼/앱스위처는 OS 설정 필요 — README 참고)
============================================================ */
(function lockDown() {
  const isInInput = (el) => {
    if (!el || !el.closest) return false;
    return !!(el.closest('input, textarea, [contenteditable="true"]'));
  };

  // 1) 우클릭 컨텍스트 메뉴 차단 (편집 영역은 허용)
  document.addEventListener('contextmenu', e => {
    if (isInInput(e.target)) return;
    e.preventDefault();
  });

  // 2) 키보드 단축키 차단
  document.addEventListener('keydown', e => {
    const key = e.key;
    const ctrl = e.ctrlKey || e.metaKey;
    const inInput = isInInput(e.target);

    // 새로고침 / 전체화면 / 개발자도구 — 무조건 차단
    if (key === 'F5' || key === 'F11' || key === 'F12') { e.preventDefault(); return; }
    if (ctrl && ['r','R','w','W','n','N','t','T','p','P','s','S','o','O','u','U','h','H','f','F','g','G','l','L'].includes(key)) {
      e.preventDefault(); return;
    }
    if (ctrl && e.shiftKey && ['i','I','j','J','c','C','r','R','t','T','n','N','w','W','p','P'].includes(key)) {
      e.preventDefault(); return;
    }
    if (e.altKey && (key === 'ArrowLeft' || key === 'ArrowRight')) { e.preventDefault(); return; } // Alt+← 뒤로가기

    // 입력창 바깥에서는 백스페이스 탐색 차단
    if (key === 'Backspace' && !inInput) { e.preventDefault(); return; }
  });

  // 3) Ctrl+휠 줌 차단
  document.addEventListener('wheel', e => {
    if (e.ctrlKey || e.metaKey) e.preventDefault();
  }, { passive: false });

  // 4) 뒤로가기 제스처(iOS 가장자리 스와이프, Android 백제스처) 차단
  try {
    history.pushState({ lock: true }, '', location.href);
    window.addEventListener('popstate', () => {
      history.pushState({ lock: true }, '', location.href);
    });
  } catch {}

  // 5) 드래그 앤 드롭 차단 (관리자 브랜드 순서변경은 허용)
  document.addEventListener('dragstart', e => {
    if (e.target.closest && e.target.closest('.brand-list li')) return;
    e.preventDefault();
  });
  document.addEventListener('drop', e => e.preventDefault());

  // 6) 외부 링크 이동 차단
  document.addEventListener('click', e => {
    const a = e.target.closest && e.target.closest('a[href]');
    if (!a) return;
    const href = a.getAttribute('href') || '';
    if (href.startsWith('#')) return;
    e.preventDefault();
  });

  // 7) 탭/창 닫기 시도 시 경고 (브라우저에 따라 동작)
  window.addEventListener('beforeunload', (e) => {
    // 관리자 모드에서 의도치 않은 이탈 방지
    e.preventDefault();
    e.returnValue = '';
  });
})();
