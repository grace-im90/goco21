<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#0b0d12" />
<title>셀렉상회 큐레이션 — Kiosk</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@700;900&display=swap');

  /* ==========================
     기본
  ========================== */
  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR",
                 "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    background: #0b0d12; color: #e7e9ee;
    overflow: hidden;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none;
    touch-action: manipulation;
    /* 키오스크 잠금 */
    overscroll-behavior: none;            /* 풀투리프레시/바운스 차단 */
    -webkit-touch-callout: none;          /* iOS 길게누르기 메뉴 차단 */
    -webkit-user-drag: none;              /* 이미지/링크 드래그 차단 */
    /* 가로모드 텍스트 자동 확대 방지 */
    -webkit-text-size-adjust: 100%;
    text-size-adjust: 100%;
  }
  img, video { -webkit-user-drag: none; pointer-events: auto; }
  button { font-family: inherit; cursor: pointer; }
  img, video { max-width: 100%; display: block; }
  .hidden { display: none !important; }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); border-radius: 8px; }

  /* ==========================
     홈 화면 — 가운데 정렬된 대형 타이틀
  ========================== */
  #kiosk-home {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    background:
      radial-gradient(1200px 600px at 10% -10%, rgba(99,102,241,.25), transparent 60%),
      radial-gradient(1000px 500px at 110% 110%, rgba(244,114,182,.18), transparent 60%),
      linear-gradient(180deg, #0b0d12 0%, #11131a 100%);
  }

  #kiosk-home header {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
    align-items: center;
    gap: 12px;
    padding: 16px clamp(16px, 4vw, 28px) 12px;
    padding-top: 16px;
    border-bottom: 1px solid rgba(255,255,255,.06);
    flex-shrink: 0;
  }
  .header-spacer { min-width: 0; } /* 비어있는 좌측 */
  .header-title {
    text-align: center; min-width: 0;
    grid-column: 2;
  }
  .header-right {
    grid-column: 3;
    justify-self: end;
    display: flex; align-items: center; gap: 12px; flex-shrink: 0;
  }

  #plaza-title {
    font-size: clamp(30px, 6vw, 48px);
    letter-spacing: .04em;
    margin: 0;
    font-weight: 700;
    background: linear-gradient(90deg, #fff, #c7d2fe);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #plaza-sub {
    opacity: .55;
    font-size: clamp(11px, 1.8vw, 14px);
    letter-spacing: .04em;
    margin-top: 6px;
  }

  .clock {
    font-size: clamp(14px, 2vw, 18px);
    letter-spacing: .08em; opacity: .75;
    font-variant-numeric: tabular-nums;
  }
  .fs-btn {
    width: 42px; height: 42px; border-radius: 12px;
    background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1);
    color: #e7e9ee; font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    transition: opacity .5s ease;
  }
  .fs-btn.hidden-auto { opacity: 0; pointer-events: none; }
  .fs-btn:active { background: rgba(255,255,255,.14); }
  body.is-fs .fs-btn { display: none !important; }

  @media (max-width: 560px) {
    #kiosk-home header { padding: 18px 16px 12px; }
    #plaza-title { font-size: clamp(24px, 7vw, 34px); letter-spacing: .02em; }
    #plaza-sub { font-size: 11px; letter-spacing: .01em; }
  }

  /* ==========================
     유튜브식 브랜드 카드 (썸네일 + 제목만)
  ========================== */
  #brand-grid {
    flex: 1; min-height: 0; overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 24px 28px 20px;
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 22px;
    align-content: start;
    min-height: 0;          /* flexbox shrink 허용 */
  }
  @media (max-width: 1280px) { #brand-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 18px; } }
  @media (max-width: 820px)  { #brand-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; padding: 18px; } }
  @media (max-width: 480px)  { #brand-grid { grid-template-columns: minmax(0, 1fr); gap: 16px; padding: 14px; } }

  .brand-card {
    position: relative;
    border-radius: 16px; overflow: hidden;
    background: #14171f;
    border: 1px solid rgba(255,255,255,.06);
    width: 100%;
    min-width: 0;
    /* padding-top으로 16:9 비율 높이를 강제 — absolute 자식이 있어도 절대 겹치지 않음 */
    height: 0;
    padding-top: 56.25%;
    transition: transform .15s ease, border-color .15s ease;
  }
  .brand-card:active { transform: scale(.97); }
  .brand-card:hover { border-color: rgba(165,180,252,.45); }

  .brand-card .thumb {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    padding: 0;
    background: #fff;
  }
  .brand-card .no-thumb {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    padding: 28px;
    text-align: center;
    font-size: clamp(30px, 8vw, 72px); font-weight: 800; letter-spacing: .04em;
    background: linear-gradient(135deg, #2b304a, #1a1e30);
    color: #c7d2fe;
  }
  .brand-card .no-thumb.logo-text {
    background: #fff;
    color: #111;
    font-size: clamp(24px, 6vw, 52px);
    line-height: 1.05;
    word-break: keep-all;
  }
  .brand-card .title-overlay {
    position: absolute; left: 0; right: 0; bottom: 0;
    padding: 14px 16px;
    background: rgba(0,0,0,.30);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    color: #fff;
  }
  .brand-card .title-overlay .t-name {
    font-size: clamp(15px, 2vw, 20px);
    font-weight: 600;
    letter-spacing: .02em;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  /* 종료 제스처용 투명 코너 */
  .corner { position: fixed; width: 90px; height: 90px; z-index: 50; background: transparent; }
  .corner.tl { top: 0; left: 0; } .corner.tr { top: 0; right: 0; }
  .corner.br { bottom: env(safe-area-inset-bottom, 0); right: 0; }
  .corner.bl { bottom: env(safe-area-inset-bottom, 0); left: 0; }

  /* 홈 하단 안내 */
  .home-footer {
    flex-shrink: 0;
    text-align: center;
    padding: 8px 20px;
    padding-bottom: var(--sab, 8px);
    background: rgba(0,0,0,.25);
    border-top: 1px solid rgba(255,255,255,.05);
    font-size: clamp(12px, 1.6vw, 14px);
    opacity: .85;
  }
  .home-footer strong { color: #c7d2fe; font-weight: 600; }

  /* ==========================
     브랜드 상세 팝업 (블로그 뷰)
  ========================== */
  #brand-modal {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(5, 7, 12, .82);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    animation: fade .25s ease;
  }
  @keyframes fade { from { opacity: 0 } to { opacity: 1 } }
  .modal-card {
    width: min(960px, 100%); height: min(92vh, 1100px);
    background: #15171f; border: 1px solid rgba(255,255,255,.08);
    border-radius: 22px; overflow: hidden;
    display: flex; flex-direction: column;
    box-shadow: 0 30px 80px rgba(0,0,0,.6);
  }
  @media (max-width: 600px) {
    #brand-modal { padding: 0; align-items: stretch; }
    .modal-card {
      width: 100%;
      height: 100dvh;
      height: -webkit-fill-available;
      border-radius: 0;
    }
  }
  .modal-head {
    padding: 16px 20px;
    padding-top: max(16px, env(safe-area-inset-top, 16px));
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px;
    border-bottom: 1px solid rgba(255,255,255,.06);
    background: linear-gradient(180deg, rgba(255,255,255,.04), transparent);
    flex-shrink: 0;
  }
  .modal-head .title-wrap { display: flex; align-items: center; gap: 12px; min-width: 0; }
  .modal-head .logo-sm {
    width: 44px; height: 44px; border-radius: 10px; background: #fff;
    overflow: hidden; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    color: #111; font-weight: 800;
  }
  .modal-head .logo-sm img { width: 100%; height: 100%; object-fit: cover; padding: 0; }
  .modal-head h2 {
    margin: 0; font-size: clamp(16px, 2.5vw, 22px); letter-spacing: .04em;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .modal-head .cat { font-size: 11px; opacity: .55; letter-spacing: .18em; text-transform: uppercase; }
  .close-btn {
    background: rgba(255,255,255,.08); color: #fff;
    border: 1px solid rgba(255,255,255,.1);
    width: 44px; height: 44px; border-radius: 12px;
    font-size: 22px; font-weight: 300; flex-shrink: 0;
  }
  .close-btn:active { background: rgba(255,255,255,.16); }

  .modal-body {
    overflow-y: auto; padding: 24px 28px 40px;
    line-height: 1.7;
    user-select: text; -webkit-user-select: text;
  }
  @media (max-width: 600px) { .modal-body { padding: 18px 18px 32px; } }

  .post-content { font-size: clamp(15px, 1.7vw, 17px); color: #e7e9ee; }
  .post-content h1 { font-size: 1.7em; margin: 1em 0 .5em; }
  .post-content h2 { font-size: 1.45em; margin: 1em 0 .5em; }
  .post-content h3 { font-size: 1.2em; margin: .9em 0 .4em; }
  .post-content p  { margin: 0 0 .9em; }
  .post-content ul, .post-content ol { padding-left: 1.4em; margin: 0 0 .9em; }
  .post-content blockquote {
    border-left: 3px solid #6366f1; padding: .3em 1em; margin: 1em 0;
    opacity: .85; background: rgba(99,102,241,.08); border-radius: 0 8px 8px 0;
  }
  .post-content a { color: #a5b4fc; text-decoration: underline; }
  /* 첨부 미디어: 실제 비율, 모서리 라운드 */
  .post-content img,
  .post-content video {
    width: min(100%, 560px);
    max-width: 100%;
    height: auto;
    border-radius: 14px;
    margin: 16px 0;
    display: block;
    background: #000;
    box-shadow: 0 8px 24px rgba(0,0,0,.35);
  }
  /* 기본은 중앙 정렬 (인라인 style이 있으면 그걸 우선 적용) */
  .post-content p > img,
  .post-content p > video {
    margin-left: auto; margin-right: auto;
  }
  .post-content img[style],
  .post-content video[style] {
    width: min(100%, 560px) !important;
  }
  .post-content .media-caption {
    text-align: center; font-size: 13px; opacity: .55; margin: -8px 0 16px;
  }
  .content-logo-fallback {
    width: min(100%, 560px);
    min-height: 180px;
    margin: 16px auto;
    border-radius: 14px;
    background: #fff;
    color: #111;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 28px;
    text-align: center;
    font-size: clamp(28px, 7vw, 58px);
    font-weight: 800;
    line-height: 1.05;
    box-shadow: 0 8px 24px rgba(0,0,0,.35);
  }
  .post-content hr { border: none; border-top: 1px solid rgba(255,255,255,.1); margin: 1.5em 0; }

  .close-big {
    margin: 28px auto 10px; display: block;
    padding: 14px 36px; font-size: 15px; font-weight: 600;
    background: #6366f1; color: #fff; border: none; border-radius: 12px;
    letter-spacing: .08em;
  }
  .close-big:active { background: #4f46e5; }

  /* ==========================
     관리자 로그인 / 패널
  ========================== */
  #admin-login, #admin-panel, #admin-editor-view {
    position: fixed; inset: 0; z-index: 200;
    background: #0b0d12;
    display: flex; flex-direction: column;
    user-select: text; -webkit-user-select: text;
  }
  #admin-login .admin-header,
  #admin-panel .admin-header,
  #admin-editor-view .admin-header {
    padding-top: 16px;
  }
  .admin-header {
    padding: 14px 20px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px;
    border-bottom: 1px solid rgba(255,255,255,.08);
    background: #0f1117; flex-shrink: 0;
  }
  .admin-header h2 { margin: 0; font-size: 16px; letter-spacing: .08em; }
  .admin-header .actions { display: flex; gap: 6px; flex-wrap: wrap; }

  .login-box {
    margin: auto; width: min(380px, 92vw);
    padding: 26px; background: #15171f; border-radius: 18px;
    border: 1px solid rgba(255,255,255,.08);
  }
  .login-box h3 { margin: 0 0 14px; font-size: 18px; }
  .login-box input {
    width: 100%; padding: 14px 16px; border-radius: 10px;
    background: #0b0d12; border: 1px solid rgba(255,255,255,.12);
    color: #fff; font-size: 16px;
  }
  .login-box .err { color: #f87171; font-size: 13px; min-height: 18px; margin-top: 8px; }
  .login-box button {
    width: 100%; margin-top: 10px; padding: 14px;
    background: #6366f1; border: none; border-radius: 10px; color: #fff; font-weight: 600;
  }

  .admin-body {
    flex: 1; overflow-y: scroll; padding: 16px;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior: contain;
    touch-action: pan-y pinch-zoom;
  }
  /* 관리자 보드 그리드 스크롤 - 터치 영역 전체 */
  .admin-board-grid {
    pointer-events: auto;
  }

  /* 보드 그리드 */
  .admin-board-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 12px;
    margin-bottom: 16px;
  }
  .admin-board-card {
    position: relative;
    background: #15171f;
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 14px;
    overflow: visible;
    aspect-ratio: 3/4;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
    touch-action: pan-y;
    transition: transform .15s;
  }
  .admin-board-card.edit-mode {
    touch-action: none;
  }
  .admin-board-card .card-inner {
    width: 100%; height: 100%;
    border-radius: 14px;
    overflow: hidden;
  }
  .admin-board-card:active { transform: scale(.97); }
  .admin-board-card .card-thumb {
    width: 100%; height: 65%;
    object-fit: cover; display: block;
    background: #fff;
  }
  .admin-board-card .card-thumb-placeholder {
    width: 100%; height: 65%;
    background: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px; font-weight: 700; color: #111;
  }
  .admin-board-card .card-info {
    padding: 8px 10px;
  }
  .admin-board-card .card-name {
    font-size: 13px; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .admin-board-card .card-cat {
    font-size: 11px; opacity: .5; margin-top: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  /* 편집 모드 */
  .admin-board-card.edit-mode {
    animation: wiggle .4s infinite alternate;
  }
  .admin-board-card.dragging-over {
    border: 2px solid #6366f1;
    box-shadow: 0 0 0 3px rgba(99,102,241,.4);
  }
  @keyframes wiggle {
    from { transform: rotate(-1.5deg); }
    to   { transform: rotate(1.5deg); }
  }
  /* 텍스트/이미지 선택 방지 */
  .admin-board-grid * {
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
  }
  .card-delete-btn, .card-edit-btn {
    display: none;
    position: absolute;
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 2px solid #fff;
    color: #fff; font-size: 13px; font-weight: 700;
    align-items: center; justify-content: center;
    z-index: 10; cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,.5);
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .card-delete-btn {
    top: -8px; left: -8px;
    background: #ef4444;
  }
  .card-edit-btn {
    top: -8px; right: -8px;
    background: #6366f1;
    font-size: 12px;
  }
  .edit-mode .card-delete-btn,
  .edit-mode .card-edit-btn { display: flex; }

  /* 컨텍스트 메뉴 */
  #board-context-menu {
    position: fixed; inset: 0; z-index: 500;
  }
  .context-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.5);
  }
  .context-card {
    position: fixed; left: 50%;
    bottom: max(20px, env(safe-area-inset-bottom, 20px));
    transform: translateX(-50%);
    width: min(320px, 92vw);
    background: #1e2030; border-radius: 18px;
    border: 1px solid rgba(255,255,255,.1);
    overflow: hidden; z-index: 501;
    animation: slideUp .2s ease;
  }
  @keyframes slideUp { from { transform: translateX(-50%) translateY(30px); opacity: 0; } to { transform: translateX(-50%) translateY(0); opacity: 1; } }
  .context-brand-name {
    padding: 14px 20px 10px;
    font-size: 13px; font-weight: 700; opacity: .5;
    text-transform: uppercase; letter-spacing: .08em;
    border-bottom: 1px solid rgba(255,255,255,.06);
  }
  .context-card button {
    display: block; width: 100%;
    padding: 16px 20px; text-align: left;
    background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,.04);
    color: #e7e9ee; font-size: 16px; font-family: inherit;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
  }
  .context-card button:active { background: rgba(255,255,255,.06); }
  .context-card button.danger { color: #f87171; }
  .context-card button.cancel { color: #a5b4fc; font-weight: 600; border-bottom: none; }

  /* 이동 모드 드래그 힌트 */
  .move-hint {
    text-align: center; padding: 10px;
    font-size: 13px; opacity: .5;
    display: none;
  }
  .move-hint.visible { display: block; }
  .admin-grid {
    display: grid; grid-template-columns: 320px 1fr; gap: 20px;
  }
  @media (max-width: 900px) { .admin-grid { grid-template-columns: 1fr; } }
  /* 모바일 어드민 버튼 최적화 */
  @media (max-width: 768px) {
    .admin-header { flex-wrap: wrap; padding: 10px 14px; gap: 8px; }
    .admin-header h2 { font-size: 14px; }
    .admin-header .actions { width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .admin-header .actions button { min-height: 44px; padding: 8px 10px; font-size: 13px; width: 100%; }
    .editor-actions { gap: 10px; }
    .editor-actions .btn { min-height: 48px; font-size: 16px; flex: 1; text-align: center; }
    .brand-list li { min-height: 52px; padding: 12px; }
    .add-btn { min-height: 52px !important; font-size: 16px !important; }
    .editor .row { grid-template-columns: 1fr; gap: 6px; }
    .editor input[type="text"], .editor select { min-height: 48px; font-size: 16px; padding: 12px; }
    .login-box input { min-height: 52px; font-size: 18px; }
    .login-box button { min-height: 52px; font-size: 18px; }
    .admin-body { padding: 12px; }
  }

  .brand-list {
    background: #15171f; border: 1px solid rgba(255,255,255,.08);
    border-radius: 14px; padding: 14px; height: fit-content;
  }
  .brand-list h4 {
    margin: 0 0 10px; font-size: 12px; opacity: .6;
    letter-spacing: .12em; text-transform: uppercase;
  }
  .brand-list ul { list-style: none; padding: 0; margin: 0; }
  .brand-list li {
    display: flex; align-items: center; gap: 10px;
    padding: 10px; border-radius: 10px;
    border: 1px solid rgba(255,255,255,.06);
    margin-bottom: 8px; background: #0f1117;
    cursor: grab;
  }
  .brand-list li.dragging { opacity: .4; }
  .brand-list li.selected { border-color: #6366f1; background: #1a1d28; }
  .brand-list li .logo-xs {
    width: 32px; height: 32px; border-radius: 6px; background: #fff;
    overflow: hidden; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    color: #111; font-weight: 700; font-size: 12px;
  }

<script>
/* ============================================================
   Firebase 데이터 레이어 — 클라우드 실시간 동기화
============================================================ */
const firebaseConfig = {
  apiKey: "AIzaSyCyiK0cunm9T11sLc2E0trgE-q1RxomhV8",
  authDomain: "grace-aea60.firebaseapp.com",
  projectId: "grace-aea60",
  storageBucket: "grace-aea60.firebasestorage.app",
  messagingSenderId: "990582075084",
  appId: "1:990582075084:web:0a9d55fa409c70c9a19c69"
};

firebase.initializeApp(firebaseConfig);
const _fbDb = firebase.firestore();
const BRANDS_DOC = _fbDb.collection('kiosk').doc('brands');

const DB = {
  SETTINGS_KEY: 'brand_kiosk_settings_v1',
  DEFAULT_SETTINGS: {
    password: 'admin1234',
    title: '셀렉상회 큐레이션',
    subtitle: '궁금한 브랜드, 스타일링 등 확인해보세요!'
  },

  async load() {
    try {
      const snap = await BRANDS_DOC.get();
      if (snap.exists && snap.data().list && snap.data().list.length) {
        const deletedIds = snap.data().deletedIds || [];
        const merged = mergeBrandCatalog(snap.data().list, deletedIds);
        if (merged.changed) await this.save(merged.list);
        return merged.list;
      }
      const seed = this._seedData();
      await this.save(seed);
      return seed;
    } catch (e) {
      console.error('[DB.load] Firebase 실패:', e);
      return this._seedData();
    }
  },
  async save(data) {
    try {
      const deletedIds = await this._getDeletedIds();
      await BRANDS_DOC.set({ list: data, deletedIds });
      if (window._bc) try { window._bc.postMessage({ type: 'brands-updated' }); } catch {}
      return true;
    } catch (e) {
      console.error('[DB.save] Firebase 실패:', e);
      return false;
    }
  },
  async deleteBrandById(id) {
    try {
      const snap = await BRANDS_DOC.get();
      const data = snap.exists ? snap.data() : {};
      const list = (data.list || []).filter(b => b.id !== id);
      const deletedIds = [...new Set([...(data.deletedIds || []), id])];
      await BRANDS_DOC.set({ list, deletedIds });
      if (window._bc) try { window._bc.postMessage({ type: 'brands-updated' }); } catch {}
      return true;
    } catch (e) {
      console.error('[DB.deleteBrandById] Firebase 실패:', e);
      return false;
    }
  },
  async _getDeletedIds() {
    try {
      const snap = await BRANDS_DOC.get();
      return snap.exists ? (snap.data().deletedIds || []) : [];
    } catch { return []; }
  },
  listenBrands(callback) {
    return BRANDS_DOC.onSnapshot((snap) => {
      if (snap.exists && snap.data().list) callback(snap.data().list);
    });
  },
  loadSettings() {
    const raw = localStorage.getItem(this.SETTINGS_KEY);
    if (!raw) return Object.assign({}, this.DEFAULT_SETTINGS);
    try {
      const saved = Object.assign({}, this.DEFAULT_SETTINGS, JSON.parse(raw));
      if (['BRAND CURATION', 'BRAND PLAZA', '브랜드 큐레이션'].includes(saved.title)) {
        saved.title = this.DEFAULT_SETTINGS.title;
      }
      if (['LEVEL 3 · FASHION & LIFESTYLE', '셀렉상회 브랜드 큐레이션'].includes(saved.subtitle)) {
        saved.subtitle = this.DEFAULT_SETTINGS.subtitle;
      }
      localStorage.setItem(this.SETTINGS_KEY, JSON.stringify(saved));
      return saved;
    } catch { return Object.assign({}, this.DEFAULT_SETTINGS); }
  },
  saveSettings(s) { localStorage.setItem(this.SETTINGS_KEY, JSON.stringify(s)); },

  _seedData() {
    return DEFAULT_BRAND_CONTENT.map(copyCatalogBrand);
  }
};

function uid() { return 'b_' + Math.random().toString(36).slice(2, 10); }
const DEFAULT_BRAND_CONTENT = [
  { id: 'brand_nike', aliases: ['nike', '나이키'], name: 'NIKE | 나이키', category: 'Sportswear', logo: '', thumbnail: '',
    contentVersion: 3, contentHtml: `<h2>NIKE | 나이키</h2><h3>1. 브랜드 히스토리</h3><p>나이키는 운동선수의 움직임을 더 좋게 만들겠다는 목표에서 성장한 글로벌 스포츠 브랜드입니다. 러닝화에서 시작해 농구, 축구, 트레이닝, 라이프스타일까지 영역을 넓혔고, 스우시 로고는 지금도 도전과 에너지를 상징합니다.</p><p>나이키의 가치는 단순히 로고가 유명하다는 데 있지 않습니다. 기능적인 소재, 활동성을 고려한 실루엣, 그리고 스포츠가 가진 긍정적인 태도를 일상복으로 가져오는 힘이 핵심입니다. 그래서 나이키는 운동할 때뿐 아니라 평소 옷차림에서도 자연스럽게 활력을 만들어 줍니다.</p><blockquote>나이키를 고른다는 것은 편하게 움직이면서도 스포티한 자신감을 더하는 선택입니다.</blockquote><h3>2. 브랜드 스타일링 코디 추천</h3><ul><li><b>데일리 스포티 룩</b> 로고 티셔츠에 조거 팬츠, 에어 포스나 에어 맥스 계열 스니커즈를 매치하면 가장 안정적인 나이키 스타일이 됩니다.</li><li><b>스트리트 캐주얼 룩</b> 오버핏 후디나 바람막이에 와이드 팬츠를 입고, 신발은 볼륨감 있는 스니커즈로 중심을 잡아 주세요.</li><li><b>깔끔한 원포인트 룩</b> 전체 컬러를 블랙, 화이트, 그레이로 맞춘 뒤 스우시 로고가 보이는 아이템 하나만 넣으면 과하지 않게 브랜드 감도가 살아납니다.</li></ul><p><b>셀렉상회 추천</b> 처음 나이키를 구매한다면 신발이나 후디처럼 활용도가 높은 아이템부터 고르면 좋습니다. 이미 스니커즈가 있다면 상의나 팬츠를 같은 무드로 맞춰 완성도를 높여보세요.</p>` },
  { id: 'brand_adidas', aliases: ['adidas', '아디다스', '아디아드'], name: 'ADIDAS | 아디다스', category: 'Sportswear', logo: '', thumbnail: '',
    contentVersion: 4, contentHtml: `<h2>ADIDAS | 아디다스</h2><h3>1. 브랜드 히스토리 &amp; 아이덴티티</h3><p>아디다스는 1949년 독일의 아돌프 다슬러가 창립한 스포츠 브랜드입니다. 형과 결별 후 독립해 설립한 이 브랜드는 스피드와 퍼포먼스를 핵심 가치로 삼았고, 세 줄 스트라이프와 트레포일 로고는 세계에서 가장 인지도 높은 스포츠 심볼 중 하나가 되었습니다.</p><p>아디다스의 진짜 힘은 시대를 초월하는 클래식에 있습니다. 1949년 탄생한 삼바(Samba), 1960년대의 가젤(Gazelle), 70년대의 슈퍼스타(Superstar)는 반세기가 지난 지금도 전 세계 패션 씬에서 꾸준히 재해석되고 있습니다. 스포츠웨어가 스트리트 패션의 언어가 된 시대, 아디다스는 그 흐름의 중심에 있습니다.</p><p><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/4d/Blue_suede_samba.JPG/640px-Blue_suede_samba.JPG" alt="아디다스 삼바 스니커즈"></p><p class="media-caption">아디다스의 아이콘 — 삼바(Samba) 스니커즈. 1949년 출시 이후 수십 년째 사랑받는 클래식.</p><blockquote>아디다스는 스포티하지만 차분하고, 캐주얼하지만 클래식한 균형을 가진 브랜드입니다.</blockquote><h3>2. 브랜드 스타일링 코디 추천</h3><p>아디다스는 스니커즈 하나만으로도 코디의 분위기를 정할 수 있는 브랜드입니다. 아래 세 가지 무드를 참고해 보세요.</p><ul><li><b>레트로 스포츠 룩</b> 3선 트랙탑에 와이드 데님이나 트랙 팬츠를 매치하면 아디다스 특유의 70~80년대 레트로 스포츠 감성이 살아납니다. 삼바나 슈퍼스타 화이트 스니커즈로 마무리하면 완성.</li><li><b>스니커즈 중심 코디</b> 삼바, 가젤처럼 낮고 슬림한 신발은 슬랙스, 데님, 치노 팬츠 모두와 잘 어울립니다. 신발 하나로 전체 룩의 무게감을 조절할 수 있습니다.</li><li><b>컬러 포인트 룩</b> 네이비, 올리브, 버건디 계열 상의에 아디다스 화이트 스니커즈를 더하면 차분하면서도 포인트가 생깁니다.</li></ul><p><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/04/Adidas_Samba_sneakers%2C_Originals_branch.JPG/640px-Adidas_Samba_sneakers%2C_Originals_branch.JPG" alt="아디다스 삼바 블랙"></p><p class="media-caption">삼바 블랙 컬러웨이 — 데님, 슬랙스, 카고 팬츠 어디에나 잘 어울리는 만능 스니커즈.</p><p><b>셀렉상회 추천</b> 아디다스는 첫 구매 아이템으로 삼바 또는 가젤 스니커즈를 권장합니다. 이후 트랙 재킷이나 로고 티셔츠를 더하면 브랜드 분위기를 자연스럽게 확장할 수 있습니다.</p>` },
  { id: 'brand_champion', aliases: ['champion', '챔피온'], name: 'CHAMPION | 챔피온', category: 'Casual', logo: '', thumbnail: '',
    contentVersion: 4, contentHtml: `<h2>CHAMPION | 챔피온</h2><h3>1. 브랜드 히스토리 &amp; 아이덴티티</h3><p>챔피온은 1919년 미국 로체스터에서 시작한 스포츠웨어 브랜드입니다. 초기에는 미시간대학교를 비롯한 대학 운동부에 유니폼을 공급하며 성장했고, 1930년대에는 세계 최초로 후드가 달린 스웨트셔츠를 만든 브랜드로 알려져 있습니다.</p><p>챔피온의 핵심 아이덴티티는 <b>리버스 위브(Reverse Weave)</b> 기술에서 나옵니다. 일반 스웨트셔츠와 달리 원단 방향을 90도 돌려 제직해 세탁 후에도 형태가 거의 변하지 않는 것이 특징입니다. 화려한 로고보다 꾸준히 입을 수 있는 품질을 우선시하는 브랜드 철학이 지금까지 이어지고 있습니다.</p><p><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/20/ChampionTrainers.jpg/640px-ChampionTrainers.jpg" alt="챔피온 트레이너"></p><p class="media-caption">챔피온의 클래식 트레이너 — 심플하고 견고한 디자인이 브랜드의 정체성을 잘 보여줍니다.</p><blockquote>챔피온은 매일 입는 기본 옷을 조금 더 탄탄하고 오래 입고 싶은 사람에게 잘 맞습니다.</blockquote><h3>2. 브랜드 스타일링 코디 추천</h3><p>챔피온은 '기본기'가 강한 브랜드입니다. 과하지 않고, 꾸준히 입을 수 있는 코디에서 가장 빛납니다.</p><ul><li><b>캠퍼스 캐주얼 룩</b> 오트밀이나 그레이 맨투맨에 인디고 데님 팬츠, 화이트 스니커즈를 매치하면 편하고 단정한 분위기가 납니다. 작은 C 로고가 포인트 역할을 합니다.</li><li><b>원마일웨어 셋업</b> 같은 컬러의 후디와 조거 팬츠를 세트로 입으면 집 앞 외출부터 가벼운 약속까지 커버할 수 있는 스타일이 됩니다.</li><li><b>레이어드 룩</b> 맨투맨 안에 화이트 티셔츠를 살짝 내밀고, 코치 재킷이나 바시티 재킷을 위에 걸치면 챔피온다운 캠퍼스 레이어드 스타일이 완성됩니다.</li></ul><p><b>셀렉상회 추천</b> 챔피온은 로고보다 핏과 원단감을 보고 고르면 만족도가 높습니다. 그레이, 네이비, 오트밀처럼 오래 입기 쉬운 컬러부터 시작해 보세요.</p>` },
  { id: 'brand_puma', aliases: ['puma', '푸마'], name: 'PUMA | 푸마', category: 'Sportswear', logo: '', thumbnail: '',
    contentVersion: 4, contentHtml: `<h2>PUMA | 푸마</h2><h3>1. 브랜드 히스토리 &amp; 아이덴티티</h3><p>푸마는 1948년 독일에서 루돌프 다슬러가 설립한 스포츠 브랜드입니다. 아디다스를 창립한 아돌프 다슬러와 형제 사이로, 두 형제의 결별이 두 브랜드의 출발점이 되었습니다. 푸마는 스피드와 역동성을 상징하는 퓨마(puma) 고양이과 동물에서 이름을 따왔으며, 달리는 동물의 실루엣 로고가 브랜드 정체성을 잘 보여줍니다.</p><p>푸마의 아이덴티티는 <b>날렵함과 경쾌함</b>입니다. 육상, 축구, F1 모터스포츠 등에서 쌓은 퍼포먼스 이미지를 바탕으로, 스웨이드(Suede), 팔레르모(Palermo), RS 시리즈 같은 라이프스타일 스니커즈로 일상 패션에서도 존재감을 드러내고 있습니다.</p><p><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/b/b4/Puma_shoes.jpg/640px-Puma_shoes.jpg" alt="푸마 스니커즈"></p><p class="media-caption">푸마의 클래식 스니커즈 라인 — 날렵한 실루엣과 컬러감이 푸마만의 특징입니다.</p><blockquote>푸마는 스포티한 옷차림에 빠른 리듬과 산뜻한 포인트를 더해주는 브랜드입니다.</blockquote><h3>2. 브랜드 스타일링 코디 추천</h3><p>푸마는 '신발 하나'만으로도 룩의 인상을 바꿀 수 있는 브랜드입니다. 스니커즈를 중심으로 코디를 구성해 보세요.</p><ul><li><b>컬러 스니커즈 포인트 룩</b> 스웨이드나 팔레르모처럼 컬러감 있는 신발은 흰 티셔츠와 데님만 입어도 충분히 포인트가 됩니다. 신발이 룩의 주인공이 되는 방식입니다.</li><li><b>스포티 트랙 룩</b> 로고 티셔츠에 나일론 트랙 팬츠나 조거를 매치하면 가볍고 활동적인 스포티 무드가 살아납니다.</li><li><b>무채색+컬러 믹스</b> 상의를 블랙·화이트·그레이로 차분하게 정리하고 신발에만 레드, 그린, 블루 포인트를 넣으면 과하지 않으면서 스타일에 생기가 생깁니다.</li></ul><p><b>셀렉상회 추천</b> 푸마는 신발에서 시작하면 코디가 쉬워집니다. 이미 기본 스니커즈가 많다면 컬러 있는 푸마 제품으로 스타일에 변화를 줘보세요.</p>` },
  { id: 'brand_carhartt', aliases: ['carhartt', '칼하트'], name: 'CARHARTT | 칼하트', category: 'Workwear', logo: '', thumbnail: '',
    contentVersion: 4, contentHtml: `<h2>CARHARTT | 칼하트</h2><h3>1. 브랜드 히스토리 &amp; 아이덴티티</h3><p>칼하트는 1889년 미국 디트로이트에서 해밀턴 칼하트가 철도 노동자를 위한 작업복 회사로 시작했습니다. "철도 노동자가 요구하는 옷을 만들겠다"는 창립 정신 그대로, 두꺼운 덕(duck) 캔버스 소재, 삼중 스티치 봉제, 리벳 보강이라는 세 가지 원칙이 지금도 브랜드의 핵심입니다.</p><p>칼하트의 아이덴티티는 <b>진짜 현장에서 쓰이는 옷</b>이라는 데 있습니다. 1990년대 뉴욕 힙합 씬과 스트리트 문화가 칼하트의 견고함과 넉넉한 핏에서 새로운 매력을 발견하면서, 유럽에서는 칼하트 WIP(Work In Progress) 라인이 별도로 전개되며 스트리트 패션의 아이콘이 되었습니다.</p><p><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/b/b2/Carhartt_Hooded_Jacket_%289808828856%29.jpg/640px-Carhartt_Hooded_Jacket_%289808828856%29.jpg" alt="칼하트 후디드 재킷"></p><p class="media-caption">칼하트의 대표 아이템 — 두꺼운 캔버스 소재와 실용적인 디자인이 특징인 워크 재킷.</p><blockquote>칼하트는 튼튼함과 실용성이 그대로 스타일이 되는 브랜드입니다.</blockquote><h3>2. 브랜드 스타일링 코디 추천</h3><p>칼하트는 '무겁고 투박하다'는 인상을 주지만, 실제로는 다양한 무드로 활용할 수 있는 브랜드입니다.</p><ul><li><b>워크웨어 정통 룩</b> 덕 재킷이나 초어 코트(Chore Coat)에 데님 팬츠, 워크 부츠를 매치하면 칼하트의 가장 정직한 스타일이 완성됩니다. 브라운·카키·블랙 톤으로 맞추면 더욱 자연스럽습니다.</li><li><b>스트리트 레이어드 룩</b> 칼하트 아우터 안에 후디를 레이어드하고 아래는 와이드 팬츠를 매치하면 현대적인 스트리트 감성이 살아납니다.</li><li><b>워크웨어 믹스 룩</b> 베이지나 브라운 칼하트 재킷을 화이트 티셔츠와 블랙 데님에 걸치면 가벼운 워크웨어 무드를 일상으로 가져올 수 있습니다.</li></ul><p><b>셀렉상회 추천</b> 칼하트는 오래 입을 아우터나 팬츠 같은 큰 아이템부터 시작하는 것이 좋습니다. 입을수록 자연스럽게 몸에 맞아가며 나만의 빈티지 감이 생깁니다.</p>` },
  { id: 'brand_stussy', aliases: ['stussy', '스투시'], name: 'STUSSY | 스투시', category: 'Streetwear', logo: '', thumbnail: '',
    contentVersion: 4, contentHtml: `<h2>STUSSY | 스투시</h2><h3>1. 브랜드 히스토리 &amp; 아이덴티티</h3><p>스투시는 1980년 미국 캘리포니아 라구나 비치에서 서퍼 숀 스투시(Shawn Stussy)가 자신의 서프보드에 그리던 손글씨 서명에서 시작된 브랜드입니다. 그 특유의 손글씨 로고가 티셔츠에 담겨 팔리기 시작하면서 서핑, 스케이트, 힙합, 클럽 문화를 가로지르는 스트리트웨어 씬의 선구자가 되었습니다.</p><p>스투시의 아이덴티티는 <b>서브컬처를 관통하는 자유로움</b>입니다. 특정 스타일을 강요하지 않고, 서프·스케이트·힙합·클럽 등 다양한 문화가 자연스럽게 공존합니다. 지금도 전 세계 스트리트 씬에서 '처음 만든 브랜드'로 존경받으며 꾸준히 재해석되고 있습니다.</p><p><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/69/%E3%82%B9%E3%83%86%E3%83%A5%E3%83%BC%E3%82%B7%E3%83%BC.jpg/640px-%E3%82%B9%E3%83%86%E3%83%A5%E3%83%BC%E3%82%B7%E3%83%BC.jpg" alt="스투시 매장"></p><p class="media-caption">스투시 매장의 모습 — 손글씨 로고와 그래픽 중심의 디스플레이가 브랜드 무드를 보여줍니다.</p><blockquote>스투시는 자유로운 분위기와 서브컬처 감도를 옷으로 표현하는 브랜드입니다.</blockquote><h3>2. 브랜드 스타일링 코디 추천</h3><p>스투시는 '힘을 빼도 멋있는' 스타일을 만들기에 좋은 브랜드입니다. 아래 방식을 참고해 보세요.</p><ul><li><b>그래픽 티셔츠 코디</b> 스투시 로고 티셔츠에 와이드 데님이나 카고 팬츠를 매치하면 가장 쉽게 브랜드 분위기를 낼 수 있습니다. 신발은 청키 스니커즈나 슬립온도 잘 어울립니다.</li><li><b>릴랙스 스트리트 룩</b> 오버핏 후디에 반바지 또는 벌룬 팬츠를 더하고 볼캡을 쓰면 힘을 뺀 서울 스트리트 스타일이 완성됩니다.</li><li><b>블랙&amp;화이트 포인트 룩</b> 전체를 블랙·차콜로 맞추고 화이트 스투시 로고가 들어간 아이템 하나를 넣으면 깔끔하면서도 존재감이 살아납니다.</li></ul><p><b>셀렉상회 추천</b> 평소 옷이 심플하다면 스투시 그래픽 티나 후디 하나가 전체 코디의 무드를 바꿔줍니다. 로고나 그래픽이 뚜렷한 아이템부터 시작해 보세요.</p>` },
  { id: 'brand_supreme', aliases: ['supreme', '슈프림'], name: 'SUPREME | 슈프림', category: 'Streetwear', logo: '', thumbnail: '',
    contentVersion: 4, contentHtml: `<h2>SUPREME | 슈프림</h2><h3>1. 브랜드 히스토리 &amp; 아이덴티티</h3><p>슈프림은 1994년 뉴욕 맨해튼 라파예트 스트리트에서 제임스 제비아(James Jebbia)가 오픈한 스케이트 숍에서 출발했습니다. 뉴욕 스케이트 씬의 아지트로 시작해 힙합, 아트, 팝 컬처를 넘나들며 스트리트웨어의 정점에 오른 브랜드입니다.</p><p>슈프림의 핵심 아이덴티티는 <b>드롭(Drop) 문화와 희소성</b>입니다. 매주 목요일 한정 수량으로 새 컬렉션을 공개하는 드롭 방식, 바바라 크루거에서 영감받은 빨간 박스 로고, 루이비통·나이키·아크테릭스 등 다양한 브랜드와의 협업이 슈프림을 단순한 의류 브랜드가 아닌 문화 현상으로 만들었습니다.</p><p><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/b/b5/Lafayette_Street%2C_SoHo%2C_New_York_%2814357744260%29.jpg/640px-Lafayette_Street%2C_SoHo%2C_New_York_%2814357744260%29.jpg" alt="슈프림 뉴욕 라파예트 스트리트"></p><p class="media-caption">슈프림 뉴욕 본점이 위치한 라파예트 스트리트 — 브랜드 탄생의 배경이 된 뉴욕 스케이트 씬의 심장부입니다.</p><blockquote>슈프림은 한 가지 아이템만으로도 스타일의 중심을 만들 수 있는 브랜드입니다.</blockquote><h3>2. 브랜드 스타일링 코디 추천</h3><p>슈프림 아이템은 '주연'입니다. 나머지 코디는 조연으로 두어야 브랜드의 존재감이 제대로 삽니다.</p><ul><li><b>박스 로고 원포인트 룩</b> 슈프림 박스 로고 티나 후디를 중심으로 두고 팬츠·신발은 블랙이나 화이트로 심플하게 맞추면 로고가 가장 잘 살아납니다.</li><li><b>스케이트 스트리트 룩</b> 후디, 루즈한 데님, 볼캡, 청키 스니커즈를 조합하면 슈프림의 출발점인 뉴욕 스케이트 무드가 나옵니다.</li><li><b>협업 아이템 집중 룩</b> 강한 그래픽이나 협업 제품을 입을 때는 나머지 아이템을 최대한 단순하게 가져가세요. 하나의 포인트가 전체 룩을 이끌게 하는 것이 슈프림 스타일의 핵심입니다.</li></ul><p><b>셀렉상회 추천</b> 슈프림은 시즌과 그래픽의 배경을 알수록 더 재미있는 브랜드입니다. 마음에 드는 로고 아이템을 중심으로 나만의 취향을 표현해 보세요.</p>` }

    contentVersion: 2, contentHtml: `<h2>MUSINSA STANDARD | 무신사 스탠다드</h2><h3>1. 브랜드 히스토리 &amp; 아이덴티티</h3><p>무신사 스탠다드는 2017년 국내 최대 패션 플랫폼 무신사가 직접 론칭한 베이직 캐주얼 브랜드입니다. "좋은 기본템을 합리적인 가격에"라는 명확한 방향성 아래 출발해, 출시 몇 년 만에 무신사 내 최고 매출 브랜드 중 하나로 성장했습니다.</p><p>무신사 스탠다드의 아이덴티티는 <b>유행을 타지 않는 기본기</b>입니다. 과한 로고나 장식보다 핏, 컬러, 소재의 안정감을 중시하며, 매 시즌 디자인보다 품질과 가격 밸런스에 집중합니다. 티셔츠, 슬랙스, 데님, 니트, 아우터 등 '매일 입는 옷'에 특화되어 있어 처음 옷장을 채우거나 기본템을 교체하려는 고객에게 높은 평가를 받습니다.</p><p><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/46/Korea_Musinsa_New_Store_1.jpg/640px-Korea_Musinsa_New_Store_1.jpg" alt="무신사 스탠다드 매장" onerror="this.style.display='none'"></p><blockquote>무신사 스탠다드는 '오늘 바로 입을 수 있는 깔끔한 기본 옷'을 찾는 고객에게 잘 맞습니다.</blockquote><h3>2. 브랜드 스타일링 코디 추천</h3><p>무신사 스탠다드는 다른 브랜드와 믹스 매치하기 좋은 '기본템' 역할을 가장 잘 수행합니다.</p><ul><li><b>깔끔한 데일리 룩</b> 화이트 티셔츠에 블랙 슬랙스, 흰 스니커즈만으로도 가장 안정적이고 단정한 인상을 만들 수 있습니다. 이 조합은 어디서든 튀지 않고 잘 어울립니다.</li><li><b>출근·등교 룩</b> 니트나 옥스퍼드 셔츠에 와이드 슬랙스를 더하면 단정하면서도 답답하지 않은 스타일이 됩니다. 로퍼나 더비슈즈로 마무리하면 완성.</li><li><b>톤온톤 레이어드</b> 무지 티셔츠, 셔츠, 가디건을 비슷한 컬러 계열로 겹쳐 입으면 깔끔하면서도 입체감 있는 코디가 됩니다.</li></ul><p><b>셀렉상회 추천</b> 처음 방문한 고객에게는 무채색 티셔츠, 슬랙스, 기본 니트 같은 활용도 높은 아이템을 추천하기 좋습니다. 다른 브랜드 아이템과도 자연스럽게 어울립니다.</p>` },
  { id: 'brand_matin_kim', aliases: ['matin kim', '마뗑킴', '마틴킴'], name: 'MATIN KIM | 마뗑킴', category: 'Contemporary', logo: '', thumbnail: '',
    contentVersion: 2, contentHtml: `<h2>MATIN KIM | 마뗑킴</h2><h3>1. 브랜드 히스토리 &amp; 아이덴티티</h3><p>마뗑킴은 2018년 디자이너 김다인이 론칭한 서울 기반 컨템포러리 브랜드입니다. 론칭 초기부터 로고 플레이와 메탈 디테일이 돋보이는 가방으로 빠르게 주목받았으며, 이후 의류·액세서리 전 카테고리로 확장하며 국내외 팬덤을 형성했습니다.</p><p>마뗑킴의 아이덴티티는 <b>무심한 듯 감각적인 서울 무드</b>입니다. 과하게 꾸민 느낌이 아니라 힘을 빼면서도 도시적인 포인트가 살아있는 스타일을 추구합니다. 작은 로고, 메탈 버클, 독특한 텍스처의 소재가 평범한 캐주얼을 특별하게 만들어 주는 것이 마뗑킴의 강점입니다.</p><blockquote>마뗑킴은 심플한 옷차림에 '요즘 서울 감도'를 더하고 싶은 고객에게 어울립니다.</blockquote><h3>2. 브랜드 스타일링 코디 추천</h3><p>마뗑킴은 '과하지 않지만 눈에 띄는' 스타일을 만들기에 좋습니다. 아이템 하나로 전체 코디의 레벨을 올릴 수 있습니다.</p><ul><li><b>도시 캐주얼 룩</b> 마뗑킴 로고 티셔츠나 크롭 상의에 와이드 데님, 숄더백을 더하면 서울의 젊은 감도가 자연스럽게 납니다.</li><li><b>꾸안꾸 데일리 룩</b> 크롭 니트나 셔츠에 슬랙스를 매치하고 마뗑킴 미니백 하나를 포인트로 넣으면 꾸민 듯 안 꾸민 룩이 완성됩니다.</li><li><b>액세서리 중심 룩</b> 옷은 심플한 기본 아이템으로 입고 마뗑킴 가방이나 지갑으로 브랜드 감도를 표현하는 방식도 좋습니다. 최소한의 포인트로 최대 효과를 냅니다.</li></ul><p><b>셀렉상회 추천</b> 평소 옷이 단순한 고객에게는 로고 티셔츠나 가방처럼 포인트가 확실한 아이템부터 제안해보세요. 첫 마뗑킴 아이템으로 추천합니다.</p>` },
  { id: 'brand_mardi_mercredi', aliases: ['mardi mercredi', '마르디 메크르디', '마르디'], name: 'MARDI MERCREDI | 마르디 메크르디', category: 'Casual Chic', logo: '', thumbnail: '',
    contentVersion: 2, contentHtml: `<h2>MARDI MERCREDI | 마르디 메크르디</h2><h3>1. 브랜드 히스토리 &amp; 아이덴티티</h3><p>마르디 메크르디(프랑스어로 '화요일 수요일')는 2019년 론칭된 한국 캐주얼 브랜드입니다. 플라워 그래픽 스웨트셔츠 하나로 폭발적인 반응을 얻으며 빠르게 성장했고, 지금은 국내외에서 '플라워 브랜드'로 통할 만큼 확실한 시그니처를 가지게 되었습니다.</p><p>마르디 메크르디의 아이덴티티는 <b>프렌치 캐주얼과 한국적 데일리 감성의 조화</b>입니다. 과하지 않은 꽃 그래픽, 부드러운 컬러 팔레트, 편안한 소재감이 세 가지 축을 이루며, "예쁘게 꾸몄지만 편하게 입은 것처럼 보이는" 스타일을 추구합니다. 사진에 잘 나오는 것도 이 브랜드의 큰 매력입니다.</p><blockquote>마르디 메크르디는 편안하지만 사랑스럽고, 캐주얼하지만 사진에 잘 남는 브랜드입니다.</blockquote><h3>2. 브랜드 스타일링 코디 추천</h3><p>마르디 메크르디는 아이템 하나가 룩 전체에 '따뜻함'을 더해주는 브랜드입니다.</p><ul><li><b>플라워 스웨트 시그니처 룩</b> 플라워 그래픽 스웨트셔츠에 연청 데님을 매치하면 가장 대표적인 마르디 스타일이 됩니다. 화이트 스니커즈나 로퍼로 마무리하면 자연스럽습니다.</li><li><b>페미닌 캐주얼 룩</b> 로고 티셔츠에 롱스커트나 플리츠 스커트, 플랫슈즈를 더하면 부드럽고 여성스러운 데일리룩이 됩니다. 아우터는 오버핏 코트나 가디건을 추천합니다.</li><li><b>시밀러룩·커플룩</b> 같은 그래픽을 컬러만 다르게 선택하면 부담 없는 시밀러룩으로도 활용할 수 있습니다. 커플이나 친구 사이에서 인기 있는 방식입니다.</li></ul><p><b>셀렉상회 추천</b> 선물용이나 처음 구매할 때는 브랜드가 한눈에 보이는 플라워 그래픽 스웨트셔츠나 티셔츠를 추천합니다. 컬러도 다양해 취향에 맞게 고르기 좋습니다.</p>` },
  { id: 'brand_ader_error', aliases: ['ader error', '아더에러', '아더'], name: 'ADER ERROR | 아더에러', category: 'Concept Streetwear', logo: '', thumbnail: '',
    contentVersion: 2, contentHtml: `<h2>ADER ERROR | 아더에러</h2><h3>1. 브랜드 히스토리 &amp; 아이덴티티</h3><p>아더에러는 2014년 서울에서 익명의 크리에이티브 집단이 설립한 컨셉추얼 스트리트 브랜드입니다. 브랜드명의 '에러(Error)'처럼 의도적인 오류, 반전, 위트가 디자인 언어 전체를 관통합니다. 오버사이즈 실루엣, 엉뚱한 로고 배치, 예상을 벗어나는 컬러 조합이 아더에러만의 시각 언어를 만들어 냅니다.</p><p>아더에러는 한국 스트리트 브랜드 최초로 파리 패션위크에 참가하고 Maison Margiela, Gentle Monster 등과 협업하며 글로벌 무대에서 'K-패션'의 가능성을 증명한 브랜드이기도 합니다. 단순히 예쁜 옷보다 <b>입는 사람의 개성을 드러내는 옷</b>을 만드는 것이 핵심 철학입니다.</p><blockquote>아더에러는 평범한 코디보다 '내가 좋아하는 감각'을 보여주고 싶은 고객에게 어울립니다.</blockquote><h3>2. 브랜드 스타일링 코디 추천</h3><p>아더에러는 '어떻게 입느냐'보다 '무엇을 선택하느냐'가 더 중요한 브랜드입니다. 아이템 자체가 개성을 표현합니다.</p><ul><li><b>오버핏 스트리트 룩</b> 박시한 아더에러 티셔츠나 후디에 와이드 팬츠를 매치하면 브랜드 특유의 실루엣이 살아납니다. 신발은 청키 스니커즈나 첼시부츠가 잘 어울립니다.</li><li><b>블루 포인트 룩</b> 아더에러의 대표 색상인 블루 계열 아이템을 모자, 가방, 상의 중 하나에만 넣어도 확실한 포인트가 됩니다.</li><li><b>원 포인트 집중 룩</b> 전체를 블랙이나 그레이로 정리하고 아더에러 그래픽 아이템 하나를 중심에 두면 브랜드 무드가 가장 잘 보입니다.</li></ul><p><b>셀렉상회 추천</b> 개성을 좋아하는 고객에게는 로고 티셔츠, 후디처럼 브랜드 무드가 즉시 보이는 아이템을 먼저 추천해 보세요. 처음 아더에러를 접하는 분께도 진입하기 좋은 아이템입니다.</p>` },
  { id: 'brand_thisisneverthat', aliases: ['thisisneverthat', '디스이즈네버댓', '디네댓'], name: 'thisisneverthat | 디스이즈네버댓', category: 'Streetwear', logo: '', thumbnail: '',
    contentVersion: 2, contentHtml: `<h2>thisisneverthat | 디스이즈네버댓</h2><h3>1. 브랜드 히스토리 &amp; 아이덴티티</h3><p>디스이즈네버댓(thisisneverthat)은 2010년 서울에서 시작한 스트리트웨어 브랜드로, 한국 스트리트 씬의 성장과 함께 국내외에서 꾸준히 주목받아왔습니다. 브랜드명은 "이것은 저것이 아니다"는 철학적 뉘앙스를 담고 있으며, 특정 카테고리에 귀속되기를 거부하는 정체성을 상징합니다.</p><p>디스이즈네버댓의 아이덴티티는 <b>90년대 스포츠웨어·아웃도어·밀리터리 감성의 현대적 재해석</b>입니다. Supreme, Stüssy 같은 해외 스트리트웨어의 영향을 받으면서도 서울 특유의 감도를 유지합니다. DSN, T-Logo, SP 등 시즌마다 변형되는 로고 그래픽이 팬들 사이에서 컬렉터 아이템이 될 만큼 충성도 높은 브랜드입니다.</p><blockquote>디스이즈네버댓은 편한데 멋있고, 익숙한데 촌스럽지 않은 서울 스트리트웨어입니다.</blockquote><h3>2. 브랜드 스타일링 코디 추천</h3><p>디스이즈네버댓은 '자연스러운 멋'을 만들기에 좋은 브랜드입니다. 힘을 빼도 브랜드가 스타일을 잡아줍니다.</p><ul><li><b>서울 스트리트 룩</b> T-Logo 후디나 그래픽 티셔츠에 카고 팬츠, 볼캡을 매치하면 가장 자연스럽게 브랜드 무드가 납니다. 올드스쿨 스니커즈나 군화 느낌의 신발과도 잘 어울립니다.</li><li><b>나일론 아웃도어 룩</b> 나일론 바람막이나 나일론 팬츠를 활용하면 가볍고 활동적인 아웃도어 무드가 살아납니다. 등산화나 트레일 러닝화를 더하면 자연스럽습니다.</li><li><b>데일리 그래픽 룩</b> 그래픽 티셔츠에 슬림 데님과 청키 스니커즈를 더하면 누구나 입기 쉬운 스트리트 캐주얼이 됩니다.</li></ul><p><b>셀렉상회 추천</b> 스트리트 브랜드가 처음인 고객에게도 후디나 티셔츠부터 쉽게 제안할 수 있는 브랜드입니다. 로고 디자인이 깔끔해 부담 없이 시작할 수 있습니다.</p>` },
  { id: 'brand_covernat', aliases: ['covernat', '커버낫'], name: 'COVERNAT | 커버낫', category: 'Heritage Casual', logo: '', thumbnail: '',
    contentVersion: 2, contentHtml: `<h2>COVERNAT | 커버낫</h2><h3>1. 브랜드 히스토리 &amp; 아이덴티티</h3><p>커버낫은 2012년 서울에서 시작된 헤리티지 캐주얼 브랜드입니다. 아메리칸 빈티지, 밀리터리, 아웃도어 무드를 한국인의 일상에 맞게 재해석하는 것이 브랜드의 출발점입니다. '커버낫(COVERNAT)'이라는 이름은 영어 'covenant(약속, 맹세)'에서 유래했으며, 품질에 대한 브랜드의 약속을 담고 있습니다.</p><p>커버낫의 아이덴티티는 <b>한국식 아메카지(アメカジ · 아메리칸 캐주얼)</b>입니다. 캔버스 소재의 재킷, 데님, 플래닛 로고가 담긴 티셔츠·맨투맨이 대표 아이템이며, 국내 생산 비율을 높이고 소재에 집중하는 방식으로 가성비 높은 제품을 선보이고 있습니다. 화려함보다 오래 입을 수 있는 실용성을 중시합니다.</p><blockquote>커버낫은 옷장을 든든하게 채워주는 한국식 헤리티지 캐주얼입니다.</blockquote><h3>2. 브랜드 스타일링 코디 추천</h3><p>커버낫은 '오래 입을 수 있는 옷'을 중심으로 코디할 때 가장 빛납니다.</p><ul><li><b>아메카지 기본 룩</b> 커버낫 플래닛 로고 티셔츠에 치노 팬츠, 화이트 스니커즈를 매치하면 깔끔한 데일리 코디가 됩니다. 단정하면서도 캐주얼한 인상을 줍니다.</li><li><b>헤리티지 레이어드 룩</b> 셔츠, 워크 재킷, 카고 팬츠를 조합하면 커버낫의 헤리티지 아메카지 감성이 잘 살아납니다. 카키·브라운·네이비 계열로 맞추면 더욱 자연스럽습니다.</li><li><b>간절기 아우터 룩</b> 바람막이, 코치 재킷, 셔츠 재킷을 기본 티셔츠 위에 가볍게 걸치면 활용도가 높습니다. 시즌 변화에 빠르게 대응할 수 있는 레이어드입니다.</li></ul><p><b>셀렉상회 추천</b> 매일 입을 기본 아이템을 찾는 고객에게 로고 티셔츠와 아우터류를 먼저 보여주면 좋습니다. 가격 대비 품질이 높아 만족도가 높은 브랜드입니다.</p>` },
  { id: 'brand_nerdy', aliases: ['nerdy', '널디'], name: 'NERDY | 널디', category: 'Athleisure', logo: '', thumbnail: '',
    contentVersion: 2, contentHtml: `<h2>NERDY | 널디</h2><h3>1. 브랜드 히스토리 &amp; 아이덴티티</h3><p>널디는 2015년 서울에서 론칭된 K-팝 감성의 애슬레저 브랜드입니다. 레트로 스포츠웨어에서 영감받은 트랙수트, 강렬한 컬러 블록, 보라색·파스텔 계열의 대담한 컬러 팔레트로 빠르게 국내외 팬덤을 형성했습니다. 특히 BTS, BLACKPINK 등 K-팝 아티스트들이 착용하며 글로벌 인지도를 높였습니다.</p><p>널디의 아이덴티티는 <b>에너지와 색감</b>입니다. 어두운 무드의 스트리트웨어가 많은 시장에서 밝고 경쾌한 컬러로 차별화하며, "스포츠웨어도 패션이 될 수 있다"는 메시지를 일관되게 전달합니다. 트랙수트 셋업이 시그니처이며, 상하의를 세트로 맞춰 입는 것이 가장 널디다운 스타일입니다.</p><blockquote>널디는 편안한 스포츠웨어에 밝은 개성을 더하고 싶은 고객에게 어울립니다.</blockquote><h3>2. 브랜드 스타일링 코디 추천</h3><p>널디는 '컬러'가 핵심입니다. 컬러를 어떻게 활용하느냐에 따라 스타일의 느낌이 달라집니다.</p><ul><li><b>트랙수트 셋업 룩</b> 상하의 세트로 맞추는 것이 널디의 정석입니다. 같은 컬러 셋업에 화이트 스니커즈를 더하면 깔끔하고 에너지 있는 스타일이 완성됩니다.</li><li><b>컬러 포인트 믹스</b> 보라색·파스텔 톤 상의를 블랙 팬츠와 매치하면 컬러의 부담을 줄이면서 포인트가 살아납니다. 색을 두려워하지 않아도 되는 방식입니다.</li><li><b>캐주얼 믹스 룩</b> 트랙 재킷을 데님이나 와이드 팬츠와 조합하면 운동복 느낌을 줄이고 일상적으로 입기 편한 스타일이 됩니다.</li></ul><p><b>셀렉상회 추천</b> 평소 무채색 옷이 많은 고객에게 널디 아이템 하나를 제안하면 분위기가 확 바뀝니다. 작은 컬러 포인트부터 시작해 보세요.</p>` },

function copyCatalogBrand(b) {
  return { id: b.id || uid(), name: b.name, category: b.category || '', logo: b.logo || '', thumbnail: b.thumbnail || '', contentHtml: b.contentHtml || '', contentVersion: b.contentVersion || 1 };
}
function normalizeBrandName(name) {
  return String(name || '').toLowerCase().replace(/[^a-z0-9가-힣]/g, '');
}
function isEmptyContent(html) {
  return !String(html || '').trim() || /준비된 콘텐츠가 없습니다/.test(String(html));
}
function mergeBrandCatalog(list, deletedIds = []) {
  let changed = false;
  const out = Array.isArray(list) ? list.map(b => Object.assign({}, b)) : [];
  DEFAULT_BRAND_CONTENT.forEach(catalogBrand => {
    // 삭제된 브랜드는 절대 복원하지 않음
    if (deletedIds.includes(catalogBrand.id)) return;
    const keys = [catalogBrand.name, ...(catalogBrand.aliases || [])].map(normalizeBrandName);
    const existing = out.find(b => {
      const brandKey = normalizeBrandName(b.name);
      if (!brandKey) return false;
      return keys.some(key => brandKey.includes(key) || key.includes(brandKey));
    });
    if (existing) {
      const shouldUpgrade = existing.id === catalogBrand.id && (existing.contentVersion || 0) < (catalogBrand.contentVersion || 1);
      if (isEmptyContent(existing.contentHtml) || shouldUpgrade) {
        existing.contentHtml = catalogBrand.contentHtml;
        existing.contentVersion = catalogBrand.contentVersion || 1;
        changed = true;
      }
      if (catalogBrand.logo && existing.logo !== catalogBrand.logo) {
        existing.logo = catalogBrand.logo;
        changed = true;
      }
      if (!existing.category && catalogBrand.category) {
        existing.category = catalogBrand.category;
        changed = true;
      }
      return;
    }
    out.push(copyCatalogBrand(catalogBrand));
    changed = true;
  });
  return { list: out, changed };
}
function migrateBlocksToHtml(b) {
  if (b.contentHtml !== undefined) return b;
  let html = '';
  (b.blocks || []).forEach(bk => {
    if (bk.type === 'heading') html += `<h2>${esc(bk.value || '')}</h2>`;
    else if (bk.type === 'text') html += `<p>${esc(bk.value || '').replace(/\n/g,'<br>')}</p>`;
    else if (bk.type === 'image' && bk.src) html += `<p><img src="${bk.src}" alt=""></p>`;
    else if (bk.type === 'video' && bk.src) html += `<p><video src="${bk.src}" controls playsinline></video></p>`;
  });
  return { id: b.id, name: b.name, category: b.category || '', logo: b.logo || '', thumbnail: '', contentHtml: html };
}
function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

let brands = [];

let currentEditingId = null;
let isAdminAuthed = false;

/* ============================================================
   홈 렌더 (썸네일 + 제목만)
============================================================ */
function renderHome() {
  document.getElementById('plaza-title').textContent = settings.title || DB.DEFAULT_SETTINGS.title;
  document.getElementById('plaza-sub').textContent   = settings.subtitle || DB.DEFAULT_SETTINGS.subtitle;

  const grid = document.getElementById('brand-grid');
  grid.innerHTML = '';
  if (!brands.length) {
    grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:80px 20px; opacity:.5;">등록된 브랜드가 없습니다.<br>관리자 페이지에서 추가해 주세요.</div>';
    return;
  }
  brands.forEach(b => {
    const card = document.createElement('div');
    card.className = 'brand-card';
    const thumb = thumbnailForBrand(b);
    const initial = (b.name || '?').charAt(0).toUpperCase();
    card.innerHTML = `
      ${thumb
        ? `<img class="thumb" src="${thumb}" alt="${esc(b.name)}">`
        : cardFallbackHtml(b.name || initial)}
      <div class="title-overlay">
        <div class="t-name">${esc(b.name || '(이름 없음)')}</div>
      </div>
    `;
    const img = card.querySelector('.thumb');
    if (img) {
      img.onerror = () => {
        img.replaceWith(htmlToNode(cardFallbackHtml(b.name || initial)));
      };
    }
    card.onclick = () => openBrand(b.id);
    grid.appendChild(card);
  });
}
function htmlToNode(html) {
  const wrap = document.createElement('div');
  wrap.innerHTML = html.trim();
  return wrap.firstElementChild;
}
function brandDisplayName(name) {
  return String(name || '?').split('|')[0].trim() || String(name || '?').trim();
}
function cardFallbackHtml(name) {
  return `<div class="no-thumb logo-text">${esc(brandDisplayName(name))}</div>`;
}
function isGeneratedLogoAsset(src) {
  return /^assets\/logos\/[^?#]+\.svg(?:\?[^#]*)?(?:#.*)?$/i.test(String(src || ''));
}
function manualThumbnailForBrand(b) {
  return b && b.thumbnail && !isGeneratedLogoAsset(b.thumbnail) ? b.thumbnail : '';
}
function thumbnailForBrand(b) {
  return manualThumbnailForBrand(b) || firstImageFromHtml(b?.contentHtml) || b?.logo || '';
}
function firstImageFromHtml(html) {
  if (!html) return '';
  const m = html.match(/<img[^>]+src="([^"]+)"/i);
  return m ? m[1] : '';
}

/* ============================================================
   상세 팝업
============================================================ */
function openBrand(id) {
  const b = brands.find(x => x.id === id);
  if (!b) return;
  document.getElementById('modal-title').textContent = b.name;
  document.getElementById('modal-cat').textContent = b.category || '';
  const logoEl = document.getElementById('modal-logo');
  logoEl.innerHTML = b.logo ? `<img src="${b.logo}" alt="${esc(b.name)} 로고">` : esc((b.name||'?').charAt(0).toUpperCase());
  const logoImg = logoEl.querySelector('img');
  if (logoImg) {
    logoImg.onerror = () => {
      logoEl.textContent = brandDisplayName(b.name).charAt(0).toUpperCase();
    };
  }

  const body = document.getElementById('modal-body');
  body.innerHTML = `
    <div class="post-content">${b.contentHtml || '<p style="opacity:.5">준비된 콘텐츠가 없습니다.</p>'}</div>
    <button class="close-big" onclick="closeBrand()">닫기</button>
  `;
  body.querySelectorAll('.post-content img').forEach(img => {
    img.onerror = () => {
      img.replaceWith(htmlToNode(`<div class="content-logo-fallback">${esc(brandDisplayName(b.name))}</div>`));
    };
  });
  body.querySelectorAll('video').forEach(v => { v.controls = true; v.playsInline = true; });
  document.getElementById('brand-modal').classList.remove('hidden');
}
function closeBrand() { document.getElementById('brand-modal').classList.add('hidden'); }
document.getElementById('modal-close').onclick = closeBrand;
document.getElementById('brand-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('brand-modal')) closeBrand();
});

/* ============================================================
   관리자 진입
============================================================ */
function openAdmin() {
  if (isAdminAuthed) { showAdminPanel(); return; }
  document.getElementById('admin-login').classList.remove('hidden');
  document.getElementById('admin-pw').value = '';
  document.getElementById('admin-err').textContent = '';
  setTimeout(() => document.getElementById('admin-pw').focus(), 100);
}
function closeAdmin() {
  document.getElementById('admin-login').classList.add('hidden');
  document.getElementById('admin-panel').classList.add('hidden');
  if (location.hash) history.replaceState(null,'',location.pathname);

let editMode = false;
let dragSrcId = null;
let touchDragId = null;
let touchClone = null;

function renderAdminBoardGrid() {
  const grid = document.getElementById('admin-board-grid');
  grid.innerHTML = '';

  brands.forEach((b) => {
    const card = document.createElement('div');
    card.className = 'admin-board-card' + (editMode ? ' edit-mode' : '');
    card.dataset.id = b.id;

    const initial = (b.name || '?').charAt(0).toUpperCase();
    const thumb = thumbnailForBrand(b);
    const thumbHtml = thumb
      ? `<img class="card-thumb" src="${esc(thumb)}">`
      : `<div class="card-thumb-placeholder">${esc(initial)}</div>`;

    card.innerHTML = `
      <button class="card-delete-btn" data-id="${b.id}">✕</button>
      <button class="card-edit-btn" data-id="${b.id}">✏</button>
      <div class="card-inner">
        ${thumbHtml}
        <div class="card-info">
          <div class="card-name">${esc(b.name || '(이름 없음)')}</div>
          <div class="card-cat">${esc(b.category || '')}</div>
        </div>
      </div>`;

    // 삭제 버튼
    const deleteHandler = async (e) => {
      e.stopPropagation(); e.preventDefault();
      const bid = e.currentTarget.dataset.id;
      const br = brands.find(x => x.id === bid);
      if (!confirm(`"${br?.name}" 보드를 삭제할까요?`)) return;
      const cloudUrls = extractCloudinaryUrls(br);
      brands = brands.filter(x => x.id !== bid);
      await DB.deleteBrandById(bid);
      renderAdminBoardGrid();
      toast('삭제했습니다');
      if (cloudUrls.length) showCloudinaryDeleteInfo(br.name, cloudUrls);
    };
    card.querySelector('.card-delete-btn').addEventListener('touchend', deleteHandler);
    card.querySelector('.card-delete-btn').addEventListener('click', deleteHandler);

    const editHandler = (e) => {
      e.stopPropagation(); e.preventDefault();
      openEditorForBrand(b.id);
    };
    card.querySelector('.card-edit-btn').addEventListener('touchend', editHandler);
    card.querySelector('.card-edit-btn').addEventListener('click', editHandler);

    // 길게 누르기 → 편집 모드 진입
    let pressTimer = null;
    let didLongPress = false;
    card.addEventListener('touchstart', (e) => {
      didLongPress = false;
      if (editMode) return;
      pressTimer = setTimeout(() => {
        pressTimer = null;
        didLongPress = true;
        enterEditMode();
      }, 600);
    }, { passive: true });

    card.addEventListener('touchend', (e) => {
      if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
      if (didLongPress) { didLongPress = false; return; }
      // 짧은 탭 — 편집 모드에서는 아무것도 안 함 (✏ 버튼으로만 에디터 진입)
    });

    card.addEventListener('touchmove', () => {
      if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
    });

    card.addEventListener('click', () => {
      if (editMode) {
        openEditorForBrand(b.id);
        return;
      }
      // 일반 모드: 한 번 탭 → 에디터
      openEditorForBrand(b.id);
    });

    // 드래그 — 터치(iOS/Android) + 마우스(Mac/Windows/iPad) 통합
    if (editMode) {
      // ── 마우스/트랙패드 드래그 ──
      card.draggable = true;
      card.addEventListener('dragstart', (e) => {
        dragSrcId = b.id;
        card.style.opacity = '.4';
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', b.id);
      });
      card.addEventListener('dragend', () => {
        card.style.opacity = '1';
        document.querySelectorAll('.admin-board-card').forEach(c => c.classList.remove('dragging-over'));
      });
      card.addEventListener('dragover', (e) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        if (b.id !== dragSrcId) card.classList.add('dragging-over');
      });
      card.addEventListener('dragleave', () => card.classList.remove('dragging-over'));
      card.addEventListener('drop', async (e) => {
        e.preventDefault();
        card.classList.remove('dragging-over');
        const fromId = e.dataTransfer.getData('text/plain');
        if (!fromId || fromId === b.id) return;
        const from = brands.findIndex(x => x.id === fromId);
        const to   = brands.findIndex(x => x.id === b.id);
        if (from < 0 || to < 0) return;
        const [moved] = brands.splice(from, 1);
        brands.splice(to, 0, moved);
        await DB.save(brands);
        renderAdminBoardGrid();
        toast('순서를 변경했습니다');
      });

      // ── 터치 드래그 (iOS / Android) ──
      card.addEventListener('touchstart', (e) => {
        touchDragId = b.id;
        card.style.opacity = '.5';
      }, { passive: true });

      card.addEventListener('touchmove', (e) => {
        if (!touchDragId || touchDragId !== b.id) return;
        e.preventDefault();
        const touch = e.touches[0];
        document.querySelectorAll('.admin-board-card').forEach(c => c.classList.remove('dragging-over'));
        const els = document.elementsFromPoint(touch.clientX, touch.clientY);
        const target = els.find(el => el.classList.contains('admin-board-card') && el.dataset.id && el.dataset.id !== touchDragId);
        if (target) target.classList.add('dragging-over');
      }, { passive: false });

      card.addEventListener('touchend', async (e) => {
        if (!touchDragId || touchDragId !== b.id) return;
        card.style.opacity = '1';
        const touch = e.changedTouches[0];
        document.querySelectorAll('.admin-board-card').forEach(c => c.classList.remove('dragging-over'));
        const els = document.elementsFromPoint(touch.clientX, touch.clientY);
        const target = els.find(el => el.classList.contains('admin-board-card') && el.dataset.id && el.dataset.id !== touchDragId);
        if (target) {
          const from = brands.findIndex(x => x.id === touchDragId);
          const to   = brands.findIndex(x => x.id === target.dataset.id);
          if (from >= 0 && to >= 0) {
            const [moved] = brands.splice(from, 1);
            brands.splice(to, 0, moved);
            await DB.save(brands);
            renderAdminBoardGrid();
            toast('순서를 변경했습니다');
          }
        }
        touchDragId = null;
      });
    }

    grid.appendChild(card);
  });
}

/* Cloudinary URL 추출 헬퍼 */
function extractCloudinaryUrls(b) {
  const urls = [];
  if (b.logo && b.logo.includes('cloudinary.com')) urls.push(b.logo);
  if (b.thumbnail && b.thumbnail.includes('cloudinary.com')) urls.push(b.thumbnail);
  // 본문에서 이미지/영상 URL 추출
  const parser = new DOMParser();
  const doc = parser.parseFromString(b.contentHtml || '', 'text/html');
  doc.querySelectorAll('img, video').forEach(el => {
    const src = el.src || el.getAttribute('src') || '';
    if (src.includes('cloudinary.com')) urls.push(src);
  });
  return [...new Set(urls)];
}

function showCloudinaryDeleteInfo(brandName, urls) {
  if (!urls.length) return;
  const list = urls.map(u => `• ${u}`).join('\n');
  alert(`"${brandName}" 보드의 Cloudinary 파일 목록:\n\n${list}\n\nCloudinary Media Library에서 위 파일들을 삭제하면 용량을 회수할 수 있어요.`);
}

}

/* --- WYSIWYG 바인딩 --- */
function bindRichTextEditor(b) {
  const editor = document.getElementById('rte-editor');
  const toolbar = document.getElementById('rte-toolbar');

  toolbar.addEventListener('mousedown', e => {
    if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'SELECT') e.preventDefault();
  });

  toolbar.querySelectorAll('button[data-cmd]').forEach(btn => {
    btn.onclick = () => {
      editor.focus();
      document.execCommand(btn.dataset.cmd, false, null);
      syncContent(b);
    };
  });
  document.getElementById('rte-block').onchange = (e) => { editor.focus(); document.execCommand('formatBlock', false, e.target.value); syncContent(b); };
  document.getElementById('rte-font').onchange  = (e) => { editor.focus(); if (e.target.value) document.execCommand('fontName', false, e.target.value); syncContent(b); };
  document.getElementById('rte-size').onchange  = (e) => { editor.focus(); document.execCommand('fontSize', false, e.target.value); syncContent(b); };
  document.getElementById('rte-fg').oninput     = (e) => { editor.focus(); document.execCommand('foreColor', false, e.target.value); syncContent(b); };
  document.getElementById('rte-bg').oninput     = (e) => { editor.focus(); document.execCommand('hiliteColor', false, e.target.value); syncContent(b); };
  document.getElementById('rte-link').onclick   = () => {
    const url = prompt('링크 URL'); if (!url) return;
    editor.focus(); document.execCommand('createLink', false, url); syncContent(b);
  };
  document.getElementById('rte-hr').onclick = () => {
    editor.focus(); document.execCommand('insertHorizontalRule'); syncContent(b);
  };

  document.getElementById('rte-img').onchange = (e) => insertMediaFromFile(e, 'img', b);
  document.getElementById('rte-vid').onchange = (e) => insertMediaFromFile(e, 'video', b);

  // 미디어 선택
  editor.addEventListener('click', e => {
    const prev = editor.querySelector('.media-selected');
    if (prev) prev.classList.remove('media-selected');
    if (e.target.tagName === 'IMG' || e.target.tagName === 'VIDEO') {
      selectedMedia = e.target;
      e.target.classList.add('media-selected');
    } else {
      selectedMedia = null;
    }
  });

  // 선택 미디어 삭제 — 툴바 🗑 버튼
  document.getElementById('rte-del-media').onclick = () => {
    if (!selectedMedia) { toast('먼저 이미지나 영상을 클릭해서 선택하세요'); return; }
    deleteSelectedMedia(b);
  };

  // 선택 미디어 삭제 — Delete / Backspace 키
  editor.addEventListener('keydown', e => {
    if ((e.key === 'Delete' || e.key === 'Backspace') && selectedMedia) {
      e.preventDefault();
      deleteSelectedMedia(b);
    }
  });

  // 이미지 좌/중/우 정렬
  document.getElementById('img-left').onclick   = () => alignMedia('left', b);
  document.getElementById('img-center').onclick = () => alignMedia('center', b);
  document.getElementById('img-right').onclick  = () => alignMedia('right', b);

  editor.addEventListener('input', () => syncContent(b));
  editor.addEventListener('blur',  () => syncContent(b));
  editor.addEventListener('paste', (e) => {
    const imageFiles = getClipboardImageFiles(e.clipboardData || window.clipboardData);
    if (imageFiles.length) {
      e.preventDefault();
      const selection = window.getSelection();
      const range = selection && selection.rangeCount ? selection.getRangeAt(0).cloneRange() : null;
      insertPastedImages(imageFiles, b, range);
      return;
    }
    e.preventDefault();
    const text = (e.clipboardData || window.clipboardData).getData('text/plain');
    document.execCommand('insertText', false, text);
  });
}

function getClipboardImageFiles(clipboardData) {
  if (!clipboardData) return [];
  const files = [];
  Array.from(clipboardData.items || []).forEach(item => {
    if (item.kind === 'file' && item.type.startsWith('image/')) {
      const file = item.getAsFile();
      if (file) files.push(file);
    }
  });
  Array.from(clipboardData.files || []).forEach(file => {
    if (file.type.startsWith('image/') && !files.includes(file)) files.push(file);
  });
  return files;
}

async function insertPastedImages(files, b, range) {
  for (const file of files) {
    await insertMediaFile(file, 'img', b, {

/* 용량 제한 없이 업로드 — FileReader로 data URL 인코딩
   (IndexedDB는 용량 제한이 사실상 없음: 로컬 디스크 가용량 기반) */
/* Cloudinary 업로드 헬퍼 */
const CLOUDINARY_CLOUD = 'dqlyodqiw';
const CLOUDINARY_PRESET = 'nmhttl5r';

async function uploadToCloudinary(file) {
  const isVideo = file.type.startsWith('video/');
  const resourceType = isVideo ? 'video' : 'image';
  const fd = new FormData();
  fd.append('file', file);
  fd.append('upload_preset', CLOUDINARY_PRESET);
  if (isVideo) {
    // 영상 자동 압축 최적화
    fd.append('quality', 'auto');
    fd.append('fetch_format', 'auto');
  } else {
    // 이미지 자동 압축 최적화
    fd.append('quality', 'auto');
    fd.append('fetch_format', 'auto');
  }
  const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/${resourceType}/upload`, {
    method: 'POST', body: fd
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || 'Cloudinary 업로드 실패');
  }
  const data = await res.json();
  return data.secure_url;
}

function restoreEditorSelection(range) {
  if (!range) return;
  const selection = window.getSelection();
  if (!selection) return;

async function insertMediaFile(file, kind, b, options = {}) {
  if (!file) return;

  status.innerHTML = `<span class="uploading">${options.label || `Cloudinary 업로드 중… ${(file.size/1024/1024).toFixed(1)}MB`}</span>`;
  try {
    const url = await uploadToCloudinary(file);
    status.innerHTML = '';
    const editor = document.getElementById('rte-editor');
    editor.focus();
    restoreEditorSelection(options.range);
    let html = '';
    if (kind === 'img') html = `<p><img src="${url}" alt=""></p><p><br></p>`;
    else html = `<p><video src="${url}" controls playsinline></video></p><p><br></p>`;
    document.execCommand('insertHTML', false, html);
    syncContent(b);
  } catch(e) {
    status.innerHTML = '';
    toast('업로드 실패: ' + e.message);
  }
}

function exportData() {
  commitEditorToModel();
  const payload = {
    app: 'BrandPlaza',
    version: 1,
    exportedAt: new Date().toISOString(),
    brands: brands,
    settings: settings
  };
  const json = JSON.stringify(payload, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const ts = new Date().toISOString().slice(0,10);
  a.download = `brandplaza-backup-${ts}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  toast('백업 파일을 내려받았습니다');
}

function importData(ev) {
  const file = ev.target.files[0]; ev.target.value = '';
  if (!file) return;
  if (!confirm('현재 데이터를 백업 파일의 내용으로 덮어씁니다. 계속할까요?')) return;
  const reader = new FileReader();
  reader.onload = async () => {
    try {
      const data = JSON.parse(reader.result);
      if (!data || !Array.isArray(data.brands)) throw new Error('형식 오류');
      brands = data.brands;
      await DB.save(brands);
      if (data.settings && typeof data.settings === 'object') {
        settings = Object.assign({}, settings, data.settings);
        DB.saveSettings(settings);
      }
      currentEditingId = brands[0]?.id || null;
      renderAdminList();
      renderEditor();
      renderHome();
      toast(`백업을 가져왔습니다 (브랜드 ${brands.length}개)`);
    } catch (e) {
      console.error(e);
      toast('백업 파일을 읽을 수 없습니다 (형식 오류)');
    }
  };
  reader.onerror = () => toast('파일을 읽지 못했습니다');
  reader.readAsText(file);
}

function showSettings() {
  const newTitle = prompt('키오스크 타이틀', settings.title || DB.DEFAULT_SETTINGS.title);
  if (newTitle === null) return;

}

/* Safe Area 동적 감지 — CSS 변수 + JS 직접 적용 */
(function() {
  function applyPadding() {
    // CSS env() 값을 JS로 읽어서 직접 적용
    const testEl = document.createElement('div');
    testEl.style.cssText = 'position:fixed;inset:0;padding:env(safe-area-inset-top,0px) env(safe-area-inset-right,0px) env(safe-area-inset-bottom,0px) env(safe-area-inset-left,0px);pointer-events:none;visibility:hidden;';
    document.body.appendChild(testEl);
    const cs = getComputedStyle(testEl);
    const top = parseFloat(cs.paddingTop) || 0;
    const bot = parseFloat(cs.paddingBottom) || 0;
    document.body.removeChild(testEl);

    const headerPad = Math.max(top + 10, 52);
    const footerPad = Math.max(bot, 8);

    // 헤더에 직접 적용
    const header = document.querySelector('#kiosk-home header');
    if (header) header.style.paddingTop = headerPad + 'px';

    // 어드민 헤더에도 적용
    document.querySelectorAll('.admin-header').forEach(h => {
      h.style.paddingTop = headerPad + 'px';
    });

    // 푸터 하단 패딩
    const footer = document.querySelector('.home-footer');
    if (footer) footer.style.paddingBottom = footerPad + 'px';
  }

  // 즉시 + 로드 후 + 리사이즈 시 적용
  applyPadding();
  window.addEventListener('load', applyPadding);
  window.addEventListener('resize', applyPadding);
  // PWA에서 안전하게 적용되도록 약간 딜레이 후 재적용
  setTimeout(applyPadding, 300);
  setTimeout(applyPadding, 1000);
})();

/* ============================================================
   키오스크 잠금 — 브라우저 내에서 차단 가능한 이탈 경로 차단
   (OS 레벨 홈버튼/앱스위처는 OS 설정 필요 — README 참고)
============================================================ */
(function lockDown() {
  const isInInput = (el) => {
    if (!el || !el.closest) return false;
    return !!(el.closest('input, textarea, [contenteditable="true"]'));
  };

  // 1) 우클릭 컨텍스트 메뉴 차단 (편집 영역은 허용)
  document.addEventListener('contextmenu', e => {
    if (isInInput(e.target)) return;
    e.preventDefault();
  });

  // 2) 키보드 단축키 차단
  document.addEventListener('keydown', e => {
    const key = e.key;
    const ctrl = e.ctrlKey || e.metaKey;
    const inInput = isInInput(e.target);

    // 새로고침 / 전체화면 / 개발자도구 — 무조건 차단
    if (key === 'F5' || key === 'F11' || key === 'F12') { e.preventDefault(); return; }
    if (ctrl && ['r','R','w','W','n','N','t','T','p','P','s','S','o','O','u','U','h','H','f','F','g','G','l','L'].includes(key)) {
      e.preventDefault(); return;
    }
    if (ctrl && e.shiftKey && ['i','I','j','J','c','C','r','R','t','T','n','N','w','W','p','P'].includes(key)) {
      e.preventDefault(); return;
    }
    if (e.altKey && (key === 'ArrowLeft' || key === 'ArrowRight')) { e.preventDefault(); return; } // Alt+← 뒤로가기

    // 입력창 바깥에서는 백스페이스 탐색 차단
    if (key === 'Backspace' && !inInput) { e.preventDefault(); return; }
  });

  // 3) Ctrl+휠 줌 차단
  document.addEventListener('wheel', e => {
    if (e.ctrlKey || e.metaKey) e.preventDefault();
  }, { passive: false });

  // 4) 뒤로가기 제스처(iOS 가장자리 스와이프, Android 백제스처) 차단
  try {
    history.pushState({ lock: true }, '', location.href);
    window.addEventListener('popstate', () => {
      history.pushState({ lock: true }, '', location.href);
    });
  } catch {}

  // 5) 드래그 앤 드롭 차단 (관리자 브랜드 순서변경은 허용)
  document.addEventListener('dragstart', e => {
    if (e.target.closest && e.target.closest('.brand-list li')) return;
    e.preventDefault();
  });
  document.addEventListener('drop', e => e.preventDefault());

  // 6) 외부 링크 이동 차단
  document.addEventListener('click', e => {
    const a = e.target.closest && e.target.closest('a[href]');
    if (!a) return;
    const href = a.getAttribute('href') || '';
    if (href.startsWith('#')) return;
    e.preventDefault();
  });

  // 7) 탭/창 닫기 시도 시 경고 (브라우저에 따라 동작)
  window.addEventListener('beforeunload', (e) => {
    // 관리자 모드에서 의도치 않은 이탈 방지
    e.preventDefault();
    e.returnValue = '';
  });
})();

  const HEADLINES = [
    '화면을\n터치하세요',
    '취향을\n발견하세요',
    '스타일을\n찾아보세요',
    'Your\nStyle.',
    '브랜드\n스토리',
    '셀렉\n상회',
  ];

  /* ── 뱃지 문구 풀 (영문 5 + 국문 5) ── */
  const BADGE_WORDS = [
    { text: 'SELECT',    lang: 'en' },
    { text: 'CURATED',   lang: 'en' },
    { text: 'ONLY ONE',  lang: 'en' },
    { text: 'DISCOVER',  lang: 'en' },
    { text: 'YOUR STYLE',lang: 'en' },
    { text: '선택',       lang: 'ko' },
    { text: '기준',       lang: 'ko' },
    { text: '단 하나',    lang: 'ko' },
    { text: '발견',       lang: 'ko' },
    { text: '취향',       lang: 'ko' },
  ];

  /* ── 뱃지 팔레트 ── */
  const PALETTE = [
    { bg: '#e8453c', color: '#fff' },
    { bg: '#f5a623', color: '#111' },
    { bg: '#f5e642', color: '#111' },
    { bg: '#85d06e', color: '#111' },
    { bg: '#6dd6c8', color: '#111' },
    { bg: '#6b5ce7', color: '#fff' },
    { bg: '#fff',    color: '#111' },
    { bg: '#d4e8a0', color: '#111' },
    { bg: '#e8a020', color: '#111' },
    { bg: '#e8e8e8', color: '#111' },
  ];

  /* ── 뱃지 모양 ── */
  const SHAPES = ['circle', 'pill', 'rect', 'tag'];

  /* ── 뱃지 크기 설정 ── */
  const SIZES = [
    { w: 110, h: 110 }, // circle small
    { w: 140, h: 140 }, // circle large
    { w: 130, h: 58  }, // pill narrow
    { w: 160, h: 68  }, // pill wide
    { w: 130, h: 62  }, // rect
    { w: 110, h: 56  }, // tag
  ];

  const ssEl     = document.getElementById('screensaver');
  const badgesEl = document.getElementById('ss-badges');
  const hlTextEl = document.getElementById('ss-headline-text');

  let ssActive  = false;
  let idleTimer = null;
  let hlTimer   = null;
  let hlIdx     = 0;

  function rnd(a, b) { return a + Math.random() * (b - a); }
  function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  /* ── 뱃지 5개 랜덤 생성 ── */
  function buildBadges() {
    badgesEl.innerHTML = '';
    const containerW = window.innerWidth;
    const containerH = badgesEl.offsetHeight || 160;

    // 문구 풀에서 5개 랜덤 선택 (중복 없이)
    const shuffled = [...BADGE_WORDS].sort(() => Math.random() - 0.5).slice(0, 5);

    // 가로로 겹치지 않게 균등 분배
    const slotW = containerW / 5;

    shuffled.forEach((word, i) => {
      const shape   = pick(SHAPES);
      const palette = pick(PALETTE);
      const sizeOpt = pick(SIZES);
      const isCircle = shape === 'circle';
      const w = isCircle ? sizeOpt.w : sizeOpt.w + Math.floor(rnd(-20, 20));
      const h = isCircle ? sizeOpt.w : sizeOpt.h;
      const rot = rnd(-12, 12);
      const fy  = rnd(-14, -8);
      const dur = rnd(3.5, 6.5);
      const delay = rnd(0, 2);

      // 각 슬롯 안에서 랜덤 X
      const slotLeft = slotW * i;
      const left = slotLeft + rnd(4, slotW - w - 4);
      const top  = rnd(4, Math.max(5, containerH - h - 4));

      const fontSize = isCircle
        ? (w >= 130 ? '22px' : '18px')
        : (word.lang === 'ko' ? '17px' : '15px');

      const el = document.createElement('div');
      el.className = 'ss-badge ' + shape;
      el.style.cssText = `
        background:${palette.bg};
        color:${palette.color};
        left:${left}px;
        top:${top}px;
        width:${w}px;
        height:${h}px;
        font-size:${fontSize};
        --ss-rot:rotate(${rot}deg);
        --ss-fy:${fy}px;
        animation-duration:${dur}s;
        animation-delay:${delay}s;
      `;
      el.textContent = word.text;
      badgesEl.appendChild(el);
    });
  }

  /* ── 헤드라인 순환 ── */
  function cycleHeadline() {
    if (!ssActive) return;
    hlTextEl.classList.remove('ss-visible');
    setTimeout(() => {
      if (!ssActive) return;
      hlIdx = (hlIdx + 1) % HEADLINES.length;
      hlTextEl.textContent = HEADLINES[hlIdx];
      // 뱃지도 같이 교체 (번인 방지 — 위치 변경)
      buildBadges();
      requestAnimationFrame(() => requestAnimationFrame(() => {
        if (ssActive) hlTextEl.classList.add('ss-visible');
      }));
      hlTimer = setTimeout(cycleHeadline, 4000);
    }, 500);
  }

  /* ── 시작 ── */
  function startScreensaver() {
    if (ssActive) return;
    const adminOpen = ['admin-login','admin-panel','admin-editor-view']
      .some(id => !document.getElementById(id)?.classList.contains('hidden'));
    if (adminOpen) { resetIdleTimer(); return; }

    ssActive = true;
    hlIdx = Math.floor(Math.random() * HEADLINES.length);
    hlTextEl.textContent = HEADLINES[hlIdx];
    buildBadges();
    ssEl.classList.add('ss-active');
    setTimeout(() => {
      if (!ssActive) return;
      hlTextEl.classList.add('ss-visible');
      hlTimer = setTimeout(cycleHeadline, 4000);
    }, 400);
  }

  /* ── 해제 ── */
  function dismissScreensaver() {
    if (!ssActive) return;
    ssActive = false;
    clearTimeout(hlTimer);
    hlTextEl.classList.remove('ss-visible');
    ssEl.classList.add('ss-dismissing');
    setTimeout(() => ssEl.classList.remove('ss-active', 'ss-dismissing'), 1100);
    resetIdleTimer();
  }

  function resetIdleTimer() {
    clearTimeout(idleTimer);
    idleTimer = setTimeout(startScreensaver, SS_IDLE_MS);
  }

  ['touchmove','mousemove','keydown','scroll'].forEach(evt => {
    document.addEventListener(evt, () => {
      if (ssActive) { dismissScreensaver(); return; }
      resetIdleTimer();
    }, { passive: true });
  });
  document.addEventListener('touchstart', (e) => {
    if (ssActive) { dismissScreensaver(); return; }
    resetIdleTimer();
  }, { passive: true });

  ssEl.addEventListener('click',      dismissScreensaver);
  ssEl.addEventListener('touchstart', dismissScreensaver, { passive: true });

  resetIdleTimer();
})();

/* 초기화 */
(async function init() {
  try { brands = await DB.load(); }
  catch (e) { console.error(e); brands = []; }
  renderHome();
  updateFsState();
  if (location.hash === '#admin') openAdmin();
  // 실시간 동기화 — 다른 기기에서 변경되면 자동 반영
  DB.listenBrands((list) => {
    brands = list;
    renderHome();
    const adminPanel = document.getElementById('admin-panel');
    if (adminPanel && !adminPanel.classList.contains('hidden')) renderAdminBoardGrid();
  });
})();
</script>
