<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>슬라이드쇼 디스플레이</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width:100%; height:100%; background:#000; overflow:hidden; font-family:'Apple SD Gothic Neo','Noto Sans KR',system-ui,sans-serif; }
  #stage { position:relative; width:100%; height:100%; overflow:hidden; }
  .slide { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; }
  .slide-bg { position:absolute; inset:-40px; background-size:cover; background-position:center; filter:blur(28px) brightness(.45) saturate(1.3); transform:scale(1.1); }
  .slide-img { position:relative; z-index:1; max-width:100%; max-height:100%; object-fit:contain; display:none; }
  .slide-vid { position:relative; z-index:1; width:100%; height:100%; object-fit:contain; display:none; background:#000; }
  .ov-box { position:absolute; z-index:50; border-radius:16px; display:none; overflow:hidden; pointer-events:none; transition:outline .15s; border:1px solid rgba(255,255,255,0.10); backdrop-filter:blur(20px) saturate(1.5); -webkit-backdrop-filter:blur(20px) saturate(1.5); }
  .ov-box.on { display:block; }
  .ov-box.edit-active { pointer-events:auto; cursor:move; }
  .ov-box.selected { outline:2px solid rgba(124,106,247,0.9); outline-offset:3px; overflow:visible; }
  .ov-box-inner { width:100%; height:100%; overflow:hidden; display:flex; align-items:center; justify-content:center; }
  .ov-box-inner.desc-inner { align-items:center; justify-content:center; overflow-y:auto; }
  #ov-description { line-height:1.8; white-space:pre-wrap; display:block; padding:0 24px; width:100%; }
  .edit-handle { position:absolute; width:12px; height:12px; background:#7c6af7; border:2px solid #fff; border-radius:3px; z-index:61; display:none; pointer-events:auto; }
  .ov-box.selected .edit-handle { display:block; }
  .edit-handle.tl{top:-6px;left:-6px;cursor:nw-resize;} .edit-handle.tr{top:-6px;right:-6px;cursor:ne-resize;}
  .edit-handle.bl{bottom:-6px;left:-6px;cursor:sw-resize;} .edit-handle.br{bottom:-6px;right:-6px;cursor:se-resize;}
  .edit-handle.ml{top:50%;left:-6px;transform:translateY(-50%);cursor:w-resize;} .edit-handle.mr{top:50%;right:-6px;transform:translateY(-50%);cursor:e-resize;}
  .edit-handle.mt{top:-6px;left:50%;transform:translateX(-50%);cursor:n-resize;} .edit-handle.mb{bottom:-6px;left:50%;transform:translateX(-50%);cursor:s-resize;}
  .edit-label { position:absolute; top:-22px; left:4px; font-size:10px; color:#7c6af7; font-weight:700; pointer-events:none; display:none; white-space:nowrap; }
  .ov-box.selected .edit-label { display:block; }
  .marquee-outer { width:100%; position:relative; }
  .text-static { display:block; padding:0 28px; white-space:pre-wrap; word-break:break-word; }
  #fs-btn { position:absolute; top:14px; right:14px; z-index:100; width:44px; height:44px; background:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.2); border-radius:10px; color:rgba(255,255,255,0.85); font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity .3s ease,background .2s ease; backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); pointer-events:auto; }
  #fs-btn:hover { background:rgba(255,255,255,0.22); }
  #stage:hover #fs-btn { opacity:1; }
  #no-image { position:absolute; inset:0; display:none; flex-direction:column; align-items:center; justify-content:center; color:#333; z-index:10; }
  #no-image.show { display:flex; }
  #no-image .icon { font-size:80px; margin-bottom:20px; }
  #no-image p { font-size:18px; text-align:center; line-height:1.8; }
  /* 자동재생 오버레이 */
  #autoplay-overlay { position:fixed; inset:0; z-index:9999; background:#000; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; transition:opacity .5s ease; }
  #autoplay-overlay .play-icon { width:80px; height:80px; border-radius:50%; background:rgba(255,255,255,.15); display:flex; align-items:center; justify-content:center; font-size:36px; margin-bottom:16px; border:2px solid rgba(255,255,255,.3); }
  #autoplay-overlay p { color:rgba(255,255,255,.7); font-size:16px; }
</style>
</head>
<body>
<div id="stage">
  <div class="slide" id="slide-a" style="z-index:2;opacity:1;">
    <div class="slide-bg" id="bg-a"></div>
    <img class="slide-img" id="img-a" src="" alt="">
    <video class="slide-vid" id="vid-a" muted playsinline></video>
  </div>
  <div class="slide" id="slide-b" style="z-index:1;opacity:0;">
    <div class="slide-bg" id="bg-b"></div>
    <img class="slide-img" id="img-b" src="" alt="">
    <video class="slide-vid" id="vid-b" muted playsinline></video>
  </div>
  <div class="ov-box" id="ov-top" data-key="main">
    <span class="edit-label">메인 타이틀</span>
    <div class="ov-box-inner"><div class="marquee-outer" id="main-outer"></div></div>
    <div class="edit-handle tl"></div><div class="edit-handle tr"></div><div class="edit-handle bl"></div><div class="edit-handle br"></div>
    <div class="edit-handle ml"></div><div class="edit-handle mr"></div><div class="edit-handle mt"></div><div class="edit-handle mb"></div>
  </div>
  <div class="ov-box" id="ov-sub-wrap" data-key="sub">
    <span class="edit-label">서브 타이틀</span>
    <div class="ov-box-inner"><div class="marquee-outer" id="sub-outer"></div></div>
    <div class="edit-handle tl"></div><div class="edit-handle tr"></div><div class="edit-handle bl"></div><div class="edit-handle br"></div>
    <div class="edit-handle ml"></div><div class="edit-handle mr"></div><div class="edit-handle mt"></div><div class="edit-handle mb"></div>
  </div>
  <div class="ov-box" id="ov-desc-wrap" data-key="desc">
    <span class="edit-label">설명</span>
    <div class="ov-box-inner desc-inner"><div id="ov-description"></div></div>
    <div class="edit-handle tl"></div><div class="edit-handle tr"></div><div class="edit-handle bl"></div><div class="edit-handle br"></div>
    <div class="edit-handle ml"></div><div class="edit-handle mr"></div><div class="edit-handle mt"></div><div class="edit-handle mb"></div>
  </div>
  <button id="fs-btn" onclick="toggleFullscreen()" title="전체화면">⛶</button>
  <div id="no-image" class="show">
    <div class="icon">🖼</div>
    <p>관리자 패널에서<br>이미지 또는 동영상을 추가해 주세요</p>
  </div>
</div>

<!-- 자동재생 오버레이 -->
<div id="autoplay-overlay">
  <div class="play-icon">▶</div>
  <p>화면을 터치하여 시작</p>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script>
// ── Firebase ───────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyCyiK0cunm9T11sLc2E0trgE-q1RxomhV8",
  authDomain: "grace-aea60.firebaseapp.com",
  projectId: "grace-aea60",
  storageBucket: "grace-aea60.firebasestorage.app",
  messagingSenderId: "990582075084",
  appId: "1:990582075084:web:0a9d55fa409c70c9a19c69",
  databaseURL: "https://grace-aea60-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ── 자동재생 오버레이 ──────────────────────────────
(function() {
  const overlay = document.getElementById('autoplay-overlay');
  function activate() {
    overlay.style.opacity = '0';
    overlay.style.pointerEvents = 'none';
    setTimeout(() => { overlay.style.display = 'none'; }, 600);
  }
  overlay.addEventListener('click', activate);
  overlay.addEventListener('touchend', function(e) { e.preventDefault(); activate(); });
  setTimeout(activate, 3000);
})();

// ── 유틸 ──────────────────────────────────────────
const DEFAULT_FONT = "'Apple SD Gothic Neo','Noto Sans KR',system-ui,sans-serif";
function fontToCSS(name) { return (!name||name==='system') ? DEFAULT_FONT : `'${name}',${DEFAULT_FONT}`; }
function isFontAvailable(n) {
  if (!n||n==='system') return true;
  const c=document.createElement('canvas'),ctx=c.getContext('2d'),t='abcdefghij가나다';
  ctx.font='72px monospace'; const dw=ctx.measureText(t).width;
  ctx.font=`72px '${n}',monospace`; return ctx.measureText(t).width!==dw;
}

// ── 상태 ──────────────────────────────────────────
let items=[], settings={interval:5,transition:'fade',transitionSpeed:800};
let curIdx=0, timer=null, busy=false, playing=true, overlay_data={};
let mainAnims=[], subAnims=[];
let editMode=false, selectedBox=null;

const noImage=document.getElementById('no-image');
let active={slide:document.getElementById('slide-a'),bg:document.getElementById('bg-a'),img:document.getElementById('img-a'),vid:document.getElementById('vid-a')};
let inactive={slide:document.getElementById('slide-b'),bg:document.getElementById('bg-b'),img:document.getElementById('img-b'),vid:document.getElementById('vid-b')};
const layouts={main:{top:1.2,left:1.5,width:97,height:0},sub:{top:78,left:1.5,width:97,height:0},desc:{top:86,left:1.5,width:97,height:0}};

// ── Firebase 리스너 ────────────────────────────────
db.ref('slideshow/state').on('value', snap => {
  const data=snap.val(); if (!data) return;
  if (data.settings) settings=data.settings;
  if (data.overlay)  renderOverlay(data.overlay);
  if (data.layouts) { for (const k in data.layouts) { if (layouts[k]) layouts[k]={...layouts[k],...data.layouts[k]}; } applyAllLayouts(); }
  if (typeof data.isPlaying==='boolean') playing=data.isPlaying;
  if (data.images) {
    const wasEmpty=items.length===0;
    items=Object.values(data.images);
    if (!items.length) { noImage.className='show'; return; }
    noImage.className='';
    if (wasEmpty&&playing) { showImmediate(0); scheduleNext(); }
  }
});

db.ref('slideshow/control').on('value', snap => {
  const ctrl=snap.val(); if (!ctrl) return;
  if (ctrl.action==='play') {
    playing=true; [...mainAnims,...subAnims].forEach(a=>{try{a&&a.play();}catch(e){}});
    if (items.length>0) scheduleNext();
  } else if (ctrl.action==='stop') {
    playing=false; stopTimer(); active.vid.pause();
    [...mainAnims,...subAnims].forEach(a=>{try{a&&a.pause();}catch(e){}});
  } else if (ctrl.action==='show'&&typeof ctrl.idx==='number') {
    stopTimer(); transition(ctrl.idx);
  }
});

db.ref('slideshow/editMode').on('value', snap => {
  editMode=!!snap.val();
  document.querySelectorAll('.ov-box').forEach(b=>{
    b.classList.toggle('edit-active',editMode);
    if (editMode&&!b.classList.contains('on')) { b.style.display='block'; b.style.opacity='0.25'; }
    else if (!editMode&&!b.classList.contains('on')) { b.style.display='none'; b.style.opacity=''; }
    else b.style.opacity='';
  });
  if (!editMode&&selectedBox) { selectedBox.classList.remove('selected'); selectedBox=null; }
});

// ── 레이아웃 ──────────────────────────────────────
function applyLayout(key) {
  const box=document.querySelector(`.ov-box[data-key="${key}"]`), L=layouts[key]; if (!box||!L) return;
  box.style.top=L.top+'%'; box.style.left=L.left+'%'; box.style.width=L.width+'%'; box.style.right='auto';
  if (L.height&&L.height>0) { box.style.height=L.height+'%'; box.style.padding='0'; }
  else { box.style.height='auto'; box.style.padding=key==='desc'?'16px 0':key==='main'?'18px 0':'14px 0'; }
}
function applyAllLayouts() { applyLayout('main'); applyLayout('sub'); applyLayout('desc'); autoFitText(); }
function autoFitText() {
  ['main','sub'].forEach(key=>{const L=layouts[key];if(!L||!L.height||L.height<=0)return;const box=document.querySelector(`.ov-box[data-key="${key}"]`);if(!box)return;const o=box.querySelector('.marquee-outer');if(o)o.style.height='100%';});
  const dL=layouts.desc; if(dL&&dL.height&&dL.height>0){const di=document.querySelector('#ov-desc-wrap .ov-box-inner');if(di)di.style.overflowY='auto';}
}
function applyBoxStyles() {
  const boxes={main:'ov-top',sub:'ov-sub-wrap',desc:'ov-desc-wrap'};
  for (const [key,id] of Object.entries(boxes)) {
    const box=document.getElementById(id); if(!box) continue;
    const bgColor=overlay_data[key+'BgColor']||'#080814';
    const bgOpacity=overlay_data[key+'BgOpacity']!==undefined?overlay_data[key+'BgOpacity']:(key==='desc'?0.85:0.80);
    const r=parseInt(bgColor.slice(1,3),16),g=parseInt(bgColor.slice(3,5),16),b=parseInt(bgColor.slice(5,7),16);
    box.style.background=`rgba(${r},${g},${b},${bgOpacity})`;
  }
}

// ── 편집 드래그 ───────────────────────────────────
document.addEventListener('pointerdown',(e)=>{
  if(!editMode)return;
  const box=e.target.closest('.ov-box');
  if(selectedBox)selectedBox.classList.remove('selected');
  if(!box){selectedBox=null;return;}
  selectedBox=box; box.classList.add('selected');
  const handle=e.target.closest('.edit-handle');
  const stage=document.getElementById('stage');
  const sW=stage.offsetWidth,sH=stage.offsetHeight,key=box.dataset.key;
  if(!key||!layouts[key])return;
  const sL={...layouts[key]};
  if(!sL.height||sL.height<=0)sL.height=(box.offsetHeight/sH)*100;
  const sX=e.clientX,sY=e.clientY;
  let type='move';
  if(handle){const cls=handle.className;if(cls.includes(' tl'))type='tl';else if(cls.includes(' tr'))type='tr';else if(cls.includes(' bl'))type='bl';else if(cls.includes(' br'))type='br';else if(cls.includes(' ml'))type='ml';else if(cls.includes(' mr'))type='mr';else if(cls.includes(' mt'))type='mt';else if(cls.includes(' mb'))type='mb';}
  const clamp=(v,mn,mx)=>Math.max(mn,Math.min(mx,v));
  const onMove=(ev)=>{
    const dx=(ev.clientX-sX)/sW*100,dy=(ev.clientY-sY)/sH*100,L=layouts[key];
    switch(type){
      case 'move':L.top=clamp(sL.top+dy,0,95);L.left=clamp(sL.left+dx,0,100-L.width);break;
      case 'br':L.width=clamp(sL.width+dx,10,100-L.left);L.height=clamp(sL.height+dy,2,100-L.top);break;
      case 'bl':{const nW=clamp(sL.width-dx,10,sL.left+sL.width);L.left=sL.left+sL.width-nW;L.width=nW;L.height=clamp(sL.height+dy,2,100-L.top);break;}
      case 'tr':{L.width=clamp(sL.width+dx,10,100-L.left);const nH=clamp(sL.height-dy,2,sL.top+sL.height);L.top=sL.top+sL.height-nH;L.height=nH;break;}
      case 'tl':{const nW=clamp(sL.width-dx,10,sL.left+sL.width);L.left=sL.left+sL.width-nW;L.width=nW;const nH=clamp(sL.height-dy,2,sL.top+sL.height);L.top=sL.top+sL.height-nH;L.height=nH;break;}
      case 'ml':{const nW=clamp(sL.width-dx,10,sL.left+sL.width);L.left=sL.left+sL.width-nW;L.width=nW;break;}
      case 'mr':L.width=clamp(sL.width+dx,10,100-L.left);break;
      case 'mt':{const nH=clamp(sL.height-dy,2,sL.top+sL.height);L.top=sL.top+sL.height-nH;L.height=nH;break;}
      case 'mb':L.height=clamp(sL.height+dy,2,100-L.top);break;
    }
    applyLayout(key);
  };
  const onUp=()=>{document.removeEventListener('pointermove',onMove);document.removeEventListener('pointerup',onUp);db.ref('slideshow/state/layouts/'+key).set(layouts[key]);};
  document.addEventListener('pointermove',onMove);
  document.addEventListener('pointerup',onUp);
  e.preventDefault();
});

// ── 전체화면 ──────────────────────────────────────
function toggleFullscreen() {
  if(document.fullscreenElement||document.webkitFullscreenElement){(document.exitFullscreen||document.webkitExitFullscreen).call(document);}
  else{const el=document.documentElement;(el.requestFullscreen||el.webkitRequestFullscreen).call(el);}
}
document.addEventListener('keydown',e=>{if(e.key==='f'||e.key==='F')toggleFullscreen();});

// ── 슬라이드 ──────────────────────────────────────
function isVideoItem(item){return item&&item.isVideo;}
function clampIdx(idx){if(!items.length)return 0;return((idx%items.length)+items.length)%items.length;}
function raf2(fn){requestAnimationFrame(()=>requestAnimationFrame(fn));}

function loadLayer(layer,item) {
    if(isVideoItem(item)){
      layer.img.style.display='none'; layer.img.src='';
      layer.bg.style.backgroundImage='none';
      layer.vid.style.display='block'; layer.vid.src=item.url; layer.vid.load();
    } else {
      layer.vid.pause(); layer.vid.src=''; layer.vid.style.display='none';
      layer.img.style.display='block'; layer.img.src=item.url;
      layer.bg.style.backgroundImage=`url("${item.url}")`;
  }
}

function scheduleNext() {
  stopTimer();
  const item=items[curIdx]; if(!item||!playing)return;
  if(isVideoItem(item)) {
    const vid=active.vid; vid.currentTime=0; vid.onended=null;
    vid.play().catch(()=>{});
    vid.onended=()=>{if(playing)transition(curIdx+1);};
  } else {
    if(items.length>1) timer=setTimeout(()=>{if(playing)transition(curIdx+1);},settings.interval*1000);
  }
}
function stopTimer(){clearTimeout(timer);timer=null;active.vid.onended=null;inactive.vid.onended=null;}
function showImmediate(idx) {
  curIdx=clampIdx(idx); loadLayer(active,items[curIdx]);
  active.slide.style.opacity='1'; active.slide.style.zIndex='2'; active.slide.style.transform='';
  inactive.slide.style.opacity='0'; inactive.slide.style.zIndex='1'; noImage.className='';
}
function transition(nextIdx) {
  if(busy||!items.length)return; busy=true; curIdx=clampIdx(nextIdx);
  active.vid.pause(); active.vid.onended=null;
  loadLayer(inactive,items[curIdx]);
  inactive.slide.style.zIndex='2'; active.slide.style.zIndex='1';
  const t=settings.transition||'fade',spd=settings.transitionSpeed||800;
  if(t==='fade'){
    inactive.slide.style.opacity='0'; inactive.slide.style.transform=''; active.slide.style.transform='';
    raf2(()=>{inactive.slide.style.transition=`opacity ${spd}ms ease`;active.slide.style.transition=`opacity ${spd}ms ease`;inactive.slide.style.opacity='1';active.slide.style.opacity='0';});
  } else {
    inactive.slide.style.opacity='1'; active.slide.style.opacity='1';
    inactive.slide.style.transform='translateX(100%)'; active.slide.style.transform='translateX(0)';
    raf2(()=>{const dur=Math.min(spd,1200),ease='cubic-bezier(.4,0,.2,1)';inactive.slide.style.transition=`transform ${dur}ms ${ease}`;active.slide.style.transition=`transform ${dur}ms ${ease}`;inactive.slide.style.transform='translateX(0)';active.slide.style.transform='translateX(-100%)';});
  }
  setTimeout(()=>{
    [active,inactive]=[inactive,active];
    inactive.slide.style.transition=''; inactive.slide.style.opacity='0'; inactive.slide.style.transform=''; inactive.slide.style.zIndex='1';
    active.slide.style.transition=''; active.slide.style.zIndex='2'; active.slide.style.opacity='1'; active.slide.style.transform='';
    busy=false; scheduleNext();
  },spd+30);
}

// ── 오버레이 렌더링 ───────────────────────────────
function renderOverlay(ov) {
  overlay_data=ov; const boxOn=ov.boxOn!==false;
  const mainOn=boxOn&&ov.mainTitleOn!==false&&ov.mainTitle;
  document.getElementById('ov-top').classList.toggle('on',!!mainOn);
  const mainFC=isFontAvailable(ov.mainTitleFont||'system')?fontToCSS(ov.mainTitleFont):DEFAULT_FONT;
  renderTextSection({outerEl:document.getElementById('main-outer'),text:mainOn?ov.mainTitle:'',size:ov.mainTitleSize||42,align:ov.mainTitleAlign||'left',color:ov.mainTitleColor||'#ffffff',weight:ov.mainTitleWeight||'900',fontFamily:mainFC,marquee:mainOn&&ov.mainTitleMarquee,speed:ov.marqueeSpeed||60,animRef:(a)=>{mainAnims=a;},prevAnim:mainAnims,boxKey:'main'});
  const subOn=boxOn&&ov.subTitleOn!==false&&ov.subTitle;
  document.getElementById('ov-sub-wrap').classList.toggle('on',!!subOn);
  const subFC=isFontAvailable(ov.subTitleFont||'system')?fontToCSS(ov.subTitleFont):DEFAULT_FONT;
  renderTextSection({outerEl:document.getElementById('sub-outer'),text:subOn?ov.subTitle:'',size:ov.subTitleSize||26,align:ov.subTitleAlign||'left',color:ov.subTitleColor||'#e0e0e0',weight:ov.subTitleWeight||'700',fontFamily:subFC,marquee:subOn&&ov.subTitleMarquee,speed:ov.marqueeSpeed||60,animRef:(a)=>{subAnims=a;},prevAnim:subAnims,boxKey:'sub'});
  const descOn=boxOn&&ov.descOn!==false&&ov.description;
  document.getElementById('ov-desc-wrap').classList.toggle('on',!!descOn);
  const descEl=document.getElementById('ov-description');
  descEl.textContent=ov.description||''; descEl.style.fontSize=(ov.descSize||16)+'px'; descEl.style.textAlign=ov.descAlign||'left';
  descEl.style.color=ov.descColor||'#aaaaaa'; descEl.style.fontWeight=ov.descWeight||'400';
  const descFC=isFontAvailable(ov.descFont||'system')?fontToCSS(ov.descFont):DEFAULT_FONT; descEl.style.fontFamily=descFC;
  applyBoxStyles();
  if(editMode){document.querySelectorAll('.ov-box').forEach(b=>{if(!b.classList.contains('on')){b.style.display='block';b.style.opacity='0.25';}else b.style.opacity='';});}
  applyAllLayouts();
}

function renderTextSection({outerEl,text,size,align,color,weight,fontFamily,marquee,speed,animRef,prevAnim,boxKey}) {
  const ff=fontFamily||DEFAULT_FONT;
  if(Array.isArray(prevAnim))prevAnim.forEach(a=>{try{a&&a.cancel();}catch(e){}});else if(prevAnim){try{prevAnim.cancel();}catch(e){}}
  outerEl.innerHTML=''; outerEl.style.cssText='';
  if(!text){animRef([]);return;}
  const L=layouts[boxKey],hasFixedH=L&&L.height&&L.height>0;
  if(!marquee){
    const span=document.createElement('span'); span.className='text-static'; span.textContent=text;
    span.style.cssText=`font-size:${size}px;text-align:${align};color:${color};font-weight:${weight};font-family:${ff};line-height:1.25;display:block;padding:0 28px;white-space:pre-wrap;word-break:break-word;`;
    outerEl.appendChild(span);
    if(hasFixedH)outerEl.style.cssText='width:100%;display:flex;align-items:center;';
    animRef([]);
  } else {
    const lineH=hasFixedH?'100%':Math.ceil(size*1.6)+'px'; outerEl.style.cssText=`position:relative;height:${lineH};overflow:hidden;`;
    const ruler=document.createElement('span'); ruler.style.cssText=`position:absolute;visibility:hidden;white-space:nowrap;font-size:${size}px;font-weight:${weight};font-family:${ff};line-height:1;`; ruler.textContent=text; outerEl.appendChild(ruler);
    const gen=outerEl._mGen=(outerEl._mGen||0)+1;
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      if(outerEl._mGen!==gen)return;
      const cW=outerEl.offsetWidth,tW=ruler.offsetWidth,tH=ruler.offsetHeight; outerEl.removeChild(ruler);
      if(!cW||!tW){animRef([]);return;}
      const outerH=outerEl.offsetHeight||Math.ceil(size*1.6),topPx=Math.max(0,(outerH-tH)/2);
      const spd2=Math.max(1,speed||60),gap=Math.max(80,Math.round(cW*0.15)),unitW=tW+gap,copies=Math.ceil(cW/unitW)+2;
      const track=document.createElement('div'); track.style.cssText=`position:absolute;top:${topPx}px;left:0;display:flex;white-space:nowrap;`;
      for(let i=0;i<copies;i++){const s=document.createElement('span');s.style.cssText=`display:inline-block;flex-shrink:0;padding-right:${gap}px;font-size:${size}px;color:${color};font-weight:${weight};font-family:${ff};white-space:nowrap;line-height:1;`;s.textContent=text;track.appendChild(s);}
      outerEl.appendChild(track);
      const entranceDur=cW/spd2*1000,loopDur=unitW/spd2*1000;
      const entrance=track.animate([{transform:`translateX(${cW}px)`},{transform:'translateX(0px)'}],{duration:entranceDur,easing:'linear',fill:'forwards'});
      animRef([entrance]);
      entrance.finished.then(()=>{if(outerEl._mGen!==gen)return;entrance.cancel();const loop=track.animate([{transform:'translateX(0px)'},{transform:`translateX(${-unitW}px)`}],{duration:loopDur,iterations:Infinity,easing:'linear'});animRef([loop]);}).catch(()=>{});
    }));
  }
}

applyAllLayouts();
</script>
</body>
</html>
